feature: Agent-driven card delivery
as_a: developer
i_want: to hand a card and an autonomy level to an agent and have it drive through design, spec, implementation, and review
so_that: I collaborate on goals and cards while agents handle the delivery pipeline

scenarios:
  - name: Full autonomy drive
    given: a card with clear scenarios and a measurable goal
    when: I invoke /orb:drive with autonomy level "full"
    then: the agent drives design → spec → implement → review-pr, pausing only for PR merge

  - name: Guided drive pauses at review gates
    given: a card handed to an agent
    when: I invoke /orb:drive with autonomy level "guided"
    then: the agent pauses at review-spec and review-pr for my approval before continuing

  - name: Supervised drive delivers spec only
    given: a card handed to an agent
    when: I invoke /orb:drive with autonomy level "supervised"
    then: the agent delivers through spec and waits for my greenlight at each subsequent step

  - name: Drive state persists across sessions
    given: a drive in progress that was interrupted
    when: a new session starts with the same card in-flight
    then: the session-context hook surfaces the drive state and the agent resumes from where it stopped

  - name: NO-GO re-enters at design
    given: an implementation attempt that fails review or invalidates spec assumptions
    when: the review produces a NO-GO result
    then: the agent re-enters at design with the failure as a new constraint, incrementing the iteration count

  - name: Escalation on budget exhaustion
    given: a drive that has cycled through its iteration budget without passing review
    when: the budget is exhausted
    then: the agent surfaces findings and stops, presenting what was learned and recommending next steps

  - name: Drive parameters recorded in spec directory
    given: a drive is initiated
    when: the agent begins work
    then: a drive.yaml is created in the spec directory recording autonomy level, card reference, start time, and iteration state

  - name: Thin card blocks full autonomy
    given: a card with fewer than 3 scenarios
    when: I invoke /orb:drive with autonomy level "full"
    then: drive refuses, names the gap, and suggests what to add before retrying

  - name: Default autonomy is guided
    given: a card handed to an agent without an explicit autonomy level
    when: /orb:drive is invoked
    then: the autonomy level defaults to "guided"

goal: "agents deliver cards end-to-end within declared autonomy bounds"

maturity: planned

specs:
  - specs/2026-04-15-drive/spec.yaml

references:
  - "McGill sprint alignment: disposition embedded in agent definition + CLAUDE.md proved effective for focus and throughput"
  - "ralph-loop: existing self-referential loop pattern for autonomous iteration"
  - "cards/0003-implement.yaml: progress.md checklist pattern reusable for drive state"
