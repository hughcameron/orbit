goal: "Update /orb:drive so that review-spec and review-pr run as context-separated forked Agents — honouring the components' declared context:fork contract, parsing verdicts only from saved review files, bounding REQUEST_CHANGES cycles at 3 per stage, and eliminating drive's inline-review pattern at the architectural root"

constraints:
  - "Reviews are launched as forked Agents via the Agent tool (subagent_type: general-purpose) — drive no longer reads review-spec/SKILL.md or review-pr/SKILL.md inline at runtime"
  - "The verdict contract is a single canonical markdown line — `**Verdict:** APPROVE | REQUEST_CHANGES | BLOCK` — matched by a strict regex. Any other format is a contract violation."
  - "File-on-disk is the only authoritative source for the verdict. Drive does not consult the forked agent's chat response under any circumstance."
  - "If the review file does not exist or contains no parseable verdict line after the fork returns, drive retries once with a fresh fork; on second failure drive escalates with a clear 'review could not be completed' message"
  - "Re-reviews after REQUEST_CHANGES are fully cold — each forked reviewer reads only the spec/diff, with no pointer to prior review files and no iteration-count hint"
  - "REQUEST_CHANGES is bounded at 3 cycles per stage (review-spec and review-pr counted independently). After the 3rd REQUEST_CHANGES on a stage, drive does not launch a 4th review — it records a synthetic BLOCK with a fixed constraint string and triggers the existing NO-GO handling."
  - "The per-stage REQUEST_CHANGES counter is persisted in drive.yaml so it survives session death; resumption reads the counter and respects the remaining budget"
  - "No migration scaffolding in drive — in-flight drives must be finished or parked before upgrade. No review_mode field, no dual code paths, no flag day."
  - "drive.yaml and the review files on disk are the only state that crosses the fork boundary — forked reviewers see neither drive.yaml nor the implementing agent's chat"
  - "The existing drive top-level iteration budget (3 NO-GO events) is unchanged. Synthetic BLOCK from Q4 consumes the top-level iteration the same way a real BLOCK does."

acceptance_criteria:
  # --- Verdict contract ---
  - id: ac-01
    ac_type: doc
    description: "review-spec/SKILL.md and review-pr/SKILL.md specify the canonical verdict line format `**Verdict:** APPROVE | REQUEST_CHANGES | BLOCK` as a contract. The skills already produce this line; the contract is made explicit in the skill's Output section. The Output section additionally states that when the skill is invoked as a forked Agent, the output path supplied by the invoking agent's brief takes precedence over the default `specs/YYYY-MM-DD-<topic>/review-<stage>-<date>.md` path documented in the skill — so drive can disambiguate REQUEST_CHANGES cycles per ac-19."
    verification: "Read both SKILL.md files. Verify the Output section (a) names the canonical verdict line format and states that drive and other consumers depend on it, and (b) names the brief-overrides-default rule for forked invocations."

  - id: ac-02
    ac_type: code
    description: "Drive's verdict parser extracts the verdict by locating the first line in the review file matching the canonical regex `^\\*\\*Verdict:\\*\\* (APPROVE|REQUEST_CHANGES|BLOCK)\\s*$`. The match is case-sensitive on the verdict token. Multiple matches use the first; zero matches are treated as no verdict (triggering retry per ac-07)."
    verification: "Unit-style test: hand-craft three review files (valid APPROVE, valid REQUEST_CHANGES, file with no verdict line). Run drive's parser on each. Verify correct extraction and correct failure signal on the missing case."

  - id: ac-03
    ac_type: code
    description: "Drive's verdict parser does no fuzzy matching — it does not accept variations like lowercase verdicts, quoted verdicts, verdict lines without the bold markdown, or inline verdicts within prose. Deviation from the canonical form is treated as no verdict."
    verification: "Test with review files containing non-canonical forms (`Verdict: approve`, `**verdict:** APPROVE`, `The verdict is APPROVE.`). Verify drive reports no-verdict for all three and triggers the retry path."

  # --- Fork invocation ---
  - id: ac-04
    ac_type: code
    description: "At drive §5 (Review-Spec), drive launches a forked Agent via the Agent tool with subagent_type: general-purpose. The brief instructs the forked agent to read the spec at <spec_path> cold, run the review-spec skill, and write the review to the cycle-specific path (see ac-19 for the naming scheme). Drive does not include any conversation context in the brief — only the paths."
    verification: "Trigger drive on a test card up to review-spec stage. Inspect the Agent tool invocation. Verify subagent_type is general-purpose, the brief references the spec path and the cycle-specific output path, and no conversation context is included."

  - id: ac-05
    ac_type: code
    description: "At drive §7 (Review-PR), drive launches a forked Agent via the Agent tool with subagent_type: general-purpose. The brief instructs the forked agent to read the diff on the current branch cold, run the review-pr skill, and write the review to the cycle-specific path (see ac-19 for the naming scheme)."
    verification: "Trigger drive on a test card up to review-pr stage. Inspect the Agent tool invocation. Verify subagent_type is general-purpose, the brief references the branch/diff and the cycle-specific output path, and no conversation context is included."

  - id: ac-06
    ac_type: code
    description: "Drive reads the verdict only from the saved review file, never from the forked Agent's returned chat response. The Agent's chat response may contain a summary but drive does not parse it for verdict extraction."
    verification: "Mock a forked agent that returns a chat response with one verdict and writes a file with a different verdict. Verify drive reads the file's verdict and ignores the chat's."

  - id: ac-07
    ac_type: code
    description: "If, after the forked Agent returns, the expected review file does not exist or contains no parseable canonical verdict line, drive launches one retry with a fresh fork (new Agent invocation, no context from the prior fork; retry writes to the same cycle-specific path, overwriting any partial file from the failed attempt). The fork-retry path does not increment review_cycles — the REQUEST_CHANGES counter only advances on a successfully-parsed REQUEST_CHANGES verdict per ac-09. If the retry also fails the same check, drive escalates drive.yaml status to escalated with the message 'review could not be completed after 2 forked attempts at <stage>' and stops. Idempotent resumption: on any drive invocation that enters a review stage, drive first checks whether the cycle-specific path already exists with a parseable verdict (e.g. a prior session crashed after the fork wrote a valid file but before drive parsed it). If so, drive parses that file and proceeds without launching a fork — the retry budget is reserved for the case where no valid file exists yet."
    verification: "Simulate a forked agent that does not write a file. Verify drive launches a second fork with the same cycle-specific path and a fresh brief, and that review_cycles.<stage> is unchanged across the retry. Simulate both forks failing; verify drive writes the escalation status and stops, not re-entering at design. Resumption test: hand-craft a drive.yaml at stage review-spec with a valid review file already present at the expected cycle-1 path; invoke /orb:drive; verify drive parses the existing file and advances without launching any Agent."

  # --- Re-review context ---
  - id: ac-08
    ac_type: code
    description: "When drive re-forks a reviewer after REQUEST_CHANGES, the new forked Agent receives no context about prior review passes: no path to prior review files, no iteration counter, no summary of prior findings. The brief is functionally identical to the first forked review's brief."
    verification: "Trigger a drive that hits REQUEST_CHANGES twice. Inspect the 2nd and 3rd fork briefs. Verify they contain the same paths as the first fork and no reference to prior review files or iteration counts."

  # --- REQUEST_CHANGES budget ---
  - id: ac-09
    ac_type: code
    description: "Drive tracks a REQUEST_CHANGES counter per stage in drive.yaml under a new field `review_cycles` with subfields `review_spec` and `review_pr`, each an integer count of REQUEST_CHANGES verdicts received at that stage during the current top-level iteration. Counters reset to 0 when drive transitions to a new top-level iteration (new spec directory)."
    verification: "Trigger a drive that hits REQUEST_CHANGES twice on review-spec. Inspect drive.yaml — verify review_cycles.review_spec == 2. Trigger an NO-GO BLOCK that re-enters at design — verify the new iteration's drive.yaml shows review_cycles.review_spec == 0."

  - id: ac-10
    ac_type: code
    description: "When review_cycles.<stage> reaches 3 on a stage and the most recent review returned REQUEST_CHANGES, drive does not launch a 4th forked review for that stage. Instead, drive synthesises a BLOCK verdict with the constraint string 'review converged on REQUEST_CHANGES after 3 iterations; findings have not been addressable within budget' and triggers the existing NO-GO handling at drive §8."
    verification: "Trigger a drive where review-spec returns REQUEST_CHANGES 3 times. After the 3rd fix cycle completes, verify drive does not launch a 4th fork (no new Agent invocation), writes a synthetic BLOCK constraint into drive.yaml history, and re-enters at design."

  - id: ac-11
    ac_type: code
    description: "drive.yaml's review_cycles field is read on resumption. The counter increments on each successfully-parsed REQUEST_CHANGES verdict (per ac-09); the synthetic-BLOCK check happens after the increment. If a session dies mid-stage with review_cycles.review_spec == 3 (three real REQUEST_CHANGES reviews completed, fork budget exhausted), the resumed drive must not launch a 4th fork — it synthesises BLOCK per ac-10 on resumption, same as it would have in-session."
    verification: "Start a drive, let review-spec return REQUEST_CHANGES three times, then kill the session before drive synthesises the BLOCK. Verify drive.yaml shows review_cycles.review_spec == 3 and stage == review-spec (no synthetic BLOCK yet recorded). Restart and invoke drive; verify drive does not launch a 4th fork, synthesises BLOCK with the constraint string from ac-10, and re-enters at design per the existing NO-GO handling."

  # --- SKILL.md amendments ---
  - id: ac-12
    ac_type: doc
    description: "plugins/orb/skills/drive/SKILL.md §5 (Stage: Review-Spec) is rewritten to describe launching review-spec as a forked Agent. The instruction 'Read the review-spec skill instructions from plugins/orb/skills/review-spec/SKILL.md. Follow its instructions inline' is removed. The Important note about not invoking /orb:review-spec as a skill call is removed. The section references the verdict contract (ac-01) and the fork+parse+verdict loop."
    verification: "Read drive/SKILL.md §5. Verify it describes Agent-tool invocation, the brief shape, the parse-from-file behaviour, and does not contain 'read SKILL.md' or 'follow inline' language for review-spec."

  - id: ac-13
    ac_type: doc
    description: "plugins/orb/skills/drive/SKILL.md §7 (Stage: Review-PR) is rewritten analogously to §5. The inline-review language is removed; forked-Agent invocation is described; the verdict contract and fork+parse+verdict loop are referenced."
    verification: "Read drive/SKILL.md §7. Verify it describes Agent-tool invocation for review-pr and does not contain 'read SKILL.md' or 'follow inline' language."

  - id: ac-14
    ac_type: doc
    description: "plugins/orb/skills/drive/SKILL.md Critical Rules section no longer contains 'Both reviews run inline' or equivalent. It contains a new rule stating that reviews are forked Agents honouring the component skills' context:fork frontmatter, and that verdicts are read from disk only."
    verification: "Read drive/SKILL.md Critical Rules. Verify 'run inline' language is absent. Verify a rule naming the fork-and-file-verdict contract is present."

  - id: ac-15
    ac_type: doc
    description: "plugins/orb/skills/drive/SKILL.md adds or amends a section describing the REQUEST_CHANGES per-stage budget (3 cycles), the synthetic-BLOCK conversion on the 4th would-be cycle, and the constraint string drive uses for the synthetic BLOCK. The constraint string in drive/SKILL.md must be byte-identical to the string in ac-10 — any drift breaks implementation-to-spec traceability."
    verification: "Read drive/SKILL.md. Verify a section (part of §5/§7 or a new subsection) names the 3-cycle per-stage limit, the synthetic BLOCK behaviour, and the exact constraint string. Grep drive/SKILL.md for the exact string 'review converged on REQUEST_CHANGES after 3 iterations; findings have not been addressable within budget' — a byte-level match is required."

  # --- Migration & release note ---
  - id: ac-16
    ac_type: doc
    description: "The PR description for this change includes a migration note: 'Before upgrading, finish or park any in-flight drive. Session-context.sh will surface active drives at session start. Drives initialised before this change run inline reviews; drives initialised after this change run forked reviews. Do not mix within a single drive.' No drive.yaml migration field is introduced."
    verification: "Inspect the PR description before merge. Verify the migration note is present and drive.yaml has no review_mode or equivalent compatibility field."

  # --- Integration ---
  - id: ac-17
    ac_type: code
    description: "End-to-end: running /orb:drive on a test card with APPROVE verdicts throughout produces exactly two review files (review-spec-<date>.md, review-pr-<date>.md) at the expected paths, each written by a forked Agent. drive.yaml records stage transitions correctly (design → spec → review-spec → implement → review → complete)."
    verification: "Run /orb:drive on a simple test card end-to-end. After completion, verify both review files exist, each contains the canonical verdict line, and drive.yaml records the correct terminal state."

  - id: ac-18
    ac_type: gate
    description: "Rally sub-agents running drive-full inside parallel worktrees inherit forked reviews automatically — no rally-specific plumbing for reviews is required. This AC is a **post-ship verification** — it is not a merge gate for this spec. It is verified after the rally refinement spec (specs/2026-04-19-rally-subagent-model/) is updated to remove the now-redundant plumbing; see exit_conditions for the split."
    verification: "After both this spec and the rally refinement spec ship, cross-read the rally SKILL.md and the refinement spec's ACs. Verify rally's SKILL.md §7 (Parallel Implementation) no longer claims rally-specific nested-fork plumbing and the refinement spec's ac-07 / constraint #2 have been collapsed or removed. Record completion in the rally refinement spec's progress.md, not this spec's."

  # --- Review-file naming (cycle disambiguation) ---
  - id: ac-19
    ac_type: code
    description: "Review files on disk use a cycle-ordinal suffix to disambiguate same-stage same-cycle-start cycles. Cycle 1 (the first review on a stage in the current top-level iteration) writes to `<spec_dir>/review-<stage>-<date>.md` (no suffix, preserving the existing convention). Cycles 2 and 3 write to `<spec_dir>/review-<stage>-<date>-v2.md` and `<spec_dir>/review-<stage>-<date>-v3.md` respectively. The `<date>` token is captured at cycle 1 (first entry to the stage in the current iteration) and reused for cycles 2 and 3 of the same stage — drive persists the captured date in drive.yaml alongside `review_cycles` so long-running drives don't split cycle files across date boundaries. Drive computes the target path deterministically from `review_cycles.<stage>` and the captured date before launching the fork — the Nth review for a stage (1-indexed) uses suffix `-v<N>` for N>1. Drive's verdict parser reads only the file at the path drive just wrote into the fork's brief — it does not scan the directory or merge multiple cycle files."
    verification: "Trigger a drive where review-spec returns REQUEST_CHANGES twice then APPROVE. Verify three files exist with the same date prefix: `review-spec-<date>.md`, `review-spec-<date>-v2.md`, `review-spec-<date>-v3.md`. Verify drive's verdict-parse call on the 3rd cycle targeted the -v3 file by exact path, not by glob. Date-boundary check: simulate system clock advancing a day between cycles; verify all three files still use the cycle-1 date."

  # --- Resumption discipline (no silent mixing with pre-change drives) ---
  - id: ac-20
    ac_type: code
    description: "On resumption (any drive invocation that finds an existing drive.yaml rather than creating one), drive checks for the `review_cycles` field. If the field is absent — i.e. drive.yaml was created before this change shipped — drive refuses to resume with the message 'drive.yaml was initialised before forked reviews shipped; finish the drive under the prior /orb:drive version, or park and restart from the card' and exits without advancing state or launching any Agent. Drive does not auto-initialise the field (no migration scaffolding per constraint #8, no silent mode-mixing per ac-16). Field presence is treated as the operator's opt-in — either drive wrote it on fresh creation per ac-21, or the operator manually added it knowing the implication; in both cases the run proceeds under the new forked-review rules."
    verification: "Hand-craft a drive.yaml with no `review_cycles` field; invoke /orb:drive; verify it exits with the refusal message, drive.yaml is unchanged, and no Agent invocation is made."

  - id: ac-21
    ac_type: code
    description: "When drive creates a new drive.yaml (fresh card, no prior state), it writes `review_cycles: {review_spec: 0, review_pr: 0}` at the same time it writes the initial stage and iteration fields. New drives started under this code always have the field from the first write; pre-change drives never do — so the ac-20 refusal check is unambiguous for the common case."
    verification: "Invoke /orb:drive on a fresh test card. Immediately inspect the newly-written drive.yaml (before any review stage). Verify `review_cycles.review_spec == 0` and `review_cycles.review_pr == 0` are present alongside the other initial fields."

  # --- Resumption documentation ---
  - id: ac-22
    ac_type: doc
    description: "plugins/orb/skills/drive/SKILL.md §11 Resumption (or equivalent section) is amended to include the review_cycles field and the cycle-start date in its state-reconstruction enumeration. The section states: (a) absent `review_cycles` triggers the ac-20 refusal; (b) present `review_cycles` is read as-is, with the synthetic-BLOCK check applied on next REQUEST_CHANGES per ac-11; (c) on resumption mid-stage, drive checks for an existing valid review file at the cycle-specific path before launching a fork, per ac-07."
    verification: "Read drive/SKILL.md §11. Verify it enumerates review_cycles reading, refusal-on-absence, and idempotent-resumption behaviour with cross-references to ac-20, ac-11, and ac-07."

  - id: ac-23
    ac_type: doc
    description: "plugins/orb/scripts/session-context.sh is reviewed for compatibility with the extended drive.yaml. If it currently reads drive.yaml fields that remain unchanged, no edit is required — but the spec's exit checklist confirms the hook still parses the new drive.yaml without error. If any hook logic depends on drive.yaml's shape, it is updated in the same PR."
    verification: "Run session-context.sh against a drive.yaml produced by the new drive (with review_cycles present). Verify the hook emits the expected active-drive line and does not error. If any edit was required, verify the edit ships in the same PR as the SKILL.md changes."

ontology_schema:
  name: "DriveState"
  description: "Extended from the existing drive.yaml schema to add a per-stage REQUEST_CHANGES counter that survives session death"
  fields:
    - name: "review_cycles"
      type: "object"
      description: "Per-stage counter of REQUEST_CHANGES verdicts received in the current top-level iteration. Reset when drive transitions to a new iteration (new spec directory)."
    - name: "review_cycles.review_spec"
      type: "integer"
      description: "Count of REQUEST_CHANGES verdicts received at the review-spec stage in the current iteration. 0..3. On 4th would-be cycle, drive synthesises BLOCK per ac-10."
    - name: "review_cycles.review_pr"
      type: "integer"
      description: "Count of REQUEST_CHANGES verdicts received at the review-pr stage in the current iteration. 0..3. On 4th would-be cycle, drive synthesises BLOCK per ac-10."
    - name: "review_cycle_dates"
      type: "object"
      description: "Per-stage captured date string used in the review-file path. Set at cycle 1 of each stage and reused for cycles 2–3 so a long-running drive does not split cycle files across date boundaries (per ac-19)."
    - name: "review_cycle_dates.review_spec"
      type: "string"
      description: "The <date> token used in review-spec review-file paths for the current iteration. Written when drive enters review-spec for the first time in the iteration; not updated on subsequent cycles."
    - name: "review_cycle_dates.review_pr"
      type: "string"
      description: "The <date> token used in review-pr review-file paths for the current iteration. Written when drive enters review-pr for the first time in the iteration; not updated on subsequent cycles."

evaluation_principles:
  - principle: "Contract fidelity — drive honours the context:fork declarations in review-spec and review-pr frontmatter. No skill declares a contract that drive silently violates."
    weight: 0.30
  - principle: "Artefact contracts over session state — reviews are a produce-a-file function. Drive is a state machine over files. Chat never crosses the fork boundary."
    weight: 0.25
  - principle: "Bounded disposition — REQUEST_CHANGES cycles are bounded; convergence failure escalates honestly via synthetic BLOCK. No unbounded loops, no silent wheel-spinning."
    weight: 0.20
  - principle: "Minimal migration surface — no compatibility fields, no dual code paths. The upgrade is deliberate; in-flight drives finish or park first."
    weight: 0.15
  - principle: "Downstream simplification — rally's parallel-sub-agent contradiction dissolves once drive forks. No rally-specific review plumbing after this ships."
    weight: 0.10

exit_conditions:
  # Merge gates (ac-01..ac-17, ac-19..ac-23) — all must be satisfied before this PR merges
  - "plugins/orb/skills/drive/SKILL.md §5, §7, §11, and Critical Rules are updated per ac-12, ac-13, ac-14, ac-15, ac-22"
  - "plugins/orb/skills/review-spec/SKILL.md and review-pr/SKILL.md declare the canonical verdict line format and brief-overrides-default rule per ac-01"
  - "drive's verdict parser, fork invocation, retry logic, idempotent resumption, and synthetic-BLOCK conversion are implemented per ac-02..ac-11"
  - "drive.yaml ontology includes review_cycles and review_cycle_dates with persistence across resumption; field absence triggers the ac-20 refusal; fresh drives initialise the fields per ac-21"
  - "Review-file cycle-ordinal naming is implemented per ac-19 (`-v2`/`-v3` suffix for cycles 2–3; date fixed at cycle 1)"
  - "session-context.sh compatibility verified per ac-23"
  - "End-to-end drive on a test card passes ac-17"
  - "PR description includes the migration note per ac-16"
  - "/orb:review-pr verdict on this spec's implementation is APPROVE"
  # Post-ship verifications (ac-18) — verified after the rally refinement spec ships, not a merge gate here
  - "ac-18 is verified separately when the rally refinement spec (specs/2026-04-19-rally-subagent-model/) lands; completion is recorded in that spec's progress.md, not this one's"

