id: 2026-05-19-workflow-conformance
goal: 'Ship `orbit audit conformance` as the agent-on-demand workflow audit. The verb returns a structured findings envelope (severity / subsystem / subject / state / evidence / remediation.verb per finding) covering three new finding families — plugin-canonical-file drift (STYLE.md / METHOD.md / .orbit/.gitignore byte-compare), card-state (maturity:planned + empty specs), and memo staleness (filename-date >7d) — alongside aggregated audit_drift and audit_topology results. Each finding carries an explicit remediation verb the agent can run without translation. Per-repo plugin-version pin in `.orbit/config.yaml` defaults to current; when installed > pinned, a single pin_behind finding collapses per-file findings under the newer plugin. Audience is agent-first: zero-finding case is silent; the operator only sees output on agent escalation. Intent contract and full pivot rationale in interview.md.'
cards:
- 0039-workflow-conformance
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: 'ConformanceFinding schema + audit_conformance verb plumbed. orbit-state/crates/core/src/schema.rs gains a ConformanceFinding serde struct with FIELDS const (mirroring AuditDriftEntry / TopologyDriftEntry shape). Required fields: severity (enum: high / medium / low), subsystem (slug-shaped string), subject (opaque path or id string), state (slug-shaped string — finding-family-specific, e.g. byte_drift / ready_for_design / stale / pin_behind / missing), remediation (struct of {verb: required string, rationale: optional string}). Optional: evidence (free-form serde_yaml::Value for finding-family-specific structured context). orbit-state/crates/core/src/verbs.rs gains audit_conformance(layout, args: &AuditConformanceArgs) -> Result<AuditConformanceResult>, registered in the VerbRequest / VerbResponse dispatch and exposed as the `orbit audit conformance` subcommand on CLI and via MCP tools/call. AuditConformanceResult shape: {findings: Vec<ConformanceFinding>, aggregated: AggregatedAudits, pin: PinState}, where AggregatedAudits = {drift: AuditDriftResult, topology: AuditTopologyResult} and PinState = {pinned: Option<String>, current: String, status: enum(unpinned / matches / pin_behind / pin_ahead)}. Schema tests cover round-trip, deny-unknown-fields, missing-required-field, and severity / state slug-shape constraints. CLI + MCP parity test (one) covers the empty-fixture (clean repo, zero findings) envelope as the parity floor; per-family parity tests are covered in ac-02 / ac-03 / ac-04 / ac-05 / ac-06.'
  gate: true
  checked: false
  verification: 'Grep orbit-state/crates/core/src/schema.rs for `pub struct ConformanceFinding` and the FIELDS const. Run `cargo test -p orbit-state-core schema::conformance` and assert round-trip / unknown-field / missing-field tests pass. Grep verbs.rs for `fn audit_conformance` and the VerbRequest::AuditConformance dispatch arm. Invoke `orbit audit conformance --help` and assert the subcommand is registered. Invoke `orbit audit conformance --json` against an empty / clean fixture and assert envelope shape: {data: {result: {findings: [], aggregated: {drift: ..., topology: ...}, pin: {...}}, verb: "audit.conformance"}, ok: true}. Run the CLI ↔ MCP parity test on the clean-fixture invocation and assert byte-identical JSON payloads.'
- id: ac-02
  description: 'Card-state finding fires on planned + empty specs. audit_conformance walks `.orbit/cards/*.yaml` and emits one ConformanceFinding per card where `maturity == Planned && specs.is_empty()`. Finding shape: {severity: medium, subsystem: "cards", subject: <card.id>, state: "ready_for_design", evidence: {maturity: "planned", specs_count: 0}, remediation: {verb: "/orb:design <numeric-id>", rationale: "card has scenarios but no design pass"}}. Cards at other maturities (emerging / established) do NOT fire; planned cards with non-empty specs do NOT fire. Walk uses the existing Layout::list_card_files() scanner; parse via Card serde. The remediation.verb embeds the card''s numeric id (e.g. "/orb:design 39") matching the convention from `.orbit/conventions/id-conventions.md`.'
  gate: true
  checked: false
  verification: Unit test fixtures under orbit-state/crates/core/src/verbs.rs (or a sibling module). (a) Card at maturity planned with empty specs → exactly one finding fires with the documented shape. (b) Card at maturity planned with one entry in specs → no finding. (c) Card at maturity emerging with empty specs → no finding. (d) Card at maturity established → no finding. (e) Multiple planned + empty cards → one finding per card in declaration order. Assert each finding's remediation.verb is byte-equal to `/orb:design <numeric-id>` with the correct id substituted. CLI + MCP parity test covers the multi-finding fixture envelope.
- id: ac-03
  description: 'Memo-staleness finding fires on filename-date >7d. audit_conformance walks `.orbit/memos/*.md` and emits one ConformanceFinding per memo whose filename-date is more than 7 days before today. Memo filename convention is `YYYY-MM-DD-<slug>.md` (per memo skill); parse the leading 10-char date from the filename via chrono::NaiveDate::parse_from_str("%Y-%m-%d"). Finding shape: {severity: medium, subsystem: "memos", subject: <memo path relative to .orbit/>, state: "stale", evidence: {filename_date: "<YYYY-MM-DD>", days_old: <N>}, remediation: {verb: "/orb:distill <relative-path>", rationale: "memo undistilled past 7-day threshold"}}. Memos with malformed filenames (no parseable leading date) are skipped silently (defensive — no panic, no finding). The 7-day threshold is a Rust constant in the verb implementation; no `.orbit/config.yaml` override in v1.'
  gate: true
  checked: false
  verification: 'Unit test fixtures. (a) Memo dated 8 days ago → finding fires with days_old: 8. (b) Memo dated exactly 7 days ago → no finding (strict >, not >=). (c) Memo dated 6 days ago → no finding. (d) Memo dated today → no finding. (e) Memo with filename `notes.md` (no leading date) → no finding, no panic. (f) Memo with filename `2026-99-99-bad.md` (invalid date) → no finding, no panic. Assert each fired finding''s remediation.verb is byte-equal to `/orb:distill <relative-path>`. Test uses a controllable `today` (inject via args or test helper) — do NOT rely on system clock in tests. CLI + MCP parity test covers a multi-memo fixture.'
- id: ac-04
  description: 'Plugin-canonical-file drift finding via byte-compare. audit_conformance reads three operator files — `.orbit/STYLE.md`, `.orbit/METHOD.md`, `.orbit/.gitignore` — and compares each byte-for-byte against the pinned plugin''s canonical bytes. Canonical sources: `plugins/orb/skills/setup/STYLE.md`, `plugins/orb/skills/setup/METHOD.md`, `plugins/orb/scripts/orbit.gitignore` (verify exact paths during implementation — the §6b mechanism already names them). Per-file outcomes: byte-equal → no finding; byte-different → finding with state: "byte_drift", evidence: {canonical_path: "<plugin path>"}, remediation: {verb: "orbit setup", rationale: "re-run setup to overwrite with canonical"}; operator file absent → finding with state: "missing", same remediation. Reuses §6b''s byte-equal comparison; no whitespace tolerance. Severity: medium for byte_drift and missing. NOTE: this AC fires findings only when the pin matches the installed plugin OR is unpinned — pin-behind state suppresses per-file findings per ac-05.'
  gate: true
  checked: false
  verification: 'Unit test matrix per file (STYLE.md, METHOD.md, .gitignore): (a) operator file byte-equal to canonical → no finding; (b) operator file byte-different (one char changed) → finding with state byte_drift; (c) operator file absent → finding with state missing. Assert each finding''s remediation.verb is "orbit setup". Assert no finding fires for files outside the canonical set (e.g. a hand-edited `.orbit/conventions/id-conventions.md`). Test the canonical path resolution against the actual installed plugin (test helper builds a temp .orbit + temp plugin tree). CLI + MCP parity test covers a multi-file-drifted fixture.'
- id: ac-05
  description: 'Plugin-version pin + pin-behind state collapses per-file findings. orbit-state Config gains a top-level `plugin_version: Option<String>` field parsed from `.orbit/config.yaml` (deserde-default is None for unpinned). Field shape: semver-compatible string ("0.4.18"); no validation beyond non-empty when present. PinState derivation: read installed plugin version via cargo pkgid or the marketplace metadata (implementing agent picks the canonical source); compare to pinned. Four PinState.status values: unpinned (field absent), matches (pinned == current), pin_behind (current > pinned), pin_ahead (current < pinned — anomalous, surface as a high-severity finding). On pin_behind, audit_conformance emits ONE finding: {severity: medium, subsystem: "setup", subject: ".orbit/config.yaml", state: "pin_behind", evidence: {pinned: "<vN.N.N>", current: "<vM.M.M>"}, remediation: {verb: "orbit setup --bump-pin", rationale: "installed plugin is ahead of pinned version — bump or re-run setup"}} AND suppresses the per-file byte-drift findings from ac-04 (the pin-bump prompt absorbs them; agent can still inspect aggregated.drift / aggregated.topology for substrate-level drift unrelated to the pin). Pin-bump remediation requires either (a) the implementing agent to add `--bump-pin` to `orbit setup` (re-runs setup at the current version and rewrites the pin) or (b) document that `orbit setup` already rewrites the pin and `--bump-pin` is an alias for clarity. PinState round-trips through Config::from_str and the canonical writer (orbit verify clean after edit).'
  gate: true
  checked: false
  verification: 'Schema test: Config parses `.orbit/config.yaml` with `plugin_version: "0.4.18"` at top level; round-trips through canonical writer. Unit test matrix on PinState derivation: (a) field absent → unpinned; (b) field == installed → matches; (c) field < installed → pin_behind; (d) field > installed → pin_ahead. Behaviour matrix: (a) pin_behind fires exactly one pin_behind finding and suppresses ac-04 byte-drift findings (assert findings list does NOT contain byte_drift entries even when files differ); (b) matches / unpinned does NOT fire pin_behind and DOES surface ac-04 findings when files differ; (c) pin_ahead fires one high-severity pin_ahead finding (no per-file suppression — pin_ahead is anomalous and agent should escalate). Integration test: invoke `orbit setup --bump-pin` (or `orbit setup` if it''s the existing path) against a fixture with `plugin_version: "0.4.18"` and installed 0.4.20; assert post-invocation config has `plugin_version: "0.4.20"`. CLI + MCP parity test on the pin_behind envelope.'
- id: ac-06
  description: 'Aggregate over audit_drift + audit_topology. AuditConformanceResult.aggregated carries the existing audit_drift and audit_topology results, populated by audit_conformance invoking each sub-verb internally. The composition is non-mutating: audit_drift and audit_topology continue to exist as independent CLI/MCP verbs with unchanged signatures and parity contracts. AuditConformanceResult.findings does NOT duplicate audit_drift or audit_topology findings — those live exclusively under aggregated.{drift,topology}. The conformance envelope lets an agent read all three audits from one invocation rather than three. Aggregation runs unconditionally on every conformance call.'
  gate: true
  checked: false
  verification: 'Integration test fixture combining: (a) one schema-field drift case (`.orbit/cards/<id>.yaml` with an unknown field — audit_drift would detect); (b) one topology drift case (`.orbit/topology/<entry>.yaml` with a stale_pointer — audit_topology would detect); (c) one stale memo (>7d — ac-03 detects). Invoke `orbit audit conformance --json`; assert: `aggregated.drift.entries` contains the schema drift entry; `aggregated.topology.entries` contains the topology drift entry; `findings` contains exactly one entry (the stale memo) — no duplication of schema/topology entries in findings. Run the three sub-verbs independently and assert their envelopes are byte-equal to the corresponding aggregated.{drift,topology} sub-envelopes in the conformance result. CLI + MCP parity test on the combined-drift fixture.'
- id: ac-07
  description: 'Clean repo zero findings, exits 0, idempotent. When the operator repo matches the pinned plugin contract on all three new finding families AND audit_drift is clean AND audit_topology is clean, audit_conformance returns `{findings: [], aggregated: {drift: clean, topology: clean}, pin: matches-or-unpinned}` and the CLI exits 0. The verb is read-only — re-invocation produces byte-identical envelope output. Agent reads zero findings as "no workflow drift, propose new work."'
  gate: false
  checked: false
  verification: Fixture matching all clean criteria (no card-state findings, no stale memos, all three canonical files byte-equal to canonical, audit_drift clean, audit_topology clean, pin matches-or-unpinned). Invoke `orbit audit conformance --json` twice; assert (a) both exit 0; (b) both return zero findings; (c) both produce byte-identical JSON output (read-only idempotence). Assert exit code 0 with `--json` and 0 in human mode.
- id: ac-08
  description: Cross-skill prose discovery surface. Update plugins/orb/skills/setup/SKILL.md with a new section (likely §6e or a top-level discovery note) naming `orbit audit conformance` as the audit verb paired with /orb:setup — operators discover the verb as part of setup; agents discover it via the setup SKILL.md prose. Update plugins/orb/skills/setup/METHOD.md ("Substrate rules" or equivalent) with a one-line mention of the verb. Update CLAUDE.md (or its referenced files) only if the consumer-facing prose surfaces the verb. NO new `/orb:*` SKILL.md is created — the verb is CLI/MCP-only; agents call it directly via Bash. The /orb:setup SKILL.md prose names what the verb does (workflow conformance), what it returns (structured findings envelope), and what the agent should do with findings (triage + remediate per finding's remediation.verb).
  gate: false
  checked: false
  verification: Grep plugins/orb/skills/setup/SKILL.md for `orbit audit conformance` and assert at least one mention in a relevant section. Grep plugins/orb/skills/setup/METHOD.md for `orbit audit conformance`. Assert no new SKILL.md file under plugins/orb/skills/ named "conformance" or similar (verb is not surfaced as a /orb:* skill — agent-only consumer). Grep CLAUDE.md (project + global, if relevant) for the verb name and assert mention only if the consumer-facing surface needs it.
  ac_type: doc
