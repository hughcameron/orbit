id: 2026-05-22-routine-proposals
goal: Agents observing recurring chains or DAGs of existing skill invocations author named routine SKILL.md files directly to .claude/skills/<name>/SKILL.md (no proposal artefact; commit message surfaces the chain to the author). Routines carry front-matter compatible with card 0022's curator (created_by agent, created_at, pinned false, plus a new last_verified field for audit-driven freshness). orbit audit conformance flags stale routines so the author edits inline or archives via the curator — preserving the author's time for higher-order thinking by encoding the "how" as named substrate. Complementary to card 0022 (single-skill authoring via skill-author spec ceremony) which handles recurring procedures within one domain.
cards:
- 0013-routine-proposals
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: Chain-detection substrate is documented and passing — the implementing agent picks one of two paths and ships the evidence before any other AC closes — (a) extend SkillInvocation with per-invocation position / sequence_id fields, or (b) add an aggregator verb that reconstructs chains from existing SkillInvocation rows plus session+timestamp joins; this AC gates the others since chain detection is the substrate the entire spec presupposes
  gate: true
  checked: true
- id: ac-02
  description: Recurrence detection respects the ≥2-occurrence threshold with the tabletop matching rule — given a substrate of skill invocations across two or more sessions, when the agent runs chain detection, then chains of length 2 require exact-ordering match across sessions, chains of length 3 or more allow ≤1 skipped step between matching invocations (catches minor variations), and when multiple overlapping chains match the agent picks the longest consistent chain to avoid re-proposing sub-chains; chains observed only once or with inconsistent ordering beyond the relaxation are recorded but do not trigger authoring; tested against fixture JSONL covering (a) exact-match length-2, (b) length-3+ with one skipped step, (c) longest-chain pick when a length-4 chain contains a length-3 sub-chain
  gate: false
  checked: true
- id: ac-03
  description: Agent authors a routine SKILL.md directly on recurring chain detection — given a chain at or above threshold (ac-02), when the agent detects the recurrence, then it writes .claude/skills/<auto-generated-name>/SKILL.md directly (no proposal artefact, no AskUserQuestion gate); the body describes the chain (sequence of /orb:<verb> references); the agent commits the file with a message naming the chain and the occurrence count (e.g. "feat(skills) draft .claude/skills/<name> from recurring chain — N occurrences"); tested by fixture-driven integration test that recurring chain produces SKILL.md at expected path with expected body shape
  gate: false
  checked: true
- id: ac-04
  description: Routine SKILL.md front-matter compliance — the agent-authored SKILL.md front-matter validates against card 0022's metadata convention (created_by agent, created_at as ISO timestamp, pinned false) plus this card's additive fields — last_verified (ISO timestamp) and chain_id (SHA-256 hex digest of the canonical JSON encoding of the ordered skill_id sequence — e.g. SHA-256 of `["/orb:tabletop","/orb:spec","/orb:implement"]`); the canonical JSON encoding is RFC 8785 / JCS or equivalent — sorted keys, no whitespace — so chain_id is byte-deterministic across sessions and across agents; the archive-state lookup in ac-09 is content-addressed (path-independent); verifiable by schema check against the front-matter on every agent write; card 0022's scenarios are not amended (the additive fields are permissive)
  gate: false
  checked: true
  ac_type: config
- id: ac-05
  description: v1 scope is sequential chains only — the agent detects and authors routines for strictly sequential chains of skill invocations (no branches, no parallelism — e.g. /orb:release style bump → commit → push → reload); DAG-shaped routines with branching, parallelism, or conditional skips (e.g. /orb:rally style fan-out) are out of v1 scope and tracked for a follow-up spec; AC-02's detection algorithm is chain-only; the routine SKILL.md body shape is chain-only; tested by fixture confirming that an observed fan-out pattern in the invocation stream is recorded but does NOT trigger routine authoring under v1
  gate: false
  checked: true
- id: ac-06
  description: last_verified write path lives in a dedicated verb — a new orbit routine verify <path> verb performs the resolve-check (every /orb:<verb> reference in the routine's SKILL.md body still resolves to a live skill) and on pass writes the verb's run timestamp to the routine's last_verified front-matter field; orbit audit conformance reads last_verified (per ac-07) but does NOT mutate it — the audit aggregator stays read-only; the verify verb is the only writer; the verb has explicit atomic-write semantics (read SKILL.md, mutate front-matter in memory, atomic rewrite) so concurrent audit + agent re-author don't corrupt; first write happens at routine authoring time (ac-03) via the same verb; tested by (a) mutating a referenced skill and verifying last_verified stops advancing, (b) confirming audit conformance does not modify SKILL.md content (byte-equal across two consecutive runs)
  gate: false
  checked: true
- id: ac-07
  description: Audit conformance finding family for stale or broken routines — orbit audit conformance emits a finding family with subsystem slug "routines" covering two state slugs — "stale" (last_verified older than 30 days) and "broken_refs" (one or more /orb:<verb> references in the routine body no longer resolves to a live skill); finding carries subject (routine path), evidence (stale-since timestamp or broken-refs list), severity medium, and remediation.verb ("orbit routine verify <path>" for stale, "archive via curator" for broken_refs); audit is read-only — does not mutate routines (per ac-06 split); tested against fixtures covering both state slugs
  gate: false
  checked: true
- id: ac-08
  description: Chain-skill authoring is distinct from single-skill authoring (card 0022) — routine-author code paths do not invoke 0022's skill-author spec ceremony, and 0022's skill-author flow does not trigger chain detection; the boundary is documented in both card 0013 and card 0022 references; tested by code-search (no cross-imports between routine-author and skill-author modules) plus the cross-reference being present
  gate: false
  checked: true
- id: ac-09
  description: Author lever is post-write discussion, not pre-write gate — committed routine SKILL.md is the artefact; author edits inline (file edit triggers next orbit routine verify run to update last_verified and refresh any drift state), or archives via card 0022's curator (curator moves to .archive/<slug>/); the chain-detection mechanism consults the curator state by chain_id (content-addressed, not path) — if a routine with the same chain_id (per ac-04) exists anywhere under .claude/skills/ or its .archive/ subtree, the agent does not re-author for the same chain in subsequent sessions; author rename of the routine directory does not break the lookup (chain_id stays the same); tested by fixture where (a) author archives a routine and the agent's next detection run on the same chain produces no write, (b) author renames a routine directory and the agent's next detection still recognises the chain as already-authored
  gate: false
  checked: true
- id: ac-10
  description: Post-ship drift soak — within 30 days of the first agent-authored routine landing in any orbit-using repo, the audit-driven verification mechanism has flagged a real drift event (component skill renamed, retired, or substrate evolved) AND the author confirms the flag was actionable (caught genuine staleness, not a false positive); if no drift event has occurred organically, this AC defers indefinitely; observation closure rationale captured in a spec.note
  gate: false
  checked: false
  ac_type: observation
