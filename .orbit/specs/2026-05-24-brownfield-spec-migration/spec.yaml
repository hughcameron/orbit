id: 2026-05-24-brownfield-spec-migration
goal: a project with N legacy spec.yaml files reaches `orbit verify` clean in one verb invocation; unknown fields are mapped onto canonical equivalents, dropped with a recorded migration disposition, or quarantined into a sidecar so semantic content isn't silently lost; the canonical strict-parse invariant (ac-01) is preserved unchanged
cards:
- 0032-brownfield-spec-migration
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: Verb reports planned changes before rewriting any file — every unknown field is listed with file path and proposed disposition (map / drop / quarantine), no file is rewritten, and the exit code signals whether a non-dry-run would change anything
  gate: true
  checked: true
- id: ac-02
  description: Unknown fields default to quarantine, not silent drop — the field's content lands in a sidecar (e.g. `spec.legacy.yaml` adjacent to spec.yaml) so a contributor can map it onto a canonical equivalent later — the substrate never silently destroys content
  gate: true
  checked: true
- id: ac-03
  description: Known-mapping fields migrate cleanly — the field is dropped or remapped per the registry rule, the disposition is recorded in the run summary, and the resulting spec.yaml parses canonically
  gate: false
  checked: true
- id: ac-04
  description: ac-01 strict parse is preserved — every spec.yaml parses against the canonical schema, no permissive-mode escape hatch persists in the substrate, and the strict-parse invariant from `orbit-state/crates/core/src/schema.rs` is intact
  gate: true
  checked: true
- id: ac-05
  description: Migration is brownfield-only, not part of routine verify — `orbit canonicalise --reconcile` is not invoked by `orbit verify`, not part of pre-commit hooks, and not part of /orb:setup's greenfield path — it is a mode invoked deliberately by the author or agent
  gate: false
  checked: true
- id: ac-06
  description: Mapping registry is extensible without re-shipping orbit-state — future `orbit canonicalise --reconcile` invocations apply the rule, and the registry's location and shape are discoverable from the verb's `--help` output
  gate: false
  checked: true
- id: ac-07
  description: Wired into the framework — orbit-state ships `orbit canonicalise --reconcile` alongside the existing routine `orbit canonicalise` pass, the /orb:setup skill's brownfield path invokes (or instructs the agent to invoke) this mode when legacy spec content is detected, and the canonical schema doc (card 0030) names this mode as the on-ramp from legacy field shapes — without these wires the card describes intent but the framework does not surface it
  gate: true
  checked: true
- id: ac-08
  description: reconcile_card_maturity Transform handler — maps `active → established` and `in_design → emerging` on Card.maturity per decisions.md D1+D2+D3+D4. Registered in FIELD_RULES as `(EntityType::Card, "maturity", Disposition::Transform(reconcile_card_maturity))`. Hard-coded two-value match (no project-local registry per D3); follows reconcile_ac_type's shape exactly
  gate: true
  checked: true
- id: ac-09
  description: 'Maturity value-routing matches the four-outcome contract per D2+D4 — canonical values (planned/emerging/established) pass through with the detail "canonical pass-through: <value>"; legacy values rewrite with "legacy rename: <from> -> <to>"; unknown strings quarantine with "unknown maturity value"; non-string shapes quarantine with "expected a string"'
  gate: false
  checked: true
- id: ac-10
  description: walk_and_classify extended to apply Transform rules to canonical top-level scalar fields — mirrors the recurse_inner pattern (per spec 2026-05-16-ac-taxonomy ac-06) at the top level via a new apply_top_level_transform helper. Without this extension, a Transform rule on a canonical top-level field like Card.maturity never fires (the previous walker only looked up registry rules for unknown keys). Verifiable by the existing `card_scenarios_inner_field_walked` test now reporting 2 dispositions (legacy_marker quarantine + maturity pass-through)
  gate: true
  checked: true
