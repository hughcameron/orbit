id: 2026-05-19-act-when-authorised
goal: agents in mid-session autonomy halt only when at least one of {recommendation, evidence, authorisation} is genuinely missing; the three-question test fires at every halt-temptation moment as the inverse of "consult the substrate first"
cards:
- 0042-act-when-authorised
status: closed
labels: []
acceptance_criteria:
- id: ac-01
  description: A PreToolUse hook at `plugins/orb/hooks/three-question-test.sh`, registered in `plugins/orb/hooks/hooks.json` against `AskUserQuestion`, prints the three substrate-typed questions (recommendation? evidence? contract authorisation?) to stderr. The hook is scope-gated — it only fires when `ORBIT_NONINTERACTIVE=1` AND a `.orbit/specs/<id>/drive.yaml` is present in the working tree; under those conditions it exits non-zero to suppress the halt and force the agent to either act or escalate via the structural NO-GO path. `plugins/orb/skills/drive/SKILL.md` carries a prose pointer to the same test.
  gate: true
  checked: true
- id: ac-02
  description: '`plugins/orb/skills/drive/SKILL.md` §1.6 contains a clarifying paragraph stating severity (LOW / MEDIUM / HIGH) is reviewer-language and does not change autonomy routing — REQUEST_CHANGES under guided autonomy is absorbed by the cycle budget regardless of severity. The D1 hook reinforces the same rule when it fires mid-cycle under guided / full autonomy with a non-APPROVE verdict.'
  gate: false
  checked: true
  ac_type: doc
- id: ac-03
  description: '`.orbit/STYLE.md` and `.orbit/cards/0026-executive-communication.yaml` each carry a paragraph distinguishing the closing-recommendation Decision Brief frame from the in-flight imperative-single-action form, with a back-reference to the three-question test as the structural enforcement.'
  gate: false
  checked: true
  ac_type: doc
- id: ac-04
  description: '`plugins/orb/skills/drive/SKILL.md` documents that pre-commit halts named in spec text apply only to the stage in which they were registered. The D1 hook prompts the agent (via question 3) to consult `drive.yaml` for the current stage; the stage-match is performed by the agent reading the prompt, not by hook logic.'
  gate: false
  checked: true
  ac_type: doc
- id: ac-05
  description: The D1 hook's question 3 ("Does the contract authorise me?") names three substrate sources — `drive.yaml.autonomy`, memory `mid-session-autonomy-contract-default-to-action-halt`, and the spec's `halt-conditions` — and treats presence of any one as load-bearing authorisation. The substrate-typed phrasing is reproduced verbatim in `plugins/orb/skills/drive/SKILL.md` so a human reading the skill sees the same rule the hook enforces.
  gate: false
  checked: true
