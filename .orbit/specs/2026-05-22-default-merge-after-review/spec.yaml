  disposition: not-applicable
  reason: memory governs the implementing-agent's behaviour when review-pr returns APPROVE with MEDIUM findings during a drive's spec implementation phase; this spec governs the post-APPROVE merge action itself, a distinct contract layer downstream of the review-pr verdict
