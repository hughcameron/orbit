hot_wash:
  # Meta-observations from the tabletop session itself, captured fresh
  # per card 0019 scenario 11.
  recurred:
    - Format integrity reframed mid-session from peer-of-five-values to
      substrate-of-the-others; the reframe rippled through every subsequent
      question
    - Defer-to-v0.2 discipline ran ~7 times during the session — strong
      brake against scope creep
    - Memo overflow surfaced twice (Q4 amendment + Q3 curator discussion);
      treated as a load-bearing operational rule, not a one-off
  surprised:
    - bd→tasks reframe at Q3 was load-bearing and instant; agent's initial
      cut would have been wrong in a way that wouldn't have surfaced until
      dogfood week
    - Estimate-inflation pushback at Q9 was the sharpest signal of the
      session; structural correction, not a quibble
    - Early-release notice at Q2 was a creative third option that softened
      the hardest trade-off (schema-as-public-API)
  friction:
    - Initial cards/choices "untouched" cut at Q3 was a values-elicitation
      miss — should have asked "what do you want to query/search?" earlier
    - Halt vs escalation distinction was fuzzy in tone; clarified as
      automatic-stop vs for-decision
    - Migration sequencing was implied (week 3-4) but not explicitly pinned
      until written into ac-12/13
  meta_patterns_for_future_tabletops:
    - Estimate-inflation guard captured as memory
    - Values reframes propagate; retrofit earlier answers when one lands
    - Methodology held under manual execution (no /orb:tabletop skill yet);
      future skill should automate structure, not change substance
    - Contract is mostly drafted by Q10; formal write-up is consolidation,
      not creation
    - Lateral-approach naming earned its place — without Q5, Option D would
      have been more tempting at Q9 budget pressure
    - AskUserQuestion tool would suit closing picks (Q6 four ambiguous
      things, Q9 budget options) but would have foreclosed the creative
      reframes at Q2/Q3/Q4. Hybrid pattern recommended.
    - Card 0026 (executive communication) governs deliverables, not
      working sessions. Within tabletop, 0026 applies to closing
      recommendations; opening questions and scenario walks legitimately
      diverge from 0026's anti-patterns.
