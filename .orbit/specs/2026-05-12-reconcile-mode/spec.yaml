id: 2026-05-12-reconcile-mode
goal: Extend `orbit canonicalise` with a `--reconcile` mode that brings legacy yaml content (across Card / Spec / Choice / Memory) into the canonical schema by renaming or dropping known fields per a built-in registry and quarantining unknown content into a per-file `<name>.legacy.yaml` sidecar — invokable any time, never on routine paths, with the ac-01 strict-parse invariant on every schema struct unchanged.
cards:
- 0032-brownfield-spec-migration
status: open
labels:
- spec
acceptance_criteria:
- id: ac-01
  description: The ac-01 strict-parse invariant is preserved end-to-end. `deny_unknown_fields` stays on every canonical schema struct in `orbit-state/crates/core/src/schema.rs`. `orbit verify`, the canonical reader on the routine `orbit canonicalise` path (without `--reconcile`), and every other entry point continue to reject unknown fields strictly. The permissive read introduced for `--reconcile` lives in a new module (`reconcile.rs`) and is reachable only when the flag is passed.
  gate: true
  checked: false
- id: ac-02
  description: '`orbit canonicalise --reconcile` rewrites canonical files by applying dispositions from a built-in registry in `reconcile.rs`. In v1 a `map` disposition means rename only — the legacy field name maps to a canonical field name and the value passes through unchanged; a `drop` disposition removes the field entirely. Value transforms (enum-value renaming, shape changes that move content between fields) are out of scope for v1; legacy fields that need value-level handling are classified `quarantine` per ac-04 and a follow-up spec teaches the registry the richer rule shape once a second project demands it. The run summary names every disposition applied (entity, file path, structural field path, action).'
  gate: false
  checked: false
- id: ac-03
  description: '`orbit canonicalise --reconcile --dry-run` lists every unknown field across the substrate by file path and proposed disposition (map / drop / quarantine); no file is rewritten. JSON output extends `run_canonicalise`''s existing hand-rolled envelope at `cli/src/main.rs:496-516` — top-level keys remain `{ok, dry_run, rewrote, unchanged, parse_failed}` and a new `dispositions: [{path, kind, field, action}]` array is appended, where `kind` is the entity type (`card` / `spec` / `choice` / `memory`) and `action` is `map` / `drop` / `quarantine`. Exit code signals whether a non-dry-run would change anything (non-zero when `dispositions` is non-empty).'
  gate: true
  checked: false
- id: ac-04
  description: 'Unknown fields without a registry rule default to quarantine, not silent drop. The permissive read classifies fields at every nesting level the canonical schema declares — top-level against `Card::FIELDS` / `Spec::FIELDS` / `Choice::FIELDS` / `Memory::FIELDS`, plus the list-of-struct inner fields: `Spec.acceptance_criteria[]` against `AcceptanceCriterion::FIELDS`, `Card.scenarios[]` against `Scenario::FIELDS`, `Card.relations[]` against `Relation::FIELDS`. Inner `FIELDS` constants are added to `schema.rs` mirroring the existing top-level pattern, each kept in lockstep with its struct via a unit test. Quarantined content lands in a sibling `<name>.legacy.yaml` adjacent to the canonical file — `.orbit/specs/<id>/spec.legacy.yaml` for specs, `.orbit/cards/<slug>.legacy.yaml` for cards, equivalent for choices and memories — and each entry records the structural path (e.g. `predecessor_evidence` for a top-level field, `acceptance_criteria[2].predecessor_evidence` for an inner field) and the original value so a human can re-anchor it. The substrate never silently destroys content.'
  gate: true
  checked: false
- id: ac-05
  description: '`--reconcile` operates across all four canonical entity types — Card, Spec, Choice, Memory — using the top-level and inner `FIELDS` constants from ac-04 as the allow-set per type. Registry rules are keyed by `(entity_type, structural_path, action)` where `structural_path` is the canonical field path (e.g. `version` for a top-level field, `acceptance_criteria[].predecessor_evidence` for an inner field). The default registry seeds entries for legacy fields encountered in the substrate today — `Spec.version` (drop), `Spec.date_opened` (drop), and the prose-shaped fields `Spec.predecessor_evidence` / `Spec.constraints` / `Spec.exit_conditions` (no rule; default quarantine per ac-04) — plus any bd-era legacy fields visible in `.orbit/archive/` that share the same disposition pattern.'
  gate: false
  checked: false
- id: ac-06
  description: The verb is idempotent. A clean tree → no-op (exit 0, empty disposition list). A tree where every unknown field has a registry rule → rewrite once, then re-running is a no-op. When a re-run discovers a new unknown field on a canonical file that already has a sibling sidecar, the sidecar is read, the new entry merged in, existing entries preserved unchanged, and the sidecar rewritten; existing-entry equality is checked at the parsed-`Value` level (not byte level) so trivial yaml whitespace differences do not trigger a rewrite. Idempotency holds for `--dry-run` and the non-dry-run path equally.
  gate: false
  checked: false
- id: ac-07
  description: '`--reconcile` is not invoked by `orbit verify`, by any pre-commit or post-commit hook in this repo, or by `/orb:setup`''s greenfield path — it is a mode the author or agent invokes deliberately. `orbit verify` continues to fail strictly on unknown fields when invoked without `--reconcile`, with no permissive escape hatch persisting in routine paths.'
  gate: false
  checked: false
- id: ac-08
  description: 'Framework wires land in the same spec — without these the verb exists but the framework does not surface it. (a) `/orb:setup`''s brownfield path gains a new §3g (after §3d''s `git mv` transaction completes the layout migration and the substrate is in shape under `.orbit/`) that invokes `orbit audit drift`, and when drift is non-empty offers the agent the path `orbit canonicalise --reconcile --dry-run` → confirm → `orbit canonicalise --reconcile`. (b) Card 0030 (canonical-schema-and-glossary) names `orbit canonicalise --reconcile` as the on-ramp from legacy field shapes to the canonical schema. (c) A new MADR choice file `.orbit/choices/0023-reconcile-as-canonicalise-mode.yaml` is authored and accepted, recording the surface decision (alternatives considered: separate verb, new verb wrapping canonicalise; chosen: mode on canonicalise) with reasoning drawn from this spec''s interview. The implementer re-checks the next free choice number before authoring and bumps if 0023 is taken by concurrent work. (d) Card 0032''s scenarios that reference the legacy verb name `orbit spec migrate-fields` are reworded against `orbit canonicalise --reconcile` and the card''s `specs` array is updated to reference this spec.'
  gate: true
  checked: false
