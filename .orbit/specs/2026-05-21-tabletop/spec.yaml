id: 2026-05-21-tabletop
goal: ship `/orb:tabletop` as the canonical pre-spec session for substantive R&D — goal-scoped, one-to-many in spec output, multi-card in scope — with the contract (values, trade-offs, halt conditions, escalation triggers, kill conditions, hot-wash) landing in a per-spec `tabletop.md` sidecar, and retire `/orb:design` once an ambiguity-floor probe shows parity-or-better against the existing design-skill output
cards:
- 0019-tabletop
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: '`plugins/orb/skills/tabletop/SKILL.md` exists and codifies the canonical 10-question methodology in declared order — Q1 goal narrowing, Q2 values, Q3 trade-offs (simplest way), Q4 failure modes (what could go wrong), Q5 lateral approaches, Q6 success criteria, Q7 escalation triggers, Q8 adjacent code, Q9 budget, Q10 kill conditions — plus a closing hot-wash debrief. Each question carries a role line (what it surfaces) and a stop condition (when the question is done). The 2026-05-07 dogfood at `.orbit/archive/specs/2026-05-07-orbit-state-v0.1/tabletop.md` is referenced inline as the worked example.'
  gate: true
  checked: false
  ac_type: doc
- id: ac-02
  description: 'SKILL.md prescribes that every open-mode or partial-mode tabletop session writes a `tabletop.md` sidecar per output spec at `.orbit/specs/<spec-id>/tabletop.md`. The sidecar carries six sections in declared order: values, trade-offs, halt conditions, escalation triggers, kill conditions, hot-wash. Markdown shape mirrors `.orbit/archive/specs/2026-05-07-orbit-state-v0.1/tabletop.md`. Closed-mode tabletop (ac-09) is exempt from this requirement and produces a `tabletop-note.md` instead — the two artefacts are mutually exclusive per session. No `Spec` schema change — `deny_unknown_fields` on the struct holds, and the substrate behaviour for tabletop-contract content lives outside `spec.yaml`. Choice file `tabletop-contract-sidecar` (see ac-12) records the rationale. Promoted to `gate: true` because this AC carries card 0019 scenario 5 (`Tabletop output is the contract, not the solution`).'
  gate: true
  checked: false
  ac_type: doc
- id: ac-03
  description: 'SKILL.md prose declares tabletop is one-to-many at the spec level — one session produces N specs, N >= 1. Each output spec is its own folder `.orbit/specs/<date>-<slug>/` carrying `spec.yaml` and `tabletop.md`. Each spec''s `cards:` array carries one or more entries (single-card specs are legal; cross-cutting specs list multiple). Each sidecar opens with a session preamble naming the cluster of cards in scope and pointing at sibling sidecars when N > 1, so the author can navigate the fan-out without losing visibility. Promoted to `gate: true` because this AC carries card 0019 scenarios 1 (`Tabletop is goal-scoped, taking one or more cards as input`) and 3 (`Multi-card tabletop spans related capabilities`).'
  gate: true
  checked: false
  ac_type: doc
- id: ac-04
  description: SKILL.md flow accepts goal-string input with no card list. On invocation with a bare goal string (e.g. `/orb:tabletop "ship X"`), the agent walks the card index, infers which cards the goal touches (best-effort — no specific algorithm pinned; substring match, semantic match, or operator-keyword scan are all acceptable), presents the inferred cluster in prose with one-line rationales per card, then fires AskUserQuestion to confirm or modify the cluster. The AUQ confirmation is the load-bearing safety valve — the inference need not be deterministic because the author edits before alignment work begins. Per card 0019 scenario 4.
  gate: false
  checked: false
  ac_type: doc
- id: ac-05
  description: SKILL.md opens with a trivial-skip advisory. When the work appears trivial (single-line change, typo fix, single-AC scope), the skill surfaces a prose nudge — `"this looks trivial; direct /orb:spec is recommended"` — but does NOT refuse to continue. The operator chooses to proceed or fall back. Per card 0019 scenario 10. The advisory is prose, not AUQ.
  gate: false
  checked: false
  ac_type: doc
- id: ac-06
  description: SKILL.md enforces actionable shape on halt conditions, escalation triggers, and kill conditions. (1) Halt conditions must name a measurable trigger AND a revert path — "drop below X with revert path Y", not "things go wrong" or "halt and reassess". (2) Escalation triggers must name condition + state snapshot to surface + proposed action — not "ask Hugh if confused" or "I'm stuck". (3) Kill conditions must name the specific load-bearing claim being killed AND a named pivot path. Rejected phrasings are listed inline as anti-patterns. Per card 0019 scenarios 8 and 9.
  gate: false
  checked: false
  ac_type: doc
- id: ac-07
  description: 'SKILL.md directs the scenario walk (Q4 failure modes, Q5 laterals) to past run-logs before resorting to imagined scenarios. The prose names the sources: each card''s `specs[]` array, `.orbit/archive/specs/`, prior `progress.md` files. Imagined scenarios that survive are explicitly flagged in the sidecar with an `[imagined]` marker, so the implementing agent knows which scenarios are evidence-backed vs hypothetical. Per card 0019 scenario 7.'
  gate: false
  checked: false
  ac_type: doc
- id: ac-08
  description: 'SKILL.md pins the AUQ-prose hybrid pattern per question. Prose for opening / reframable questions where amendments and creative reframes carry the value: Q1 goal narrowing, Q2 values, Q3 trade-offs, Q4 failure modes, Q5 lateral approaches, Q8 adjacent code. AskUserQuestion for closing picks where the value is "which one": Q6 success criteria confirmation, Q7 escalation confirmation, Q9 budget option selection (with the inflation-guard recut applied per the 2026-05-07 dogfood — agent estimates divided by ~3 before treating as planning input), Q10 kill-condition confirmation. The goal-string cluster confirmation in ac-04 also uses AUQ at the closing pick. Trivial-skip advisory (ac-05) is prose. AUQ-refusal fallback: if the author rejects all offered options with a custom response that reframes the question itself (rather than picking an option), the agent treats the response as a return-to-prose signal and re-walks that question''s prose phase.'
  gate: false
  checked: false
  ac_type: doc
- id: ac-09
  description: 'SKILL.md ports `/orb:design`''s §3 design-space pre-flight (open / closed / partial classification) and §4 closed-mode design-note path. When an associated choice file in `.orbit/choices/` pins the approach (status accepted) AND prior specs build on the pattern, tabletop produces a one-screen `tabletop-note.md` (mirroring `/orb:design`''s design-note shape) instead of running the full 10-question methodology. The note carries: What good looks like, Pinned approach (choice + prior specs), Deferred items, Implementation notes. Closed-mode tabletop preserves the contract-not-solution rule from choice 0017. Ordering with ac-04 goal-string entry: design-space classification runs AFTER the AUQ cluster confirmation — the agent first locks the card scope (ac-04), then assesses whether any associated choice pins the approach within that scope (ac-09).'
  gate: false
  checked: false
  ac_type: doc
- id: ac-10
  description: 'An ambiguity-floor probe runs before any `/orb:design` retirement step under ac-11. The probe artefact at `.orbit/specs/2026-05-21-tabletop/ambiguity-floor-probe.md` carries BOTH ambiguity scores using the canonical `/orb:spec` §2 formula `ambiguity = 1 - (goal * 0.40 + constraints * 0.30 + criteria * 0.30)` — lower is less ambiguous, the ≤0.2 floor is the project-wide bar: (1) the baseline — a retroactive ambiguity score computed against a recent closed spec produced via `/orb:design` interview path, picked from those with an `interview.md` on disk (candidates include 2026-05-20-style-md-plugin-shipping, 2026-05-19-act-when-authorised, 2026-05-19-skills-infer-or-prompt-before-halt; the prober picks one and names it in the artefact). The 2026-05-21-session-start-priority-synthesis spec is NOT eligible — it shipped via promote.sh and has no interview sidecar. (2) The tabletop score — a fresh tabletop session opened against a suitable card (candidate: card 0013-playbook-fast-path or card 0014-default-merge-after-review, both planned + ready-for-design at the time of writing), scored the same way. Both scoring passes run in a fresh context-separated agent — mirroring `/orb:review-spec`''s pattern — and neither pass shares context with the agent that implemented `/orb:tabletop` SKILL.md or ran the fresh tabletop session. Parity-or-better (tabletop ambiguity ≤ baseline ambiguity) is GO; tabletop ambiguity worse (higher) than baseline is NO-GO. Both scores, per-axis breakdowns, the chosen baseline spec, and a one-line GO/NO-GO call land in the probe artefact. ac-11 is gated on GO. On NO-GO, the implementing agent files `.orbit/memos/<date>-tabletop-nogo.md` capturing the gap analysis, then surfaces the decision via AskUserQuestion — three picks, the gap analysis as the question body, option (a) re-design as the default: (a) re-design tabletop and re-run the probe, (b) accept parallel `/orb:tabletop` + `/orb:design` operation indefinitely and update METHOD.md to document both paths, or (c) revert ac-01..ac-09 and revisit card 0019.'
  gate: false
  checked: false
  ac_type: observation
- id: ac-11
  description: '`/orb:design` retirement cascade lands ONLY after ac-10 returns GO. Scope is the agent-facing live surface: SKILL.md files, METHOD.md, the conformance engine, project `CLAUDE.md`, README. Historical artefacts (cards, choices, memos, conventions, prior spec records) keep their `/orb:design` references as-is — they are dated context, not live agent prose. Cascade steps: (1) `plugins/orb/skills/design/SKILL.md` removed (whole directory). (2) Every `/orb:design` reference in tracked SKILL.md and project-instruction files becomes `/orb:tabletop` or is rewritten for the new shape — the canonical detection at implement time is `rg -l "/orb:design" plugins/orb/skills/*/SKILL.md CLAUDE.md`, with the resulting file list edited in turn. In project `CLAUDE.md`, the narrative pipeline phrase `card → design → spec → implement → review pipeline` on line 3 is also rewritten — bare `design` in the pipeline narrative is in scope even though the canonical grep on `/orb:design` does not surface it. (3) METHOD.md pipeline diagram AND narrative `/design` references updated across all three real copies: `orbit-state/crates/core/canonical/METHOD.md` (the canonical / `include_str!` source), `plugins/orb/skills/setup/METHOD.md` (the setup-skill-seeded copy), `.orbit/METHOD.md` (the project copy). The pipeline diagram updates from `memo → distill → card → design → spec → ...` to `memo → distill → card → tabletop → spec → ...`. Beyond the diagram, narrative references at line 14 (drive description: `one agent runs design → spec → implement → review-pr`) and line 62 (`spec via /design + /spec`) are rewritten to name `/orb:tabletop` or the new flow shape. Detection: `rg "(/orb:)?design|/design" .orbit/METHOD.md` returning only intentional uses (e.g. line 82''s "design choice" noun phrase stays — context disambiguates). The three copies must remain byte-identical (existing conformance gate); identical edit lands in all three. (4) Conformance engine at `orbit-state/crates/core/src/verbs.rs` updated across five categories: (4a) `remediation.verb` format string — emits `/orb:tabletop <numeric-id>` in place of `/orb:design <numeric-id>` (line ~3836); (4b) state slug `ready_for_design` renamed to `ready_for_tabletop` at all five sites (docstring enum ~line 1138, assignment ~line 3833, test assertion ~line 9957, test comment ~line 10026, parked-card-skip comment ~line 3803), AND the downstream consumer at `plugins/orb/skills/prioritise/SKILL.md` (line ~77) which ties state-based remediation to the slug; (4c) topology pointer at ~line 4193 (`operational_doc: vec!["plugins/orb/skills/design/SKILL.md".into()]`) rewritten to `plugins/orb/skills/tabletop/SKILL.md`; (4d) body strings + docstrings (e.g. `"use orbit memory match before /orb:design"`, `/// /orb:design <numeric-id>`) updated; (4e) test fixtures and helper function names — `install_spec_for_warnings(..., design_note: Option<&str>)` parameter, `spec_close_topology_warnings_match_in_design_note_only` function name, and `skill_id: "design"` literals — renamed to the tabletop equivalents. The `record_invocation(&layout, "design", ...)` test fixtures that record historical invocations of the `design` skill-id may be left as historical accuracy OR renamed to `tabletop` — implementing agent picks and names the disposition in the cascade commit. The audit''s `rationale` text updates from `card has scenarios but no design pass` to the tabletop equivalent. `cargo test -p orbit-state` runs green after all five categories are swept. (5) README updated — the mermaid flowchart node `Design["/design"]` becomes `Tabletop["/orb:tabletop"]`; the skills-table row for `/design` becomes `/orb:tabletop`; the narrative prose references to `/design` are rewritten as `/orb:tabletop` or the new flow shape. Detection is `rg "(/orb:)?design" README.md` returning only intentional uses (e.g. the choice-file MADR description if any). (6) `/orb:spec` SKILL.md updated: the `design-note.md` filename references on line 20 (`or a short **design note** (\`design-note.md\`) from a closed design space`) and line 90 (`or design-note.md for closed-space inputs`) are rewritten as `tabletop-note.md`; `verbs.rs` sidecar scan-set in `spec.close`''s topology-warning path (~lines 890, 1993, 2034) updated to match. Filename consistency between ac-09''s closed-mode output and `/orb:spec`''s closed-space input is preserved post-cascade. (7) `orbit audit conformance --json` runs clean post-cascade (no plugin-canonical-file drift; no stale references — implementing agent re-runs `rg "(/orb:)?design|design-note|ready_for_design" plugins/orb/skills/*/SKILL.md CLAUDE.md README.md orbit-state/crates/core/src/verbs.rs .orbit/METHOD.md` and confirms only intentional references remain). Atomicity: the six cascade steps land as a single commit (or a tight commit series within one PR). On partial failure mid-cascade (e.g. `cargo test` fails at step 4), the implementing agent rolls back the working tree with `git restore .` and re-attempts the cascade as a whole — half-cascaded state is not a checkpoint.'
  gate: true
  checked: false
  ac_type: doc
- id: ac-12
  description: 'Two MADR choice files written under `.orbit/choices/` (next free ids drawn at implement time). (1) `tabletop-replaces-design` — landed with status `proposed` during implement (alongside ac-01..ac-09); promoted to `accepted` after ac-10 returns GO and the ac-11 cascade lands. On ac-10 NO-GO with option (c) revert, the proposed choice is removed in the same revert pass. Body names: the v1 `/orb:design` failure mode (drift to implementation, captured in choice 0017 context), the alternatives considered (heavyweight tier alongside design, multi-card variant only), the chosen shape (full replacement conditional on ambiguity-floor parity), and the ac-10 probe as the gating mechanism. (2) `tabletop-contract-sidecar` — landed with status `accepted` directly because the sidecar shape ships unconditionally regardless of ac-10 outcome. Body names: the schema-extension alternative (rejected — widens substrate API; `deny_unknown_fields` change has blast radius), the AC-fold alternative (rejected — loses contract distinctness from the AC list), the chosen sidecar shape, the 2026-05-07 dogfood pattern as precedent, and the per-spec sidecar location convention. Both choices cite choice 0017 (`tabletop-output-is-contract`) as the load-bearing antecedent — 0017 pins the contract-not-solution rule that survives the retirement, and the two new choices extend its framing rather than supersede it. Both choices cite this spec and card 0019.'
  gate: false
  checked: false
  ac_type: doc
