id: 2026-05-09-orbit-method-md
goal: Create canonical .orbit/METHOD.md (vocabulary, pipeline, substrate rules, four pillars, BLUF/Decision Brief reference, card-vs-choice discrimination) and wire /orb:setup to copy it into projects + append @.orbit/METHOD.md to CLAUDE.md; audit the existing Mandatory Workflow / Session Completion section so rules are either substrate-baked into METHOD.md or sharpened to project-specific git discipline
cards:
- 0017-setup-is-bead-aware
status: open
labels:
- spec
- setup
- vocabulary
acceptance_criteria:
- id: ac-01
  description: 'A canonical METHOD.md template lands at `plugins/orb/skills/setup/METHOD.md` — the source of truth that /orb:setup copies into projects. Content covers (in this order): one-line ''what orbit is'', the orbit pipeline (memo → distill → card → design → spec → implement → review-pr; rally / drive variants), the artefact vocabulary table (card / spec / choice / memo / interview / progress / review / drive state / rally state) with paths and one-line definitions, the card-vs-choice-vs-spec-vs-memo decision tree (including the new card-vs-choice discrimination from spec 2026-05-09-card-vs-choice-discrimination), substrate rules (orbit verbs not TodoWrite, `orbit session prime` at session start, `orbit memory remember` not MEMORY.md), the four pillars (compressed to single-screen, mirroring CLAUDE.md), and a one-line BLUF / Decision Brief reference pointing at .orbit/STYLE.md as the prose contract. Single screen target — if it overflows, the table is the trimmable section.'
  gate: true
  checked: false
- id: ac-02
  description: 'METHOD.md carries a top-of-file ''How to update'' line: ''This file is generated by /orb:setup from plugins/orb/skills/setup/METHOD.md. To customise per-project, edit in place; to refresh from canonical, re-run /orb:setup (which prompts before overwriting local edits).'' This makes the relationship between the canonical template and the project copy legible.'
  gate: false
  checked: false
- id: ac-03
  description: '/orb:setup SKILL.md §6 is rewritten end-to-end: instead of the inline "Snippet to append" markdown block (currently embedded in the SKILL.md), §6 (a) copies METHOD.md from `plugins/orb/skills/setup/METHOD.md` to `.orbit/METHOD.md` in the project, (b) ensures the project''s CLAUDE.md contains an `@.orbit/METHOD.md` line (idempotent: if the line is already present anywhere in the file, no-op; otherwise append it under a single ''## Orbit method'' marker heading), (c) on re-run, if the project''s `.orbit/METHOD.md` differs from the canonical, prompt before overwriting (preserving local edits unless the author confirms refresh). The current "Workflow (orbit)" / "Orbit vocabulary" / "Current Sprint" inline blocks are removed from SKILL.md — METHOD.md is the single source of truth.'
  gate: true
  checked: false
- id: ac-04
  description: 'Card 0017''s scenarios are amended to reflect the new richer priming. Specifically: the "Greenfield setup creates .orbit/ layout..." scenario''s `then` clause is updated from "writes the CLAUDE.md vocabulary block" to "writes `.orbit/METHOD.md` and ensures CLAUDE.md @-imports it". A new scenario is added for the idempotency / drift-detection behaviour described in ac-03(c). The card stays maturity:planned until the spec ships.'
  gate: true
  checked: false
- id: ac-05
  description: 'The orbit repo dogfoods its own setup output: the orbit-repo CLAUDE.md is rewritten to use the @-import pattern. Sections that move to METHOD.md (substrate-shaped — vocabulary, decision tree, pipeline, substrate rules, four pillars, key concepts) are deleted from CLAUDE.md and replaced by `@.orbit/METHOD.md`. Sections that stay inline in orbit-repo CLAUDE.md (repo-specific): the ''# orbit'' intro paragraph, ''Working in This Repo'' (skill paths etc.), ''Deployment'', and any audit-survivor of ''Session Completion'' (per ac-06).'
  gate: true
  checked: false
- id: ac-06
  description: 'The existing orbit-repo CLAUDE.md ''Session Completion'' / ''Mandatory Workflow'' section is audited rule-by-rule. Each rule is classified into one of: (a) **substrate-shaped, baked into orbit verbs** (e.g. "File tasks for remaining work" is `orbit task open`; "Update task status" is `orbit task done`) — deleted from CLAUDE.md, summarised in METHOD.md''s substrate-rules section; (b) **project-specific git/CI discipline** (e.g. "git push is mandatory") — kept as a tight 1-3 line block in orbit-repo CLAUDE.md only; (c) **stale orbit-era process** — deleted entirely. The audit decisions are recorded as a spec note before the edits land. Net result: the standalone "Session Completion" section is either absorbed into METHOD.md / orbit verbs, or shrinks to the load-bearing git-push one-liner — it does not sit adjacent and stale.'
  gate: true
  checked: false
- id: ac-07
  description: 'A smoke test under `plugins/orb/scripts/tests/` runs /orb:setup-equivalent steps against a synthetic empty project under a temp directory. Asserts: (a) `.orbit/METHOD.md` is created with content matching the canonical template byte-for-byte on first run, (b) `CLAUDE.md` contains exactly one `@.orbit/METHOD.md` line after first run, (c) re-running setup is idempotent — no duplicate import line, no METHOD.md content drift, no prompt fired (because the file matches canonical), (d) modifying the project''s `.orbit/METHOD.md`, then re-running setup, fires the drift prompt (test confirms the prompt path exists; doesn''t need to interact with it).'
  gate: false
  checked: false
- id: ac-08
  description: 'A spec note records the load-bearing principle uncovered by this work: orbit-shaped rules (substrate vocabulary, agent self-learning, state-persistence, pipeline shape, BLUF prose contract) belong in METHOD.md (the substrate distillation downstream projects @-import); project-specific repo discipline (git push, CI gates, branch naming, CLAUDE.md repo intro) stays in project CLAUDE.md. This is the discrimination rule for "what goes in METHOD.md vs project CLAUDE.md" so future audits don''t re-derive it.'
  gate: false
  checked: false
