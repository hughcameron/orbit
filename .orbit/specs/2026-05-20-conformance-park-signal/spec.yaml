id: 2026-05-20-conformance-park-signal
goal: 'Conformance audit honours an explicit park: block on the Card schema — parked cards (with free-form reason: and until: subfields) are excluded from the ready_for_design card-state finding, while non-park cards continue to fire the existing rule. Mechanism is the explicit-schema-field path per the design session (chosen over a parked maturity value and over a notes-prefix convention). Scope is shape 2 only (deliberate-hold cards); shape 1 (stale field from spec.close not bumping maturity or populating specs[]) is deferred to its own spec. Envelope visibility for parked cards is silent in v1 — no per-card findings, no aggregated count slot — matching the "stop nagging" intent literally. Intent contract in interview.md.'
cards:
- 0039-workflow-conformance
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: 'ParkSignal struct + optional Card.park field + Card::FIELDS extension. orbit-state/crates/core/src/schema.rs gains a `pub struct ParkSignal { pub reason: String, pub until: String }` with `#[serde(deny_unknown_fields)]` and a FIELDS const `["reason", "until"]` (matching the existing schema-struct pattern in the file). Card struct gains `pub park: Option<ParkSignal>` with `#[serde(default, skip_serializing_if = "Option::is_none")]` so cards without a park block stay byte-identical on disk after a round-trip. Card::FIELDS const is extended with `"park"` so `audit drift` does not flag the field as unknown. Both `reason` and `until` are non-empty when present — empty-string is a parse error (use `serde` validation or a deserialize_with helper consistent with the file''s existing patterns). Canonical writer emits the park block in declaration order between the existing fields its position implies; cards without `park` produce byte-identical output to pre-change. v1 has no CLI verb for setting/clearing park — operator edits the YAML directly.'
  gate: true
  checked: true
  verification: 'Unit tests under orbit-state/crates/core/src/schema.rs (or a sibling tests module). (a) Card YAML with no `park:` field parses, round-trips through canonical writer to byte-identical output. (b) Card YAML with `park: {reason: "x", until: "y"}` parses, round-trips byte-identical. (c) Card YAML with `park: {reason: "", until: "y"}` fails to parse with an empty-string error. (d) Card YAML with `park: {reason: "x"}` (missing until) fails to parse with a missing-field error. (e) Card YAML with `park: {reason: "x", until: "y", extra: "z"}` fails to parse with an unknown-field error (deny_unknown_fields). (f) Card YAML with a top-level unknown field still triggers audit drift (Card::FIELDS extension didn''t accidentally loosen the existing check) — but a card with `park:` populated produces zero drift entries. Run `cargo test -p orbit-state-core schema::card` and assert all cases pass. Invoke `orbit verify` against a fixture .orbit/ containing a parked card and assert clean (zero drift).'
- id: ac-02
  description: 'audit_conformance card-state walk skips parked cards. orbit-state/crates/core/src/verbs.rs audit_conformance — in the card-state finding branch (currently `if card.maturity == Maturity::Planned && card.specs.is_empty()`) — adds the carve-out: cards where `card.park.is_some()` do NOT fire the ready_for_design finding, regardless of maturity or specs[] state. No new finding is emitted for parked cards (silent — matches the implementation-notes recommendation in interview.md). Aggregated audit results (drift, topology) and other finding families (memo staleness, plugin-canonical drift) are unaffected. The carve-out is applied to the card-state family only.'
  gate: true
  checked: true
  verification: 'Unit test matrix on the card-state walk (extend the existing test fixtures for ac-02 of 2026-05-19-workflow-conformance). (a) Card at maturity planned + empty specs + no park → finding fires (existing behaviour preserved). (b) Card at maturity planned + empty specs + `park: {reason, until}` → no finding (new carve-out). (c) Card at maturity emerging + park → no finding (maturity check is upstream, park irrelevant). (d) Card at maturity planned + non-empty specs + park → no finding (specs check is upstream, park irrelevant). (e) Multiple cards: one parked, one not — only the non-parked card produces a finding; parked card produces no envelope trace. (f) Other finding families (memo staleness, plugin-canonical drift) continue to fire when applicable on a fixture that also contains a parked card. CLI + MCP parity test covers a fixture with one parked card and one planned-empty-non-park card — assert byte-identical JSON between `orbit audit conformance --json` from the CLI and the MCP tools/call response.'
- id: ac-03
  description: '/orb:card SKILL.md surfaces the park: field. The card-authoring skill at plugins/orb/skills/card/SKILL.md gains prose naming the optional `park:` block — when to use it (deliberately holding a card from the conformance audit''s card-state finding), what to put in `reason:` (free-form prose explaining the hold), what to put in `until:` (free-form prose naming the unhold condition — e.g. "N=2 evidence", "cluster synthesis", a date), and how to unpark (remove the block). The prose names the carve-out''s scope (card-state finding only; other audits unaffected) and the v1 limitation (free-form until — no automated unpark on date or spec-id).'
  gate: true
  checked: true
  verification: 'Grep plugins/orb/skills/card/SKILL.md for `park:` (literal field name) AND assert that within the SAME section (the contiguous prose block under the markdown header where the field first appears) all four documented claims appear: (a) when to use — phrase matching "deliberate" or "hold" or "parked"; (b) reason: shape — phrase matching "free-form" or "prose" or an example string; (c) until: shape — phrase matching "free-form" or "condition" or an example string; (d) how to unpark — phrase matching "remove" or "delete" or "unpark". Assert no claim that the audit fires on date / spec-id resolution (those are not in v1 scope).'
  ac_type: doc
- id: ac-04
  description: 'Conformance prose documents the parked carve-out. The skill that surfaces the conformance verb to agents — plugins/orb/skills/setup/SKILL.md (currently §6e where the verb is named) and/or plugins/orb/skills/setup/METHOD.md (the substrate-rules paragraph that mentions `orbit audit conformance`) — names parked cards as a deliberate carve-out from the card-state `ready_for_design` finding. The prose tells the agent reading findings: cards with a `park:` block produce no envelope trace under the card-state family; this is by design. Cross-link to /orb:card''s park field documentation (ac-03) so an agent encountering the carve-out can navigate to the authoring side.'
  gate: true
  checked: true
  verification: 'Grep plugins/orb/skills/setup/SKILL.md and plugins/orb/skills/setup/METHOD.md for `park` (case-insensitive) in the conformance-prose section. Assert at least one of the two files names the carve-out within the conformance prose block, with phrasing matching: (a) which finding family is affected — "card-state" or "ready_for_design"; (b) what parked cards produce — "no finding" or "silent" or "no envelope" or "excluded"; (c) a pointer to /orb:card or to the park field documentation. Assert no claim that parked cards produce a low-severity finding or an aggregated count (those would contradict ac-02''s silent posture).'
  ac_type: doc
memories_considered:
- key: spec-close-does-not-bump-card-maturity
  disposition: partially-adopted
  reason: memory identifies a sibling false-positive source (~4 of 14 cards in the observed session — shape 1, stale field). This spec does not adopt the memory's mechanism (auto-bump at spec.close); shape 1 deferred to its own spec. Park-signal alone leaves shape-1 false positives in place until that spec ships.
- key: feedback-card-vs-choice-distinction
  disposition: adopted
  reason: park-signal is a spec-level extension to existing card 0039, not a new card or new MADR choice. Mechanism selection (explicit schema field) is borderline choice-shaped but small enough to live in the spec rather than a separate MADR record.
- key: design-implementation-filter-on-envelope-shape
  disposition: adopted
  reason: envelope visibility for parked cards (silent vs aggregated count vs low-severity finding) was routed to implementation notes with a silent-by-default recommendation rather than asked at design time — the question was implementation-shaped (severity enum values, envelope keys) once intent was settled on the schema field.
