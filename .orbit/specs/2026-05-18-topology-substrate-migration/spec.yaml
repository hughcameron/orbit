id: 2026-05-18-topology-substrate-migration
goal: Migrate topology from docs/topology.md markdown doc to per-subsystem yaml under .orbit/topology/, per choice 0025. Preserves substrate-engagement envelopes (session-prime topology_drift, spec.close topology_warnings) shipped under spec 2026-05-18-topology-substrate-wires; replaces the markdown parser with structural yaml validation; rewrites /orb:topology skill and §6d setup scaffolding; ships a one-shot migration verb. Intent contract and pinned approach in design-note.md.
cards:
- 0040-documentation-topology
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: TopologyEntry schema + .orbit/topology/ layout. orbit-state/crates/core/src/schema.rs gains a TopologyEntry serde struct with FIELDS const (mirroring Card / Choice / Spec schema shape); field set includes subsystem name (key, slug-shaped, ≥ 5 chars to honour the existing word-boundary heuristic threshold), canonical_code (path or paths), decision_record (optional choice id or path), operational_doc (optional path), test_surface (optional path or list). Layout::topology_dir() returns .orbit/<layout>/topology/; new scanner method list_topology_files() returns each <subsystem>.yaml in that dir, mirroring list_card_files / list_choice_files. verify_all extends with a topology-entry branch that round-trips every file through serde::from_str → canonical writer → serde and fails on drift. Schema tests cover the round-trip path, deny-unknown-fields, missing-required-field, and the slug-shape constraint on subsystem name.
  gate: true
  checked: false
  verification: Grep schema.rs for TopologyEntry struct and FIELDS const. Run `cargo test -p orbit-state-core schema::topology` and assert the round-trip / unknown-field / missing-field tests pass. Invoke `orbit verify` on a fixture .orbit/topology/ dir with a well-formed entry and assert clean; invoke against a fixture with a drifted entry (added unknown field) and assert verify catches it.
- id: ac-02
  description: audit_topology parser swap — markdown to per-file yaml. orbit-state/crates/core/src/verbs.rs::audit_topology replaces the existing markdown-doc parser (which reads docs.topology→single file and scans headers/lists) with a per-file yaml parser that reads each .orbit/topology/<subsystem>.yaml via TopologyEntry serde. Existing TopologyDriftEntry shape preserved for envelope continuity (per spec 2026-05-18-topology-substrate-wires ac-02/ac-03 contract); drift detection becomes structural — missing_field, unknown_field, and dangling_pointer (canonical_code path does not exist) join or supersede the current stale_pointer / missing_entry / shape_drift taxonomy. The canonical predicate audit_topology(...).configured flips from "docs.topology set in config + file exists" to ".orbit/topology/ directory exists and is non-empty" (or equivalent — pinned in spec implementation). CLI + MCP parity tests cover the new envelope shape across configured-clean, configured-drift, and unconfigured states.
  gate: true
  checked: false
  verification: Grep verbs.rs::audit_topology for the per-file yaml parse path; assert markdown header-scanning code is removed (or quarantined behind the migration verb in ac-05). Run parity tests in orbit-state/crates/cli/tests/parity.rs and orbit-state/crates/mcp/tests/parity.rs covering audit topology against fixtures (clean substrate, drifted entry with unknown field, dangling canonical_code pointer, unconfigured repo). Run a session prime against a fixture and confirm topology_drift envelope still populates with the new parser (regression net for ac-02 of the predecessor spec).
- id: ac-03
  description: /orb:topology skill rewrite. plugins/orb/skills/topology/SKILL.md write/read/audit modes rewritten for per-file yaml editing. Write-mode operates on one .orbit/topology/<subsystem>.yaml at a time (Write tool against the canonical path). Read-mode loads one file by subsystem key (Read tool against the canonical path). Audit-mode invokes `orbit audit topology` against the substrate verb. Skill prose names the per-file shape as canonical and removes references to the single markdown doc. SKILL.md cites choice 0025 as the architectural pin.
  gate: false
  checked: false
  verification: Grep plugins/orb/skills/topology/SKILL.md for the three modes (write/read/audit) and the canonical path .orbit/topology/<subsystem>.yaml. Assert references to docs/topology.md are removed or quarantined. Assert SKILL.md cites choice 0025. Invoke /orb:topology write-mode against a scratch subsystem and assert the file lands at .orbit/topology/<subsystem>.yaml with the canonical schema.
  ac_type: doc
- id: ac-04
  description: 'Wiring rewire — config key fate, §6d scaffolding, envelope continuity. Two decisions land in this AC: (a) docs.topology config key drops entirely (convention beats config — cards/choices/specs/memories have no pointer key, topology shouldn''t either); the DocsConfig struct in orbit-state and the .orbit/config.yaml schema lose the topology field; setup-topology.sh stops writing the config entry. (b) setup-topology.sh creates .orbit/topology/ as an empty directory (or seed file — pinned in implementation) instead of docs/topology.md stub; the byte-compare-and-prompt voice of §6b applies — prompt fires when .orbit/topology/ is absent; idempotent on a wired repo. The /orb:setup SKILL.md §6d prose updates to the new shape. Session-prime topology_drift envelope and spec.close topology_warnings envelope continue to populate against the new parser — covered by parity tests (regression net for ac-02 + ac-03 of the predecessor spec).'
  gate: true
  checked: false
  verification: Grep orbit-state for DocsConfig::topology — assert absent (or repointed if option (a) reverses). Grep .orbit/config.yaml — assert docs.topology key absent. Invoke setup-topology.sh in a scratch greenfield repo and assert .orbit/topology/ directory exists; re-invoke and assert idempotent (no prompt). Run a session prime against a fixture with a drifted topology entry and assert topology_drift envelope still populates. Run spec close on a fixture spec naming a touched subsystem and assert topology_warnings still populates. Parity tests on CLI + MCP cover the envelopes.
- id: ac-05
  description: 'Migration verb — orbit topology migrate-layout. Idempotent one-shot CLI + MCP verb that reads docs/topology.md if present, parses entries with the legacy markdown parser (preserved for migration-only use; not exposed via audit_topology after this spec), writes one .orbit/topology/<subsystem>.yaml per entry via the canonical writer, deletes the source docs/topology.md when all entries migrate successfully. Reports per-entry success/skip/fail counts in the response envelope. Safe to re-run: if docs/topology.md is absent, returns no-op envelope; if .orbit/topology/<subsystem>.yaml already exists for an entry, skips that entry (does not overwrite). Parity test on CLI + MCP covers the present-and-absent cases.'
  gate: false
  checked: false
  verification: Invoke `orbit topology migrate-layout` in a scratch repo with a populated docs/topology.md and assert per-subsystem yamls land at .orbit/topology/, docs/topology.md is deleted, envelope reports the migration counts. Re-invoke and assert no-op envelope (idempotent). Invoke in a scratch repo without docs/topology.md and assert no-op. Invoke in a scratch repo where .orbit/topology/<existing>.yaml already exists for one of the entries and assert the entry is skipped (existing file unchanged). Parity test on CLI + MCP confirms envelope shape.
