id: 2026-05-18-topology-substrate-migration
goal: Reshape topology from a single docs/topology.md markdown doc into per-subsystem yaml under .orbit/topology/, per choice 0025. Preserves substrate-engagement envelopes (session-prime topology_drift, spec.close topology_warnings) shipped under spec 2026-05-18-topology-substrate-wires; replaces the markdown parser with structural yaml validation; rewrites the /orb:topology skill; ports setup-topology.sh into an orbit topology setup Rust verb per choice 0020 that scaffolds a self-describing seed (one entry per .orbit/ entity type). No data-migration verb is shipped — the just-shipped capability has zero adopters and there is no existing topology.md to import. Intent contract and pinned approach in design-note.md; pending-decision answers from the 2026-05-18 partial-mode design pass are captured in acceptance_criteria below.
cards:
- 0040-documentation-topology
status: open
labels: []
acceptance_criteria:
- id: ac-01
  description: TopologyEntry schema + .orbit/topology/ layout. orbit-state/crates/core/src/schema.rs gains a TopologyEntry serde struct with FIELDS const (mirroring Card / Choice / Spec schema shape); field set is subsystem (required, slug-shaped key, ≥ 5 chars to honour the existing word-boundary heuristic threshold), canonical_code (required, list of paths — list-valued per design pass Q2; subsystems typically span multiple files), decision_record (optional, list of choice ids or paths), operational_doc (optional, list of paths — most subsystems have one SKILL.md but the list shape is uniform), test_surface (optional, list of paths or test-target identifiers). Layout::topology_dir() returns the canonical .orbit/topology/ path; new scanner method list_topology_files() returns each <subsystem>.yaml in that dir, mirroring list_card_files / list_choice_files. verify_all extends with a topology-entry branch that round-trips every file through serde::from_str → canonical writer → serde and fails on drift. Schema tests cover the round-trip path, deny-unknown-fields, missing-required-field (subsystem, canonical_code), the slug-shape constraint on subsystem name, and the ≥ 5 char length constraint.
  gate: true
  checked: false
  verification: Grep schema.rs for TopologyEntry struct and FIELDS const. Run `cargo test -p orbit-state-core schema::topology` and assert the round-trip / unknown-field / missing-field / slug-shape / length tests pass. Invoke `orbit verify` on a fixture .orbit/topology/ dir with a well-formed entry and assert clean; invoke against a fixture with a drifted entry (added unknown field, missing required field, wrong-type pointer) and assert verify catches each case.
- id: ac-02
  description: audit_topology parser swap — markdown to per-file yaml. orbit-state/crates/core/src/verbs.rs::audit_topology replaces the existing markdown-doc parser (which reads docs.topology→single file and scans headers/lists) with a per-file yaml parser that reads each .orbit/topology/<subsystem>.yaml via TopologyEntry serde. Existing TopologyDriftEntry envelope shape preserved for parity continuity with spec 2026-05-18-topology-substrate-wires ac-02/ac-03 — the envelope shape is the contract floor; the drift-code vocabulary inside the envelope is the implementer's call (replace stale_pointer/missing_entry/shape_drift with structural codes, alias them, or extend — design-pass Q4 routes this to implementation). The canonical predicate audit_topology(...).configured returns true iff .orbit/topology/ directory exists AND contains ≥ 1 entry (populated == configured per design-pass Q1). CLI + MCP parity tests cover the new envelope shape across configured-clean (dir exists + ≥ 1 entry, no drift), configured-drift (dir + entries + at least one drifted entry), and unconfigured (dir absent or empty) states.
  gate: true
  checked: false
  verification: Grep verbs.rs::audit_topology for the per-file yaml parse path; assert markdown header-scanning code is removed. Run parity tests in orbit-state/crates/cli/tests/parity.rs and orbit-state/crates/mcp/tests/parity.rs covering audit topology against fixtures (clean substrate, drifted entry with unknown field, dangling canonical_code pointer, unconfigured repo with absent dir, unconfigured repo with empty dir). Run a session prime against a fixture with drift and confirm topology_drift envelope still populates with the new parser (regression net for ac-02 of the predecessor spec). Assert configured returns false against an empty .orbit/topology/ directory.
- id: ac-03
  description: /orb:topology skill rewrite. plugins/orb/skills/topology/SKILL.md write/read/audit modes rewritten for per-file yaml editing. Write-mode operates on one .orbit/topology/<subsystem>.yaml at a time (Write tool against the canonical path; subsystem-slug validation per ac-01 schema). Read-mode loads one file by subsystem key (Read tool against the canonical path). Audit-mode invokes `orbit audit topology` against the substrate verb. Skill prose names the per-file shape as canonical and removes references to the single markdown doc. SKILL.md cites choice 0025 as the architectural pin.
  gate: false
  checked: false
  verification: Grep plugins/orb/skills/topology/SKILL.md for the three modes (write/read/audit) and the canonical path .orbit/topology/<subsystem>.yaml. Assert references to docs/topology.md are removed or quarantined. Assert SKILL.md cites choice 0025. Invoke /orb:topology write-mode against a scratch subsystem and assert the file lands at .orbit/topology/<subsystem>.yaml with the canonical schema.
  ac_type: doc
- id: ac-04
  description: Wiring rewire — config key drop + envelope continuity. docs.topology config key drops entirely (convention beats config — cards/choices/specs/memories have no pointer key, topology shouldn't either); the DocsConfig struct in orbit-state and the .orbit/config.yaml schema lose the topology field. /orb:setup SKILL.md §6d prose updates to the new shape (no docs.topology mention; invokes the topology setup verb from ac-05). Session-prime topology_drift envelope and spec.close topology_warnings envelope continue to populate against the new parser — covered by parity tests (regression net for ac-02 + ac-03 of the predecessor spec).
  gate: true
  checked: false
  verification: Grep orbit-state for DocsConfig::topology — assert absent (field removed from the struct). Grep .orbit/config.yaml schema docs — assert docs.topology key documented as removed. Grep plugins/orb/skills/setup/SKILL.md §6d — assert references to docs/topology.md and docs.topology are removed; assert the new Rust verb is named. Run a session prime against a fixture with a drifted topology entry and assert topology_drift envelope still populates. Run spec close on a fixture spec naming a touched subsystem and assert topology_warnings still populates. Parity tests on CLI + MCP cover the envelopes.
- id: ac-05
  description: '`orbit topology setup` Rust verb — replaces setup-topology.sh per choice 0020. New `orbit topology setup` CLI + MCP verb that scaffolds the topology substrate: creates the .orbit/topology/ directory (idempotent), then writes a self-describing seed (per design-pass Q1) — one TopologyEntry per .orbit/ entity type (cards, choices, specs, memories, topology itself), each pointing at the orbit-state schema struct (canonical_code), the relevant choice (decision_record), the writing SKILL.md (operational_doc), and the schema tests (test_surface). The seed is universal across any orbit-using repo: every consumer has the same .orbit/<dir>/ structure. Existing .orbit/topology/<entity>.yaml files are skipped (does not overwrite operator-edited seeds). plugins/orb/scripts/setup-topology.sh is deleted (and its bash test plugins/orb/scripts/tests/test-setup-topology.sh); /orb:setup §6d invokes `orbit topology setup` directly via Bash tool. The §6d byte-compare-and-prompt voice still applies: prompt fires when .orbit/topology/ is absent or empty; idempotent on a populated repo.'
  gate: false
  checked: false
  verification: Invoke `orbit topology setup` in a scratch greenfield repo and assert .orbit/topology/ directory exists and contains the seed templates (one per .orbit/ entity type — cards, choices, specs, memories, topology). Assert each seed entry round-trips through the canonical writer (orbit verify clean after invocation). Re-invoke and assert idempotent (no prompt; existing files unchanged). Modify one seed entry and re-invoke; assert the modified entry is preserved (skip-on-exist, not overwrite). Assert plugins/orb/scripts/setup-topology.sh and plugins/orb/scripts/tests/test-setup-topology.sh are deleted. Grep plugins/orb/skills/setup/SKILL.md §6d for the new verb invocation. Parity test on CLI + MCP confirms envelope shape.
