  ## What could go wrong

  The riskiest failure mode is `Session.distillate` containing the raw JSON envelope (`{"session_id":"...","hook_event_name":"Stop","last_assistant_message":"..."}`) instead of just this prose. That would mean ac-05's `extract_distillate_from_stdin` failed to recognise the envelope shape — either Claude Code changed the envelope structure since the implementation, or there's a subtle bug in the structural detection. If you see that, **don't write the sign-off memory** — file a memo capturing the observed envelope shape vs the expected `last_assistant_message` extraction, and reopen ac-05 as a follow-up spec.

  The second risk is `.session-card` not being deleted — that means the Stop hook's `rm -f` clause didn't fire. Most likely cause: `orbit session distill` exited non-zero (e.g., couldn't find the schema, permission error), and the `&& rm -f` chain short-circuited. The hook then falls through `|| true` so the session itself isn't blocked, but the runtime files stick around. If you see this, check the distill exit code in isolation: `echo '{}' | orbit session distill; echo "exit: $?"`.

  Third risk: the `handover` field in prime is empty. That would mean the prime envelope's `handover` wiring didn't read the latest session correctly. Less likely than the first two — the unit tests for ac-07 (`prime` envelope) covered the "find latest session across all cards" logic. But if it triggers, check `orbit spec list` and confirm at least one session yaml exists under `.orbit/sessions/`.

