goal: >
  Ensure implementing agents read the spec and track acceptance criteria before
  and during implementation, preventing the failure mode where agents treat the
  codebase as ground truth and miss spec-prescribed patterns.

constraints:
  - The /orb:implement skill MUST read the spec before any code is written
  - Hard constraints from in-flight specs MUST be injected at SessionStart even
    if the agent never invokes /orb:implement
  - The progress file MUST use ac-NN IDs that match the spec exactly
  - Unspecced decisions MUST surface as decision checkpoints, never silent choices
  - The pre-flight phase (steps 1-3) MUST NOT modify source code — it only reads
    the spec and writes progress.md. Implementation (step 4) then proceeds normally.

acceptance_criteria:
  - id: ac-01
    description: >
      /orb:implement reads the spec YAML, extracts all acceptance criteria and
      constraints, and presents them as a numbered checklist before any
      implementation begins.
    verification: >
      Invoke /orb:implement with a test spec containing 5 ACs and 3 constraints.
      Verify the checklist is printed with all 8 items before any file edits occur.

  - id: ac-02
    description: >
      A progress file is written to .orbit/specs/<topic>/progress.md containing the
      extracted checklist with status markers (pending/done).
    verification: >
      After /orb:implement runs, verify progress.md exists with the correct
      format and all items marked pending.

  - id: ac-03
    description: >
      When the agent completes a unit of work addressing an AC, it updates the
      progress file to mark that AC as done with a brief note of what was done.
    verification: >
      Simulate completing ac-01 and ac-03 of a 5-AC spec. Verify progress.md
      shows those two as done and the remaining three as pending.

  - id: ac-04
    description: >
      When the agent encounters a codebase gap (something the spec prescribes
      but the code doesn't yet have), it implements what the spec says rather
      than working around the missing code.
    verification: >
      Provide a spec that references a pattern not in the codebase. Verify the
      agent creates the pattern rather than substituting an existing one.

  - id: ac-05
    description: >
      When the agent encounters a decision not covered by the spec, it pauses
      and presents structured options using AskUserQuestion rather than choosing
      silently.
    verification: >
      Provide a spec with an intentional gap. Verify the agent asks for a
      decision rather than proceeding.

  - id: ac-06
    description: >
      The SessionStart hook extracts constraints from the in-flight spec and
      includes them in the session context output.
    verification: >
      Create a spec with 3 constraints in .orbit/specs/<topic>/spec.yaml. Start a new
      session. Verify session-context.sh output includes all 3 constraints.

  - id: ac-07
    description: >
      Hard constraints are visible in session context even if /orb:implement is
      never invoked — the SessionStart hook is sufficient.
    verification: >
      Start a session without invoking /orb:implement. Verify the constraints
      from the in-flight spec appear in the session context output.

  - id: ac-08
    description: >
      /orb:review-pr can read the progress.md file to cross-reference AC
      coverage against the implementation checklist.
    verification: >
      Run /orb:review-pr after an implementation that used /orb:implement.
      Verify the review references the progress file and reports alignment.

deliverables:
  - path: plugins/orb/skills/implement/SKILL.md
    description: >
      New skill definition for /orb:implement. Reads a spec path argument,
      extracts ACs and constraints, writes progress.md, and instructs the
      agent to track completion during implementation.

  - path: plugins/orb/scripts/session-context.sh
    description: >
      Extended SessionStart script. After existing status logic, parse the
      in-flight spec.yaml for constraints: entries and print them as
      "Hard constraints:" lines in the session context.

  - path: plugins/orb/skills/implement/progress.md.template
    description: >
      Template for the progress tracking file showing the expected format.

progress_file_format: |
  # Implementation Progress

  **Spec:** .orbit/specs/<topic>/spec.yaml
  **Started:** YYYY-MM-DD

  ## Hard Constraints
  - [ ] <constraint text>

  ## Acceptance Criteria
  - [ ] ac-01: <description>
  - [ ] ac-02: <description>
  - [x] ac-03: <description> — <brief note of what was done>

evaluation_principles:
  - principle: "Spec fidelity — does the agent follow the spec, not the codebase?"
    weight: 0.4
  - principle: "Visibility — are constraints and progress always observable?"
    weight: 0.3
  - principle: "Integration — does it compose with review-pr and SessionStart?"
    weight: 0.3

exit_conditions:
  - All 8 ACs pass verification
  - session-context.sh correctly extracts constraints from a real spec
  - /orb:review-pr can consume progress.md without modification

risk_tier: STANDARD

