goal: "All orbit workflow artefacts (cards, specs, decisions, discovery) live under a single top-level orbit/ folder. /orb:setup creates orbit/ on greenfield and migrates bare directories interactively on brownfield via a single all-or-nothing prompt. Every skill, script, hook, and shipped artefact in this repo references orbit/<subdir>/ paths — a grep for bare artefact paths against any tracked file returns zero hits."

constraints:
  - "Migration is a single all-or-nothing prompt. Brownfield setup detects all bare orbit dirs, prompts once (y/n), and moves them all via git mv or aborts. No per-directory partial states."
  - "Migration lives inside /orb:setup. No separate /orb:migrate-layout skill. The brownfield branch of setup IS the downstream migration story."
  - "Rewrite scope is total. Every tracked file that references bare cards/|specs/|decisions/|discovery/ paths — including shipped review-pr-*.md and progress.md files with quoted evidence — gets rewritten. The migration commit is the audit record that paths used to be bare."
  - "orbit/ is a hardcoded folder name. Not configurable. Not overridable. One convention, one path."
  - "No top-level designs/ folder. Design artefacts continue to live inside <spec_dir>/ per rally SKILL.md §4a/§6a and /orb:design."
  - "This spec does not bundle the specs-array-prose-enforcement memo (cards/memos/2026-04-20-specs-array-prose-enforcement-gap.md). That work stays on its own track."
  - "Setup remains idempotent. Running /orb:setup on an already-migrated repo produces no changes and no duplicated CLAUDE.md snippet."
  - "session-context.sh gate switches from `-d \"specs\" || -d \"cards\"` to `-d \"orbit\"`. Projects without orbit/ get silence, same as today."
  - "Migration uses git mv (not mv + git add) so history is preserved."
  - "cards/memos/ moves to .orbit/cards/memos/ as part of the cards/ move. Hook memo scan path updates accordingly."

acceptance_criteria:
  - id: ac-01
    ac_type: code
    description: "On a greenfield repo (no bare orbit dirs, no orbit/ folder), /orb:setup creates orbit/ with cards/, specs/, and decisions/ subdirectories. discovery/ is not created at setup time — it remains created ad-hoc by /orb:discovery, but under .orbit/discovery/ when it appears."
    verification: "Run /orb:setup in an empty dir; assert orbit/, .orbit/cards/, .orbit/specs/, .orbit/choices/ exist; assert no bare cards/, specs/, decisions/, discovery/ at repo root."

  - id: ac-02
    ac_type: code
    description: "On a brownfield repo with any of bare cards/, specs/, decisions/, or discovery/ at the root, /orb:setup detects the bare dirs and presents a single all-or-nothing confirmation prompt naming the detected dirs."
    verification: "Run /orb:setup in a repo with bare cards/ and specs/; assert a single prompt appears naming both dirs; assert no migration occurs until the prompt is answered."

  - id: ac-03
    ac_type: code
    description: "When the author confirms the brownfield prompt, /orb:setup moves all detected bare dirs under orbit/ using git mv, preserving history. All four dirs move in one transaction."
    verification: "In a git repo with bare cards/ and specs/ tracked, confirm the prompt; assert .orbit/cards/ and .orbit/specs/ exist; assert `git log --follow .orbit/cards/*.yaml` includes the pre-migration history; assert no bare cards/ or specs/ at root."

  - id: ac-04
    ac_type: code
    description: "When the author declines the brownfield prompt, /orb:setup aborts with no filesystem changes and no partial state. The bare dirs remain at the root."
    verification: "Decline the prompt; assert `git status --porcelain` unchanged; assert bare dirs unchanged."

  - id: ac-05
    ac_type: code
    description: "On an already-migrated repo (orbit/ exists, no bare dirs at root), /orb:setup produces no filesystem changes and does not duplicate the CLAUDE.md snippet. The brownfield-then-idempotent sequence also no-ops on the second run: migrate a brownfield repo → immediately re-run /orb:setup → second invocation is the same no-op as a clean already-migrated repo."
    verification: "Run /orb:setup twice in succession on an already-migrated repo; assert second run makes no changes; assert CLAUDE.md contains exactly one `## Workflow (orbit)` marker. Also run the brownfield-then-idempotent sequence: bare dirs → /orb:setup + confirm → /orb:setup again; assert the second run is a no-op (idempotent path, not brownfield path)."

  - id: ac-06
    ac_type: code
    description: "Greenfield and post-migration CLAUDE.md snippet names orbit/ as the artefact location and references .orbit/cards/, .orbit/specs/, .orbit/choices/."
    verification: "Run /orb:setup; grep CLAUDE.md for '.orbit/cards', '.orbit/specs', '.orbit/choices'; assert no bare 'Artifacts live in cards/' phrase remains."

  - id: ac-07
    ac_type: code
    description: "plugins/orb/scripts/session-context.sh gates on `-d \"orbit\"` (not `-d \"specs\" || -d \"cards\"`). On repos with no orbit-related state it exits silently. On repos where a legacy layout is detected (any of bare cards/, specs/, decisions/, discovery/ at the root AND no orbit/ present) the hook emits a single one-line nudge directing the user to /orb:setup — and does not attempt to parse legacy state. This closes the silent-hook window between `/plugin update` and the user's next /orb:setup run."
    verification: "grep the gate lines in session-context.sh; run the hook on (a) a repo with neither orbit/ nor bare dirs and assert exit 0 with no output, (b) a repo with orbit/ and assert the full hook fires as today, (c) a repo with only bare dirs and assert exactly one line of the form 'orbit: legacy layout detected. Run /orb:setup to migrate.' is emitted."

  - id: ac-08
    ac_type: code
    description: "plugins/orb/scripts/session-context.sh scans .orbit/cards/memos, .orbit/specs, .orbit/cards/*.yaml for outstanding memos, active drives, and active rallies. All path references inside the script resolve under orbit/."
    verification: "grep session-context.sh for bare 'cards/', 'specs/', 'decisions/', 'discovery/' — zero hits outside orbit/-prefixed contexts. Smoke-test the hook on a migrated repo and confirm memo + rally + drive detection still work."

  - id: ac-09
    ac_type: code
    description: "plugins/orb/scripts/rally-coherence-scan.sh references paths under orbit/ (or path-agnostic locations). No bare artefact-dir references remain."
    verification: "grep the script for bare 'cards/|specs/|decisions/|discovery/' — zero hits."

  - id: ac-10
    ac_type: doc
    description: "Every plugins/orb/skills/*/SKILL.md file that references artefact paths uses orbit/<subdir>/ form. The 18 files surfaced by the audit are all rewritten."
    verification: "grep -E '(^|[^/a-z])(cards|specs|decisions|discovery)/' plugins/orb/skills/*/SKILL.md — zero hits (modulo documentation of legacy layout if any; that would be called out explicitly)."

  - id: ac-11
    ac_type: doc
    description: "plugins/orb/skills/implement/progress.md.template references orbit/-prefixed paths in any example path strings."
    verification: "grep the template for bare artefact paths — zero hits."

  - id: ac-12
    ac_type: gate
    description: "This repo itself is migrated. After the spec's PR lands, /home/hugh/github/hughcameron/orbit/ has no top-level cards/, specs/, decisions/, or discovery/ directory; the same trees exist under orbit/. git history is preserved via git mv."
    verification: "ls /home/hugh/github/hughcameron/orbit/ returns no bare artefact dirs; ls orbit/ returns cards/, specs/, decisions/, discovery/; `git log --follow .orbit/cards/0001-memos.yaml` shows pre-migration history."

  - id: ac-13
    ac_type: gate
    description: "Across the entire tracked repo after migration, a grep for bare artefact paths returns zero hits modulo an explicit allow-list. Scope includes all skills, scripts, hooks, cards, specs, decisions, progress files, review artefacts, CLAUDE.md, README.md, and CHANGELOG.md. Shipped review-pr-*.md and progress.md files with historical evidence blocks are rewritten — the migration commit is the audit record. Allow-list (hits expected and accepted): (a) this spec's review artefacts that quote bare paths as findings being addressed, (b) CHANGELOG.md entries that name legacy paths when describing the migration itself, (c) cards/memos/2026-04-20-specs-array-prose-enforcement-gap.md if retained for historical reference, (d) inside plugins/orb/skills/setup/SKILL.md where the brownfield detector literally names bare paths as the thing it looks for."
    verification: "Run: git ls-files -z | xargs -0 rg -n -t md -t yaml -t sh -t json -e '(^|[^/A-Za-z0-9_])(cards|specs|decisions|discovery)/' — assert every hit falls under the allow-list in the description. Use `git ls-files` (not `rg` alone) so only tracked files are in scope. The negative character class covers digits, underscores, and letters on both cases to avoid false-negatives on paths like `_cards/`."

  - id: ac-14
    ac_type: code
    description: "cards/memos/ (outstanding and linked memos) moves to .orbit/cards/memos/ as part of the cards/ move. The hook's memo scan path updates to match."
    verification: "assert .orbit/cards/memos/ exists and contains the pre-migration memo files; assert session-context.sh scans .orbit/cards/memos; smoke-test: the outstanding memo 2026-04-20-specs-array-prose-enforcement-gap.md still surfaces on SessionStart."

  - id: ac-15
    ac_type: doc
    description: "README.md reflects the new layout. Any section describing where cards, specs, or decisions live names orbit/<subdir>/."
    verification: "grep README.md for bare 'cards/' etc. at the start of a path — zero hits; grep for '.orbit/cards' — at least one hit."

  - id: ac-16
    ac_type: doc
    description: "CHANGELOG.md documents the refactor: the new layout, the /orb:setup brownfield behaviour, and the rewrite-everything evidence-fidelity trade-off."
    verification: "grep CHANGELOG.md for a new entry referencing the refactor; assert it names the brownfield prompt, the git mv mechanism, and the fact that shipped evidence blocks were rewritten."

  - id: ac-17
    ac_type: code
    description: "plugin.json / .claude-plugin/plugin.json is unchanged by the refactor (the plugin source layout under plugins/orb/ does not move — only artefacts move)."
    verification: "git diff main -- .claude-plugin/plugin.json returns no path-related changes."

  - id: ac-18
    ac_type: gate
    description: "No top-level designs/ directory exists at any point during or after the refactor. This AC is a negative check codifying the card-level note."
    verification: "assert no designs/ at repo root before or after migration; grep the entire refactor PR for any newly-introduced top-level 'designs/' directory — zero hits."

  - id: ac-19
    ac_type: gate
    description: "Downstream migration works: a separate orbit-using repo that installs this plugin version and runs /orb:setup receives the interactive brownfield prompt and completes the migration. Verified post-ship on the next real downstream upgrade."
    verification: "Post-ship: run /orb:setup on the first downstream repo to upgrade; record the prompt text, confirm outcome, and cross-reference the verification in this spec's progress.md. Deferred execution is expected."

  - id: ac-20
    ac_type: code
    description: "Dirty-tree handling is explicit: /orb:setup does NOT refuse on a dirty working tree during brownfield migration (the author chose option 1 over option 3 during design). If `git status --porcelain` is non-empty, setup proceeds with the migration. SKILL.md documents this behaviour so it is not rediscovered as an ambiguity."
    verification: "grep plugins/orb/skills/setup/SKILL.md for an explicit statement about dirty-tree handling; assert the word 'dirty' or 'uncommitted' appears with a deliberate-choice explanation."

  - id: ac-21
    ac_type: code
    description: "Mixed-state refusal: if /orb:setup detects that orbit/ already exists AND at least one bare artefact dir (cards/, specs/, decisions/, discovery/) is also present at the root, setup refuses the migration with a clear error naming each colliding pair (e.g. '.orbit/cards exists and bare cards/ also exists — resolve manually before re-running /orb:setup'). No filesystem changes. This preserves the all-or-nothing model by treating inconsistent pre-existing state as out-of-contract rather than attempting silent reconciliation."
    verification: "Construct a repo with both .orbit/cards/ and bare cards/ present; run /orb:setup; assert exit with a non-zero status or explicit refusal message naming the collision; assert `git status --porcelain` is unchanged from pre-invocation."

  - id: ac-22
    ac_type: code
    description: "Untracked-files handling during brownfield migration: `git mv` only moves tracked files. Before running git mv, setup captures `git status --porcelain -- <bare-dirs>` and collects any untracked paths in the migration scope. Setup proceeds with the migration (per ac-20's dirty-tree choice) and, after migration, reports untracked paths by name in its completion message so the author knows the bare dirs may still exist at root containing untracked residue. This prevents silent violations of ac-12 from orphaned untracked files."
    verification: "Construct a brownfield repo with an untracked file inside bare cards/; run /orb:setup + confirm; assert the completion message names the untracked file; assert the migrated .orbit/cards/ contains all tracked files; assert the author has actionable information about the residue. If no untracked files exist in scope, the completion message is quiet about residue (no false alarms)."

  - id: ac-23
    ac_type: doc
    description: "Rewrite scope explicitly includes cards/*.yaml scenario bodies, cards[].specs arrays, decisions/*.md content, and inter-spec cross-references. While ac-13 catches these via grep, this AC names them explicitly so the implementer does not miss them during manual review and so downstream specs do not rediscover the scope question."
    verification: "Post-migration: assert cards/0001-memos.yaml and any other card scenario text references .orbit/cards/memos; assert every card's specs: array entries are .orbit/specs/... form; assert decisions/*.md that cite spec paths use .orbit/specs/... form; grep decisions/ for any bare artefact path and cross-check against ac-13's allow-list."

  - id: ac-24
    ac_type: code
    description: "The migration commit is a single commit titled 'orbit: migrate artefacts under orbit/ folder' (or equivalent) that contains the `git mv` operations AND the sed rewrites for path references in one atomic commit. This commit serves as the audit record that bare paths used to exist. Splitting the move and the rewrites across multiple commits would break git blame/log --follow for reviewers tracing artefact history."
    verification: "After shipping, assert the refactor landed as a single commit (or a clearly-labelled sequence where the git mv commit is the first and all rewrites follow in the same PR) such that `git log --follow .orbit/cards/0001-memos.yaml` produces an unbroken history through the rename."

ontology_schema:
  name: "OrbitArtefactLayout"
  description: "The target filesystem layout for orbit workflow artefacts and the migration operation that produces it. Models what setup reads, what it writes, and the contract with the session-start hook."
  fields:
    - name: "orbit_root"
      type: "string"
      description: "Fixed literal 'orbit'. The single top-level folder containing all workflow artefacts. Not configurable."
    - name: "subdirs"
      type: "list[string]"
      description: "Fixed set: ['cards', 'specs', 'decisions', 'discovery']. cards/ and specs/ are created by setup; decisions/ by setup; discovery/ created ad-hoc by /orb:discovery. memos/ is a nested subdir under cards/."
    - name: "setup_mode"
      type: "enum[greenfield, brownfield, idempotent, mixed]"
      description: "greenfield: no orbit/ and no bare dirs → create orbit/ fresh. brownfield: bare dirs present, no orbit/ → detect + prompt + git mv. idempotent: orbit/ exists, no bare dirs → no-op. mixed: orbit/ AND at least one bare dir both present → refuse with clear collision error (ac-21). The four states are mutually exclusive and together cover the 2x2 of (orbit/ present?) × (any bare dir present?)."
    - name: "migration_prompt"
      type: "object"
      description: "Single all-or-nothing confirmation. Fields: detected_dirs (list), confirmed (bool), outcome (migrated | aborted)."
    - name: "git_mv_transaction"
      type: "object"
      description: "One-shot migration. Fields: source_paths (list), target_parent ('orbit'), preserved_history (bool — must be true). Failure in any sub-move rolls the transaction back."
    - name: "hook_gate"
      type: "string"
      description: "The session-context.sh directory check. Before: `-d \"specs\" || -d \"cards\"`. After: `-d \"orbit\"`. The hook exits silently on non-orbit repos."
    - name: "claude_md_snippet"
      type: "string"
      description: "The prose block setup appends to CLAUDE.md. Names .orbit/cards, .orbit/specs, .orbit/choices as artefact locations. Guarded by the `## Workflow (orbit)` marker for idempotency."

evaluation_principles:
  - principle: "Full rewrite completeness — no bare artefact paths survive in any tracked live file"
    weight: 0.30
  - principle: "Migration atomicity — all-or-nothing; git mv preserves history; aborted runs leave no residue"
    weight: 0.20
  - principle: "Setup idempotency across greenfield, brownfield, and already-migrated states"
    weight: 0.20
  - principle: "Hook + skill consistency — every reader resolves paths under orbit/"
    weight: 0.15
  - principle: "Downstream migration ergonomics — one skill invocation completes the upgrade"
    weight: 0.15

exit_conditions:
  - "All code-type and doc-type ACs verified pre-merge (grep + smoke test)"
  - "All gate-type ACs verified pre-merge EXCEPT ac-19, which is explicitly deferred post-ship (see deferred_commitments)"
  - "/orb:review-spec returns APPROVE, or REQUEST_CHANGES findings are addressed"
  - "This repo is migrated on main: orbit/ contains the four subdirs; no bare artefact dirs at root; git history preserved via git mv (ac-24)"
  - "/orb:review-pr on the implementation PR returns APPROVE"

deferred_commitments:
  - ac_id: ac-19
    description: "Downstream migration verified on the first real downstream /orb:setup invocation post-ship"
    tracking_location: "specs/2026-04-20-orbit-artefact-folder/progress.md under 'Deferred Verification'"
    reason: "Cannot be tested against a hypothetical future downstream repo without a dedicated fixture; the cost of a fixture outweighs the risk when the migration logic is already exercised by ac-02/ac-03 on this repo itself"

