key: taskcreate-allowed-not-banned
body: 'TaskCreate is ALLOWED for in-session work in this repo as of commit d0cc831 (METHOD.md:75): ''Use orbit task open / claim / update / done for cross-session task tracking — anything that must outlast the session, sync via git, or attach to a spec. TaskCreate is fine for in-session working structure; mirror to orbit task only when the task needs to persist.'' Important context: this rule has CHANGED in this repo. Pre-d0cc831, METHOD.md read ''Use orbit verbs for ALL task and spec tracking — do NOT use TodoWrite, TaskCreate, etc.'' Agents citing the prior prohibition were correctly reading the substrate at that point in time. The shifting rule means citation discipline matters — see code-investigate SKILL.md''s ''Cite the substrate, don''t paraphrase'' principle: include <file>:<line> and quoted text, and if the rule may have shifted, run ''orbit audit conformance --json'' first to check plugin_canonical_file_drift. How to apply: when planning multi-step work, use TaskCreate freely for in-session tracking; only reach for orbit task when work must survive the session, sync via git, or attach to a spec. If you encounter an agent or memory citing the prior prohibition, the citation is stale, not wrong-at-time-of-writing.'
