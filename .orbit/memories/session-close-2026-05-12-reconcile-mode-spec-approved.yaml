key: session-close-2026-05-12-reconcile-mode-spec-approved
body: |-
  Session shipped orbit 0.4.11 (binary + brew + plugin cache aligned end-to-end) and designed + spec'd card 0032 brownfield-spec-migration. Spec landed at .orbit/specs/2026-05-12-reconcile-mode/ with cycle-1 REQUEST_CHANGES → cycle-2 APPROVE. Three commits on main: 961e6ed (spec open), b045006 (cycle-1 response), cfcb278 (cycle-2 verdict). Pushed.

  Key reframe captured in interview: card 0032 entered as 'spec migrate-fields' (one-shot bridge mirroring migrate-layout). Hugh reframed as continuous reconciliation — 'adjusting to the spec', not migration — moving the surface from a new verb to 'orbit canonicalise --reconcile'.

  Spec carries 8 ACs (4 gating: ac-01 strict-parse preserved, ac-03 dry-run shape, ac-04 sidecar default + inner-shape recursion, ac-08 framework wires). v1 disposition expressiveness deliberately narrowed to rename-only + drop; value transforms (enum-rename, shape-change) deferred to follow-up spec and route via quarantine. Inner-shape recursion is the load-bearing AC-04 commitment — adds AcceptanceCriterion::FIELDS / Scenario::FIELDS / Relation::FIELDS to schema.rs mirroring the existing top-level pattern at schema.rs:52-92, kept in lockstep with structs via unit test. The dry-run JSON envelope extends run_canonicalise's existing hand-rolled shape at cli/src/main.rs:496-516 (NOT audit drift's — audit drift has no dry-run mode, AuditDriftArgs is empty).

  ac-08 is a four-part umbrella easy to half-finish at end of long implement session: (a) /orb:setup brownfield §3g insertion point after §3d git mv; (b) card 0030 (canonical-schema-and-glossary) names --reconcile as on-ramp; (c) author choice 0023-reconcile-as-canonicalise-mode (re-check next free choice number before writing); (d) reword card 0032 scenarios that use 'migrate-fields' verb name + update card's specs array. Implement pre-flight should list these four sub-bullets explicitly.

  Four LOW findings from cycle-2 review to surface in PR description (no spec edits): (1) ac-03 non-dry-run exit code defaults to existing run_canonicalise parse-failures-only contract; (2) ac-05 registry key is (entity_type, structural_path) → action, not 3-tuple key; (3) ac-05 '.orbit/archive/' is implementer research input not walk target; (4) ac-04 partial-write ordering reuses atomic.rs sidecar-then-canonical.

  Release-flow side-discoveries worth flagging for future /orb:release runs: (a) /orb:release skill is configured to run as a claude-sonnet-4-6 subagent which fails to launch when session context exceeds sonnet's 200K standard window — skill body falls back to inline execution in the main session, functionally equivalent but no subagent isolation. (b) Marketplace cache at ~/.claude/plugins/marketplaces/orbit had remote pointing at hughcameron/orbit despite the meridian-online repo move; retargeted to git@github.com:meridian-online/orbit.git this session. installed_plugins.json orb@orbit entry was frozen at 0.4.8 (last update 2026-05-10) because the cache remote couldn't fetch — fixed by reset --hard origin/main + cp -r marketplaces/orbit/plugins/orb → cache/orbit/orb/0.4.11 + updating installed record (installPath, version, gitCommitSha=c25f248, lastUpdated). The brew binary half (CI tag-push → meridian-online/orbit release → homebrew-tap formula bump → brew upgrade) has been working every release; only the plugin-cache half was silently broken since the meridian move.
