key: rg-substrate-misleading-prose-keyword-scan-code-investigate
body: 'Two orbit skill files describe rg/ripgrep as a distinct, preferred tool when in practice the rtk hook claude PreToolUse hook silently routes Bash ''rg'' invocations through ''rtk grep'' — running GNU grep semantics, not ripgrep. Affected: (1) plugins/orb/skills/keyword-scan/SKILL.md:36 ''Prefer ripgrep (rg) for speed. Fall back to grep when rg is unavailable'' — but rg never runs as ripgrep through the hook. Detection at line 49 (command -v rg) passes because the binary exists, so the skill always picks the rg branch which then runs as rtk-grep. Alternation patterns still match (rtk-grep handles -E semantics), so the skill functions, but the prose claim is misleading. (2) plugins/orb/skills/code-investigate/SKILL.md:48-49 lists ''ripgrep (rg)'' and ''rtk-wrapped variants'' as distinct rows in the tool taxonomy table; in practice they collapse. Ripgrep-specific features (PCRE2, --json output, ripgrep regex extensions) are unavailable through Bash unless the agent uses /home/linuxbrew/.linuxbrew/bin/rg as absolute path. Hugh''s posture (stated 2026-05-21): ''rtk shouldn''t change the downstream tool — that''s an issue for the keyword search and code-investigation tool implementations.'' Durable fix candidate: update both SKILL.md files to (a) acknowledge rg-via-Bash routes through rtk-grep, (b) drop the ''prefer rg'' framing in favour of ''use grep-compatible patterns; if you need true ripgrep features, invoke /home/linuxbrew/.linuxbrew/bin/rg directly'', (c) consolidate the tool-taxonomy entries in code-investigate.'
