body: '0-4-0-shipped: orbit 0.4.0 shipped 2026-05-01. Bead-native execution layer end-to-end. Subsumes orbit-6da.0 (foundation: bd-init, parse-acceptance.sh, promote.sh, PRIME.md, acceptance-field convention) + orbit-6da.1 (/orb:implement reads bead acceptance field as AC source of truth; progress.md / TaskCreate / drift detection removed; detours escalate as sub-beads with discovered-from edges) + orbit-6da.2 (/orb:drive collapses to promote→review-spec→implement→review-pr; state lives in bead metadata; iteration history via discovered-from graph) + orbit-6da.3 (/orb:rally onto bead dependency graph; rally.yaml removed; epic bead + child beads IS the rally) + orbit-6da.4 (card 0016: cold-fork reviewers read beads directly via bd show + parse-acceptance.sh; snapshot bridge removed; gate semantics propagate end-to-end via promote.sh; MADR 0013). Decisions: 0011 (substrate) + 0013 (cold-fork mapping); 0002 partially superseded for review-pr scope only. Migration playbook: MIGRATION-0.4.0.md. Card 0017 queued: /orb:setup is bead-aware.'
