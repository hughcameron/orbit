key: rally-cold-fork-depth-vs-skill-fork-depth
body: 'Cold-fork Agent tool availability is nesting-depth-sensitive. Confirmed pattern (N=4 instances this session): main→Agent→Agent (depth-3 reviewers) BREAKS — both rally drive sub-agents (0037 + 0038) reported Agent tool unavailable at this depth and shipped inline review against the substrate convention. main→Skill→Agent (depth-2 reviewers) WORKS — 0042 re-driven from main via inline implementation + spawned /orb:review-spec and /orb:review-pr via Agent tool returned clean cold-fork verdicts (review-spec cycle-1 surfaced 3 substantive MEDIUM findings, cycle-2 APPROVE; review-pr APPROVE + 1 MEDIUM + 2 LOW). How to apply: when rallies need cold-fork review at drive-internal stages, prefer the lead-runs-drive-inline pattern (lead spawns /orb:review-spec and /orb:review-pr via Agent directly) over Agent-spawned sub-agent drives that fork their own reviewers. Sub-agent path is fine for tasks that don''t need depth-3 reviewers (e.g., Stage 2 design analysts). The rally-tool-surface-incomplete memory still applies; this memory refines it with the specific depth threshold (depth-3 reviewers don''t work).'
