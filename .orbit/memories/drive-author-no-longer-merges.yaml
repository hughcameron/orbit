key: drive-author-no-longer-merges
body: 'Author no longer handles PR merges. Under /orb:drive (guided or full), after the review-pr APPROVE gate the agent merges the PR itself rather than handing off — gh pr merge --squash --auto for repos with auto-merge enabled, --merge or --squash without --auto otherwise. Why: stated 2026-05-25 during the verify-surfaces-migration-errors drive close (''I''m no longer merging PRs - your call''). How to apply: drive guided-mode''s ''GO — create PR'' path no longer ends at PR creation; it continues into merge + branch cleanup + spec close on main, mirroring full autonomy''s §Completion step 5. The drive SKILL.md still describes a guided handoff at step 5 — that prose is stale relative to this author preference; either drive autonomously to merge or surface as an explicit follow-up only when the merge specifically warrants confirmation (force-push, branch-protection override, etc.).'
