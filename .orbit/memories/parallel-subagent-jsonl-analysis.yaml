key: parallel-subagent-jsonl-analysis
body: '5-parallel-subagent pattern for cross-repo Claude Code transcript analysis: spawn one general-purpose Agent per ~/.claude/projects/<repo>/ directory, each parses last-N jsonl files via python (NOT line-by-line into context — pipe through aggregating script that emits totals), returns ≤400-word structured report with tool-call distribution + skill invocations + investigation-before-edit ratio + hook-fire count + behavioural paragraph. Verified 2026-05-25 on 148 jsonl / 636 MB across 5 repos; each sub-agent burned ~30k tokens; parent context received only the per-repo aggregate tables (5 × ~400 words). Privacy variant: pass explicit constraint string (no repo name, no quoted user/tool content, refer as ''repo P'', aggregate counts only). Key tool-use schema cue: Skill invocations show up as tool_use with name=''Skill'' and input.skill=''orb:...''; PreToolUse hook output appears in tool_result/system stderr as literal warning text. How to apply: reach for this when the question is ''what do agents actually do across N repos'' — the parallel aggregation keeps the parent''s context tight while the sub-agents do the JSON-heavy parsing.'
