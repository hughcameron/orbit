key: distill-source-lines-vs-schema
body: 'plugins/orb/skills/distill/SKILL.md prescribes ''source_lines is mandatory on every scenario'' (lines ~145-150) but the orbit-state Card schema rejects this field — orbit verify fails with ''scenarios[0]: unknown field source_lines, expected one of name, given, when, then, gate''. Verified 2026-05-21: zero existing cards in .orbit/cards/ use source_lines; the field doesn''t exist in the canonical schema. Existing convention is provenance via card-level references:[] pointing at the source artefact (.orbit/memos/<file>.md), not per-scenario quoting. How to apply: when running /orb:distill, ignore the source_lines prescription and put provenance in references:[] only. Durable fix candidate: either (a) drop the source_lines language from distill SKILL.md to match the schema, or (b) add an optional source_lines field to the Card scenario schema in orbit-state if per-scenario provenance is genuinely wanted. Lower-noise fix is (a) — the references[] pattern works and no card has needed per-scenario provenance in practice.'
