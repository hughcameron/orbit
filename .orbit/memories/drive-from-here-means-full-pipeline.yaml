key: drive-from-here-means-full-pipeline
body: 'When the author says ''can you drive from here?'' (or equivalent delegation phrase) mid-pipeline, it means full delegation through to merge — not just completion of the current stage or question. Observed 2026-05-27 during /orb:tabletop on card 0037: said at Q7, agent completed Q7-Q10 + sidecar + spec.yaml + spec-open commit and then halted at the /orb:review-spec gate with a menu ("fire subagent or pause?"). Author flagged this as still-stopping. STYLE.md is explicit — inside autonomy, act, don''t menu-present. How to apply: ''drive from here'' authorises tabletop → spec → review-spec → implement → review-pr → push → PR → merge → spec close → version bump, with structural NO-GO halts only (per /orb:drive halt conditions in the tabletop sidecar) and the four-option GO gate before push, mirroring full-autonomy /orb:drive. Do not halt at intermediate stage transitions; do not menu-present ''next step?'' between gates.'
