body: 'Drive 2026-05-24-setup-is-orbit-state-aware closed end-to-end. 21/21 ACs APPROVE in cycle 1 of review-pr. PR #29 merged via gh pr merge --auto --squash (no required checks so squash landed immediately). Ships: (1) SubstrateLayoutState 6-variant enum + classify_substrate_layout helper in orbit-state/crates/core/src/verbs.rs:4575 — single source of truth for setup SKILL.md''s state-machine AND audit_conformance_at''s wrapped-undotted suppression; (2) plugin_repo gating on topology.setup — true writes 5 substrate-typed seeds (with canonical_code path validation), unset/false writes one-line README pointing at /orb:topology; (3) decisions_md_unmigrated conformance finding family — fires when .orbit/decisions/<slug>.md has no matching .orbit/choices/<slug>.yaml; (4) canonical-files-missing suppression on wrapped-undotted layouts (rally lockdown contract — sister drive 2026-05-24-workflow-conformance will add the matching undotted_substrate finding family later); (5) new substrate.classify CLI+MCP verb for parity-test surface (3 shapes covered). Setup SKILL.md gains §0 preconditions (orbit-state binary check + version sanity ≥0.4.33), §3.W wrapped-undotted single-rename arm, §4 mixed-state refusal with named paths + git-status-porcelain invariant, §3 decisions/ migration target changed to .orbit/decisions/ (was .orbit/choices/) per rally lockdown ''detect-and-warn only, no auto-conversion'', §3f.1 MADR conversion warning, §5 plugin_repo:true preservation language, §6d plugin_repo gating + canonical_code validation prose, §7 ''setup does not auto-run a drive'' note. Drive SKILL.md gains input-contract pre-check halting with ''run /orb:setup first'' when .orbit/ substrate uninitialised. This repo''s .orbit/config.yaml created with plugin_repo:true so its own /orb:topology setup continues to seed substrate-typed entries. Card 0017-setup-is-orbit-state-aware bumped planned→emerging; goal sharpened to mention wrapped-undotted shape. Tests: 497/497 pass workspace-wide (+51 new). Two non-blocking review-pr findings: LOW retype ac-01..ac-09 from default code to doc ac_type (SKILL.md prose evidence, not code); INFO mixed-* refusal lives in SKILL.md prose with classifier unit-test coverage. Carry-forward for next session: sister rally drive 2026-05-24-workflow-conformance is unblocked (predecessor closed) — its undotted_substrate finding family is the next promote; sister drive 2026-05-24-brownfield-spec-migration also parked and unrelated to this predecessor chain — can resume independently; rally 2026-05-24-brownfield-migration-hardening-rally.yaml says all 3 children parked because of harness-incompatibility (Agent tool unavailable inside Agent-spawned sub-agents) — this drive RAN successfully from a fresh top-level session (Agent tool worked here), so the rally''s parking reason was about parallel-worktree fan-out, not about driving individually. Local main has the squash commit 685f937 (PR #29) plus close-commit a42d7e8 (cherry-picked from rally branch). rally/setup-is-orbit-state-aware branch still exists locally and on origin — could be deleted (gh repo settings probably auto-delete merged branches but didn''t trigger because the close commit landed after merge).'
