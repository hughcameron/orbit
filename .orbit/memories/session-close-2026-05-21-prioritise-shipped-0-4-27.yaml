body: 'Session closed end-to-end with orbit 0.4.27 released. Shipped /orb:prioritise (card 0043, spec 2026-05-21-session-start-priority-synthesis) — session-start priority synthesis skill that re-derives a ranked Decision Brief live from workflow conformance + session-prime envelope + recent memories. Read-only by prose contract; deterministic 4-tier ranking (severity HIGH>MEDIUM>LOW → memo staleness desc → open-spec age desc → id asc) gives byte-identical ordering on identical substrate. Top 5 priorities with what + why + effort (S/M/L) + next-action verb; bounded at <=20 lines / ~500 tokens. Pillar 1 (author-level interaction). Session arc: priorities triaged → /orb:distill memo 2026-05-19-prioritise-skill.md → card 0043 → /orb:drive guided autonomy → /orb:design + /orb:spec via promote.sh (9 ACs, 6 gate, 3 non-gate) → review-spec cycle-1 REQUEST_CHANGES (10 findings: 3 HIGH skill-name-unpinned + differentiation-target-undefined + effort-axis-undefined, 4 MEDIUM ranking-undefined + empty-substrate + missing-verb-fallback + top-N-undefined, 3 LOW prose-enforcement + mid-session + aspirational-AC; HIGH+MEDIUM addressed inline via spec edits, LOWs accepted) → cycle-2 APPROVE → /orb:implement single SKILL.md write (103 lines, all 9 ACs checked as doc-band) → review-pr APPROVE with 2 LOW (dangling memo ref in card 0043 references[] - belongs in card 0041 spec; untracked side-files) → guided gate (GO) → commit + close. Sidetracks captured 3 substrate hygiene memories that landed in their own commit (8247a5d docs(skills)): rg-shimmed-via-rtk-hook (rtk hook claude PreToolUse intercepts rg → rtk grep; /home/linuxbrew/.linuxbrew/bin/rg absolute-path bypasses), rg-substrate-misleading-prose-keyword-scan-code-investigate (both skills had ''prefer rg for speed'' framing that''s wrong in this environment), taskcreate-allowed-not-banned (METHOD.md commit d0cc831 flipped TaskCreate from prohibited to permitted-in-session; agents reading the prior version weren''t wrong-at-time, just stale). /orb:code-investigate gains two new discipline bullets — Diagnose before bypassing (run type/command -V/alias + grep settings.json for hooks before declaring shimmed) and Cite the substrate, don''t paraphrase (file:line + quoted text + orbit audit conformance --json freshness probe). Side discoveries: distill-source-lines-vs-schema memory (distill SKILL.md mandates source_lines on scenarios but Card schema rejects it — durable fix candidate is to drop from SKILL.md prose since references[] pattern works); audit-conformance-cwd-dependent memory (verb produces false ''missing'' findings when run from subdir of orbit repo — fixed by re-running from repo root). Card 0043 maturity bumped planned→emerging on first spec close (spec-close-doesn''t-bump-card-maturity pattern still holds, manual bump, N=8+ instances across sessions now). Conformance audit post-release: same 3 ready_for_design findings as session start (cards 0013/0014/0019) — clean, no regressions. 4 commits on main this session: 8247a5d docs(skills) hygiene + da82570 feat(prioritise) + 6efaa76 close(prioritise) + 486adcb Bump version to 0.4.27. Tag v0.4.27 pushed; release workflow run 26198800145 green (build + brew tap update). brew formula bumped to 0.4.27. /reload-plugins reports 5 plugins · 6 agents · 2 hooks · 4 plugin LSP servers loaded — orb:prioritise is live in the skills list. Carry-forward priorities for next session: dogfood /orb:prioritise (it''s now live and self-applicable); cards 0013/0014/0019 still need /orb:design passes (the only conformance findings); distill SKILL.md source_lines language is stale vs schema (small SKILL.md edit); BM25 spec (2026-05-20-memory-match-bm25) still open with 0 ACs (deferred); METHOD.md TaskCreate prose may want a sharpening to reduce the still-recurring misread pattern.'
