key: spec-close-does-not-bump-card-maturity
body: 'Pattern observed 7 times this session: when a spec closes, spec.close updates card.specs[] but does NOT bump card.maturity (planned → emerging). Cards 0018/0020/0021/0025 hit it from prior shipped specs (cleared in chore commit a6f3848). Cards 0037/0038/0042 hit it after the substrate-engagement rally closed (cleared in 566fd45). Manual maturity bumps are running at ~1 per session and the count is growing. Future automation candidate: have spec.close auto-bump card.maturity from planned→emerging on first spec close, leaving emerging→established a manual call (since established carries a ''stop acquiring specs'' signal the agent shouldn''t infer). Conformance audit''s card-state finding family fires on (maturity:planned AND specs:[]) — its remediation is currently ''/orb:design <id>'' but for these cases the operator action is ''bump maturity to emerging.'' Worth a memo or card after one more session of evidence.'
