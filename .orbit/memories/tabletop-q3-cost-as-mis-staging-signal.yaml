key: tabletop-q3-cost-as-mis-staging-signal
body: 'When Q3 cost framing in tabletop produces a ''this creates the staccato halt-and-discuss pattern'' reaction from the operator, the discipline is mis-staged — front-load by default. Observed 2026-05-26 on card 0045 tabletop: cost #2 was ''implementing agents stop more often,'' author rejected the design and asked for ''one coherent discussion → solid parallel work → outcome.'' Reframe took one round-trip — moved the scope-adequacy gate from /orb:implement (per-AC mid-flight escalations) to /orb:spec (one halt at write-up if classification missing). Pattern: mid-implement halts are almost always more expensive than the upstream tabletop time they would save. How to apply: at Q3, when a cost reads as ''this slows down execution with frequent halts,'' don''t accept the cost — re-walk Q3 with the question ''can this discipline happen upstream where one discussion covers many ACs?'' If yes, the upstream form is the right design. Front-loading is the default; mid-flight halts need a concrete defence (per-instance variability that can''t be classified upfront, hard dependency on runtime evidence).'
