key: stacked-pr-squash-merge-cherry-pick-recovery
body: 'When a stacked PR''s base branch is squash-merged into main, rebasing the stacked branch onto main hits ghost-conflicts because git sees the original (pre-squash) commits as ''not in main'' and tries to reapply them — producing conflicts against content already squashed-in. Recovery pattern (worked first try this session for PR #27 stacked on PR #25): (1) git rebase --abort, (2) git log --oneline <base-branch-tip>..<stacked-branch> to identify the stack-specific commits, (3) git reset --hard origin/main, (4) git cherry-pick <commit1> <commit2> ... <commitN> — the stack-specific commits only, skipping the inherited-base ones. Git''s three-way merge handles the cherry-picks cleanly because the new base already has the squashed content. (5) git push --force-with-lease, (6) gh pr edit <N> --base main if the PR base needs retargeting from the (deleted) stack-parent. Avoids fighting through N-commit rebase conflicts in sequence.'
