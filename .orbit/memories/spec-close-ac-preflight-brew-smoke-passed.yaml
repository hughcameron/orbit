key: spec-close-ac-preflight-brew-smoke-passed
body: 'ac-09 smoke trilogy verified against the brew-distributed orbit 0.4.13 binary on the beelink (/home/linuxbrew/.linuxbrew/bin/orbit) on 2026-05-14: (1) spec close on a spec with one unchecked non-time-gated AC returns exit=1 + Error::conflict envelope with category=conflict, verb=spec.close, message=''1 unchecked AC(s) in spec <id>: ac-01''; (2) spec close --force on the same spec proceeds, exit=0, ok envelope carries forced_unchecked=[ac-01] and status=closed; (3) spec close on a spec whose only unchecked AC is time_gated=true proceeds without --force, exit=0, ok envelope carries time_gated_open=[ac-01] and status=closed. Brew tap update flowed through cleanly via the release.yml workflow at meridian-online/orbit, triggered by v0.4.13 tag push (the /orb:release skill currently misses the tag step — see memory orb-release-skill-missing-tag-push). Feature dogfooded end-to-end on its own delivery.'
