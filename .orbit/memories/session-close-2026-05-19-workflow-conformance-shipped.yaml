key: session-close-2026-05-19-workflow-conformance-shipped
body: 'Session closed end-to-end with orbit 0.4.22 released. Drive on spec 2026-05-19-workflow-conformance CLOSED (full autonomy on main, no PR — parent convention) shipping 8 ACs for card 0039 (workflow-conformance, slug renamed from setup-conformance-check this session; scope reframed from artefact byte-compare to substrate-vs-plugin-contract). New CLI/MCP verb `orbit audit conformance` returns a structured findings envelope: ConformanceFinding{severity/subsystem/subject/state/evidence/remediation.verb} across three new finding families — plugin-canonical-file drift (.orbit/METHOD.md byte-compare vs include_str! canonical bytes), card-state (maturity:planned + empty specs → /orb:design <id>), memo staleness (filename-date >7d → /orb:distill <path>) — plus aggregated audit_drift + audit_topology results carried verbatim under aggregated.{drift,topology}. Pin model: Config.plugin_version Option<String> in .orbit/config.yaml, defaults to current (CARGO_PKG_VERSION under lockstep release contract). pin_behind / pin_ahead each fire ONE dominant finding and SUPPRESS per-file findings (single-finding dominance). 391/391 workspace tests pass (was 365 at session start; +22 conformance unit tests + 1 CLI parity + 1 MCP parity + sync-check vs vendored METHOD.md). Session arc: /orb:design halted on intent reframe (''conformance about outcomes not artefacts, agent-consumed'') → /orb:discovery (11 Q&A, 4 decisions surfaced) → /orb:spec (8 ACs, ambiguity 0.08) → /orb:drive full. Review cycles: review-spec cycle-1 REQUEST_CHANGES (4 HIGH + 3 MEDIUM — AuditDriftEntry vs DriftEntry, STYLE.md/.gitignore NOT plugin-shipped today, cargo pkgid wrong version source, pin_ahead semantics ambiguous — all addressed inline) → cycle-2 APPROVE with 4 LOWs (chrono→time crate, list_memo_files helper, Config::FIELDS extension, surrounding-prose tightening — all addressed inline). review-pr cycle-1 APPROVE with 1 LOW (pin-bump remediation doc gap — addressed inline in /orb:setup §6e). Release path: 0.4.21 attempted but failed cross-compile (include_str! reached outside cross''s docker mount); fix vendored plugins/orb/skills/setup/METHOD.md → orbit-state/crates/core/canonical/METHOD.md, /orb:release §1.5 gains pre-flight sync step, sync-check unit test added. 0.4.22 shipped clean (run 26076164167). rtk hook denied direct edits AND reads of ~/.claude/plugins/installed_plugins.json; /plugin + /reload-plugins handled it instead. v0.4.21 tag is a failed-CI artefact in remote tag namespace (left in place rather than force-deleted per CLAUDE.md destructive-action caution). Topology setup smoke test was first priority — passed first try with one refinement memory (dir_created=false when empty pre-existing dir; contract is ''seeds present when done''). Cluster synthesis still deferred (now 6+ instances of substrate-engagement pattern including the conformance verb''s existence as the latest instance). 10 commits on main this session.'
