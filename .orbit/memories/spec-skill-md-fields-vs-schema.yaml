key: spec-skill-md-fields-vs-schema
body: 'The /orb:spec SKILL.md template prescribes fields that the canonical Spec schema rejects: implementation_notes, evaluation_principles, exit_conditions, ontology_schema, metadata. Verified 2026-05-25: orbit verify on a spec.yaml using these fields returns ''unknown field <name>, expected one of id, goal, cards, status, labels, acceptance_criteria, memories_considered''. The schema accepts ONLY those 7 fields. Existing convention (e.g. .orbit/specs/2026-05-17-code-investigate-skill/spec.yaml) embeds implementation guidance IN AC descriptions, references the tabletop sidecar for halts/escalations/kills/budget, and omits the rejected fields. Same shape as the distill-source-lines-vs-schema drift (memory). How to apply: when writing a spec.yaml, stick to id/goal/cards/status/labels/acceptance_criteria/memories_considered. Put halts/escalations/kills/budget in the tabletop sidecar (.orbit/specs/<id>/tabletop.md or tabletop-note.md). Put implementation_notes content inline in AC descriptions or as additional sidecar sections. Durable fix candidate: tighten /orb:spec SKILL.md prose to match the schema (drop the unsupported field examples) OR extend the Rust Spec struct to accept the additional fields. Lower-noise fix is the SKILL.md tightening since AC descriptions + tabletop sidecars already carry the content well.'
