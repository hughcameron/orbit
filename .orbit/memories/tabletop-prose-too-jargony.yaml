key: tabletop-prose-too-jargony
body: 'Tabletop prose drifts into term-of-art density when walking the 10 questions — phrases like ''substrate-encoded,'' ''load-bearing,'' ''defence in depth,'' ''co-load-bearing,'' ''downstream consequence'' stack up and the author has to expand each one. Observed 2026-05-26 during tabletop on card 0045. STYLE.md already prescribes plain words; the failure is letting the methodology''s vocabulary leak into prose. How to apply: name each idea once in plain English, then reuse the plain phrase instead of the term-of-art shorthand. Reserve ''load-bearing,'' ''substrate,'' etc. for when they''re genuinely the right word, not as default vocabulary. If a sentence would read sensibly to a peer outside the project, it passes; if it reads like a methodology gloss, rewrite.'
