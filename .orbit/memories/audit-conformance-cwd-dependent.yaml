key: audit-conformance-cwd-dependent
body: 'orbit audit conformance is cwd-dependent — it resolves the repo via layout.repo_root() based on the working directory, so running it from a subdirectory of an orbit repo (e.g. orbit-state/) produces false ''missing'' findings on setup-canonical files (.orbit/METHOD.md, .orbit/STYLE.md). Verified 2026-05-21: cwd=orbit-state/ reported 2 medium ''missing'' findings for setup/.orbit/METHOD.md and setup/.orbit/STYLE.md with remediation ''orbit setup''; the files exist at the repo root and re-running from cwd=repo-root produced the expected 3 cards-state findings only. How to apply: always run ''orbit audit conformance'' from the repo root, or pass --root explicitly. The Bash tool''s cwd persists between calls, so a ''cd orbit-state && cargo ...'' command persists the orbit-state subdir as cwd for subsequent commands; cd back to repo root before running orbit verbs. Durable fix candidate: orbit audit conformance could walk up to find .orbit/ before declaring repo_root, mirroring git''s repo-root resolution. Until then, cwd hygiene is on the operator.'
