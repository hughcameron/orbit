key: tabletop-auq-hybrid-pattern-askuserquestion-closes-forks-pro
body: 'tabletop-auq-hybrid-pattern: AskUserQuestion closes forks; prose opens them. Inside tabletop sessions, use prose for opening questions, scenario walks, and lateral naming (where amendments and creative reframes carry the value); use AUQ for closing picks, ambiguity resolution, halt-trigger confirmation, and option selection (where the value is ''which one''). Surfaced 2026-05-07 orbit-state v0.1 tabletop.'
