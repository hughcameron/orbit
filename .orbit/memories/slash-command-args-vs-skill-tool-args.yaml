key: slash-command-args-vs-skill-tool-args
body: 'Claude Code''s slash-command parser drops args inconsistently when routing to /orb:* skills. Hugh hit it on /review-spec 2026-05-16-memos-own-folder — the skill ran but ARGUMENTS was empty, so it halted per its own no-spec-id-provided guard. I also hit it on a third Skill-tool invocation of /orb:review-spec — first two carried args correctly, third dropped them despite identical call shape. The Skill tool with an explicit args parameter is the reliable path. Why: orbit''s /orb:* skills declare context: fork + agent: general-purpose, meaning they spawn into a forked Agent; the slash-command-to-skill arg pipeline is unreliable for that shape. How to apply: when invoking /orb:review-spec, /orb:implement, /orb:drive etc. that need an arg, pass it via the Skill tool''s args field. If invoking via slash command, always use the fully namespaced /orb:<skill-name> form (not bare /<skill-name>) — the suffix-match resolution path likely drops the arg.'
