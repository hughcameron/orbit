key: slash-command-args-vs-skill-tool-args
body: 'Claude Code''s slash-command parser drops args inconsistently when routing to /orb:* skills. Hugh hit it on /review-spec 2026-05-16-memos-own-folder — the skill ran but ARGUMENTS was empty, so it halted per its own no-spec-id-provided guard. Update 2026-05-16: I hit the Skill tool dropping args TWICE in a row on /orb:review-spec for 2026-05-16-session-handover, despite passing args explicitly. The Skill tool with args parameter — previously believed to be the reliable path — IS NOT RELIABLE for forked skills. The reliable fallback is the **Agent tool with subagent_type=general-purpose**, embedding the spec-id + skill-path + ARGUMENTS value directly in the prompt and asking the agent to read plugins/orb/skills/<name>/SKILL.md and follow it. That pattern worked first try on both review-spec cycles tonight. Why: orbit''s /orb:* skills declare context: fork + agent: general-purpose, meaning the Skill tool spawns a forked Agent — and the args parameter doesn''t propagate into the forked Agent''s $ARGUMENTS env var reliably. How to apply: when invoking /orb:review-spec, /orb:implement, /orb:drive, /orb:design etc. that need an arg, FIRST try the Skill tool with args. If the forked agent reports ''no <thing> provided'', immediately switch to the Agent tool with subagent_type=general-purpose and an explicit prompt naming the SKILL.md path + the argument value. Do not retry the Skill tool form — the failure is non-flaky once observed for a given skill in a given session.'
