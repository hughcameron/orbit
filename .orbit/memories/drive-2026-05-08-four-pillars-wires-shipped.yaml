key: drive-2026-05-08-four-pillars-wires-shipped
body: 'Drive 2026-05-08-four-pillars-wires shipped (PR #20). Pruned scope across the design conversation: started as ''all four wires in one spec'' (Rust schema + skill citations + audit + README), pruned to documentation-only after Hugh flagged (1) schema-field is overreach onto downstream users, (2) telling agents to ''be self-learning'' is incantation since pillars are emergent outcomes. Final shape: README rename + card 0028 amendments + stale-ref cleanup. Cycle 1 review-spec caught README''s pre-existing ''What orbit optimises for'' section that my keyword grep missed (lesson: read README directly during evidence-gathering, don''t rely on grep keywords). Cycle 2 APPROVE. Cycle 1 review-pr APPROVE with one LOW (goal drift) addressed in completion commit. promote.sh wedge avoided via ''orbit spec create + direct YAML write + canonicalise'' workaround (memory promote-sh-stale-vs-orbit-state still flags this needs porting).'
