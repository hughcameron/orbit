body: |
  # 0006. Drive's Re-Review Context: Fully Cold

  ## Context and Problem Statement

  When a forked reviewer returns REQUEST_CHANGES and drive addresses the findings, drive must re-launch a reviewer for the updated spec or diff. The question is what context the new reviewer receives. Three shapes are available: fully cold (only the spec/diff), warm-with-pointer (a link to prior review files), or warm-with-summary (a digest of prior findings).

  The decision directly trades off confirmation-bias resistance against re-work efficiency: a warmer re-review is less likely to re-flag already-addressed findings, but more likely to inherit the prior reviewer's framing.

  ## Considered Options

  - **Option A: Fully cold re-review.** The re-forked reviewer receives only the spec/diff and the output path. No pointer to prior review files, no iteration counter, no summary of prior findings. Functionally identical to the first cycle's brief.
  - **Option B: Warm with pointer.** The brief includes a path to the prior review file. The new reviewer can read it for context (or ignore it).
  - **Option C: Warm with summary.** Drive distils the prior review's findings into a short summary and includes it in the brief.
  - **Option D: Iteration-labelled cold.** Cold context, but the brief mentions "this is pass 2 of up to 3" so the reviewer calibrates effort accordingly.

  ## Decision Outcome

  Chosen option: "Option A — Fully cold re-review", because the whole point of forked reviews is confirmation-bias resistance. Any context bleed — even a file path — gives the new reviewer an anchor. A reviewer who knows "someone else already found X" is less likely to find X+1. A reviewer who knows "this is pass 2" is more likely to grade leniently or harshly depending on calibration.

  The cost of pure independence — possible re-flagging of already-addressed findings — is bounded by the REQUEST_CHANGES budget (decision 0007: 3 cycles per stage). Without the bound, pure coldness could loop indefinitely; with the bound, the worst case is 3 cold reviews before synthetic BLOCK, which is an acceptable cap.

  ### Consequences

  - Good, because confirmation-bias resistance is preserved at full strength
  - Good, because the re-review brief is literally the same as the first — simpler code, fewer branches
  - Good, because each review cycle's verdict is independently derivable — the record can be audited as three separate reviews, not a correlated sequence
  - Bad, because a finding that was addressed in pass 1 can be re-flagged in pass 2 if the fix was imperfect. Accepted: the finding is legitimate if the reviewer surfaces it twice — the imperfection of the fix is real signal.
  - Bad, because drive cannot help a re-reviewer skip the portions of the spec that haven't changed. Accepted: the spec isn't large enough for this to be expensive; the fresh read is the point.

  ## Evidence

  - Constraint #5 in `.orbit/specs/2026-04-20-drive-forked-reviews/spec.yaml`: "Re-reviews after REQUEST_CHANGES are fully cold — each forked reviewer reads only the spec/diff, with no pointer to prior review files and no iteration-count hint"
  - Interview Q3 explicitly weighed pure independence against context bleed: "The risk of re-flagging already-addressed findings is accepted as the cost of genuine independence — and is bounded by the budget in Q4."
  - Implementation in `plugins/orb/skills/drive/SKILL.md` §5.3 "must NOT include" list and Critical Rule "Re-reviews are fully cold"
  - Pairs with decision 0007 (REQUEST_CHANGES budget) — the budget is what makes cold re-reviews safe
