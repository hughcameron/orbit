body: |
  # 0007. Drive's REQUEST_CHANGES Budget: 3 Cycles Per Stage

  ## Context and Problem Statement

  Drive's pre-fork behaviour looped on REQUEST_CHANGES without bound — a reviewer could keep requesting changes indefinitely and drive would keep addressing them. With forked reviews costing a fresh Agent invocation per pass and cold re-reviews (decision 0006) accepting possible re-flagging, an unbounded loop risks wheel-spinning or runaway cost.

  The question is where to set the bound, what happens at the boundary, and how that interacts with drive's existing top-level 3-iteration NO-GO budget.

  ## Considered Options

  - **Option A: Bounded — 3 REQUEST_CHANGES cycles per stage, then synthetic BLOCK.** Review-spec and review-pr each get an independent 3-cycle budget per top-level iteration. On the 4th would-be cycle, drive synthesises a BLOCK verdict with a fixed constraint string and enters NO-GO handling.
  - **Option B: Unbounded.** Drive loops indefinitely on REQUEST_CHANGES. Human judgment closes the loop by watching drive's output.
  - **Option C: Per-stage tuning.** Different budgets for review-spec vs review-pr (e.g., 5 for spec, 3 for PR).
  - **Option D: Bounded, with human gate at the boundary.** On the 3rd REQUEST_CHANGES, drive pauses and asks the operator whether to continue or escalate.

  ## Decision Outcome

  Chosen option: "Option A — Bounded at 3 per stage with synthetic BLOCK", because the uniform 3-cycle limit matches drive's overall 3-iteration budget shape (recursive, not nested), gives re-reviews (decision 0006) a finite worst case, and produces honest escalation via the existing NO-GO path rather than bespoke machinery.

  The synthetic BLOCK's constraint string is fixed and byte-identical across the codebase: `"review converged on REQUEST_CHANGES after 3 iterations; findings have not been addressable within budget"`. That string feeds forward into the next iteration's design session as an accumulated constraint, turning repeated review failure into evidence that the approach itself may need rethinking — not just more edit cycles.

  A per-stage budget (one for review-spec, one for review-pr) rather than a drive-wide one is honest about where effort went: review-spec cycles exhaust the spec-level budget; review-pr cycles the implementation-level budget. Mixing them would hide signal.

  ### Consequences

  - Good, because the loop is bounded without a flag or human gate at the boundary
  - Good, because the synthetic BLOCK re-uses the existing NO-GO handling — no new escalation path to maintain
  - Good, because the budget matches drive's natural shape (3 iterations top-level, 3 cycles per review stage) — a disposed agent knows 3 is the budget ceiling everywhere
  - Good, because per-stage counters give the iteration design session honest evidence: "we spent 3 REQUEST_CHANGES cycles on spec but never got to implementation" vs "we reached implementation but got 3 REQUEST_CHANGES on PR"
  - Bad, because a genuinely hard spec that needs 4–5 review cycles to converge will be forced into a NO-GO and re-design, which may re-do work. Accepted: if 3 cycles haven't converged, the evidence says the approach needs rethinking more than the findings need addressing.
  - Bad, because the bound is uniform and not tunable per card. Accepted: tuning adds configuration surface without clear evidence that the default is wrong. Revisit if a pattern emerges.

  ## Evidence

  - Constraints #6 and #7 in `.orbit/specs/2026-04-20-drive-forked-reviews/spec.yaml`: 3-cycle limit, persisted counter, synthetic BLOCK conversion
  - Interview Q4 framed the disposition explicitly: "Prevents runaway loops; aligns with disposition-bounded-by-honest-escalation"
  - Implementation in `plugins/orb/skills/drive/SKILL.md` §5a with the byte-identical constraint string (grep-verified)
  - Pairs with decision 0006: cold re-reviews need a bound; this is that bound
  - The spec explicitly preserves the top-level iteration budget (constraint #10): synthetic BLOCK consumes a top-level iteration the same way a real BLOCK does
