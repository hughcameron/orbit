body: |
  # 0011. Design Interviews Capture Intent, Not Means

  ## Context and Problem Statement

  The `/orb:design` skill frames itself as "works out the how" and the interviewer persona targets "the biggest source of ambiguity." In practice, this pulls the author into implementation-level decisions they can't answer without codebase context — which function to modify, what predicate logic to use, how to structure tests.

  Trigger incident: Nightingale ran a design session for a categorical demotion guard. Four questions were asked; two required reading `column.rs:3881` and the `CompiledValidator` struct to answer. The author pushed back — "too low level, I didn't have the answer." The agent then self-answered all four correctly from evidence.

  The test: if the agent can answer it from evidence, it was never a question for the author.

  ## Considered Options

  - **Option A: Add a pre-question filter to the interviewer persona** — classify each question as "intent" or "means" before asking. Means questions become implementation notes instead of interview questions.
  - **Option B: Reframe the design skill entirely** — change the design stage's mission from "works out the how" to "captures what good looks like." Restructure question targets around outcomes, constraints, priorities, and risk appetite. Means questions are the implementing agent's job.
  - **Option C: Status quo with better evidence hierarchy enforcement** — the interviewer persona already says "never ask for implementation guidance when evidence exists." Tighten the rule.

  ## Decision Outcome

  Chosen option: "Option B — Reframe the design skill", because the problem is structural, not a missing guardrail. The design stage's framing as "the how" is what causes agents to ask implementation questions. Changing the framing changes the behaviour. Option A adds a filter but keeps the framing that causes the problem. Option C was already in place and didn't prevent the incident.

  ### The Principle

  **The author's job is to define what good looks like. Everything else is derivable.**

  Two decision levels exist in every spec pipeline:

  - **Intent** (author owns): Goals, priorities, constraints, risk appetite, UX preferences, scope boundaries. The author is the only source for these — no amount of evidence can substitute for "what do you want?"
  - **Means** (agent owns): Implementation approach, code structure, predicate logic, test strategy, tooling choices. These are derivable from evidence, codebase analysis, and prior research. The implementing agent makes these decisions, or checkpoints with the author only when evidence is genuinely silent AND the choice has meaningful consequences.

  The filter: "Would the author need codebase-level context to answer this?" If yes, it's a means decision — don't ask.

  ### What Changed

  - `plugins/orb/skills/design/SKILL.md`: Reframed from "works out the how" to "captures what good looks like." Question targets restructured around intent. Means questions recorded as implementation notes, not interview questions.
  - `plugins/orb/skills/interviewer/SKILL.md`: Added decision-level gate (Level 0) before the evidence hierarchy. Means questions are never asked — they're recorded as implementation notes for the spec.
  - `plugins/orb/skills/spec-architect/SKILL.md`: Added `implementation_notes` field to the spec YAML format.
  - `plugins/orb/skills/spec/SKILL.md`: Same — `implementation_notes` in the template.

  ### Consequences

  - Good, because the author stays at the vision/intent level where their judgement is uniquely valuable
  - Good, because design sessions become shorter and more focused — fewer questions, all answerable
  - Good, because implementing agents get richer starting context via implementation notes
  - Good, because drive full-mode self-answering improves — intent questions are answerable from card content
  - Bad, because agents must now classify question level correctly, which is a judgement call
  - Mitigation: the filter ("would the author need codebase context?") is concrete and testable
  - Bad, because some borderline questions may get deferred to implementation when earlier resolution would have saved time
  - Mitigation: implement skill's "surface unspecced decisions" catches genuinely consequential means decisions
