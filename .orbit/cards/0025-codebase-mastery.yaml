id: 0025-codebase-mastery
feature: Informed, surgical agents — investigation as a pipeline-stage step
as_a: agent working a stage of the orbit pipeline that touches code
i_want: investigation routed by the stage I'm in — narrow mode for specific questions, broad mode for neighbourhood awareness — backed by tools (ast-grep, tree-sitter, ripgrep, rtk-wrapped variants) that make evidence cheap enough to gather as a matter of course
so_that: I edit from evidence rather than working memory — surgical change, not approximate change; the right amount of investigation for the stage, not browse-the-whole-repo or fly-blind
goal: agents in the orbit pipeline edit from evidence rather than working memory. At each stage that touches code, investigation happens as a structural step — narrow when there's a specific question, broad when picking up a neighbourhood. Tooling (ast-grep, tree-sitter, ripgrep, rtk-wrapped variants) and token-frugality make this affordable. Surgical change is what affordable buys.
maturity: emerging
scenarios:
- name: rtk wraps command interactions by default
  given: any agent invocation that runs a command (git, find, ls, head, tail)
  when: the command fires
  then: it goes through rtk; the output is compressed; agents never spend tokens on noise output
  gate: true
- name: tree-sitter answers structural queries
  given: a question of the form "how many X in this repo?" where X is a structural feature (docstrings, async functions, trait impls)
  when: the agent reaches for a tool
  then: tree-sitter (via orbit code stats / orbit code grep-ast in v0.2+) returns an answer — not regex, not file-walking, not browsing
  gate: false
- name: ripgrep returns focused matches
  given: a search for an existing pattern ("where is the validation logic?")
  when: the agent uses the formalised ripgrep skill
  then: it returns the relevant N matches with surrounding context — not a 200-line dump
  gate: false
- name: ast-grep handles structural patterns regex cannot express
  given: a structural query like "find unwrap calls in match arms"
  when: the agent uses ast-grep
  then: pattern-based AST search returns the structural matches across the language family without the agent writing custom AST traversal
  gate: false
- name: Token-frugality is the enabler, not the goal
  given: an agent considering a tool invocation
  when: it picks the tool
  then: the token-frugal variant is reached for by default because surgical change depends on cheap evidence — frugality serves informed editing, it is not the headline value
  gate: true
- name: Karpathy's principles are operable, not aspirational
  given: an agent about to edit code
  when: the four principles apply (think before coding, simplicity first, surgical changes, goal-driven execution)
  then: /orb:code-investigate routes the agent to the right tool for each — tree-sitter for evidence, ripgrep for finding precedent, ast-grep for orphan detection, rtk to keep all of this token-cheap
  gate: false
- name: Code-domain verbs join orbit-state in v0.2+
  given: orbit-state has shipped at v0.1 (state-domain only)
  when: v0.2 lands
  then: code-domain verbs (orbit code stats, orbit code grep-ast, orbit code rg) are added to the same MCP server; the verb namespace was reserved at v0.1 design time
  gate: false
specs:
- .orbit/specs/2026-05-17-code-investigate-skill/spec.yaml
relations:
- card: 0019-tabletop
  type: feeds
  reason: tabletop's "what's adjacent" question depends on tooling that surfaces adjacency cheaply — codebase-mastery is the substrate for that question
- card: 0020-orbit-state
  type: depends-on
  reason: code-domain verbs are added to the same MCP server in v0.2+; the verb namespace is reserved at v0.1 design time
- card: 0024-lean-pass
  type: feeds
  reason: code-level lean (dead code, stale comments, orphan imports) needs AST awareness; tree-sitter and ast-grep are the substrate
references:
- '.orbit/specs/2026-05-17-code-investigate-skill/spec.yaml: ships /orb:code-investigate as the agent-equipment surface delivering this card'
- '.orbit/memos/2026-05-06-codebase-mastery.md: distillation source — three pillars and Karpathy''s principles mapping'
- '.orbit/memos/2026-05-17-codebase-mastery-audit.md: narrowed audit at ship — 5 of 7 scenarios aspirational; consumer-repo evidence of zero tool reach'
- '.orbit/memos/2026-05-25-code-investigate-stage-bound.md: in-repo signal + stage-bound principle — code-investigate belongs to workflow stages, not SessionStart'
- '.orbit/memos/2026-05-25-code-investigate-empirical-audit.md: 5-repo, 35-session audit — 1,725 edits, 610 hook fires, 0 invocations; baseline unchanged post-ship'
