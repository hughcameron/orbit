relations:
- card: 0036-session-handover
  type: feeds
  reason: handover writes the close-time synthesis; /prioritise re-derives the equivalent synthesis at session start — together they bracket cross-session continuity
- card: 0039-workflow-conformance
  type: depends-on
  reason: consumes `orbit audit conformance --json` findings (with remediation.verb) as the primary structural backlog signal
- card: 0028-four-pillars
  type: feeds
  reason: instantiates pillar 1 (author-level interaction) — agent pays the compression cost so the author doesn't
