feature: /orb:setup is orbit-state-aware
as_a: orbit user setting up a new project or migrating an existing one
i_want: /orb:setup to handle orbit-state initialisation and the .orbit/ layout in one atomic pass — not as a separate manual step
so_that: the .orbit/ layout, gitignore, and orbit-state initialisation land together — there is no half-set-up state where the workflow vocabulary exists but state initialisation is missing, and pilot rollouts to downstream projects can be a single command per project
goal: /orb:setup is the canonical orbit-state-init gate — running it on any project (greenfield or brownfield) leaves the .orbit/ workflow layout, the gitignore, and the SQLite index in a working state, with no manual orbit init step required by the operator
maturity: planned
scenarios:
- name: orbit-state precondition check refuses without orbit-state binary
  given: a project where orbit-state is not installed
  when: the user runs /orb:setup
  then: setup refuses with a one-line install instruction and exits without mutating the repo — orbit IS the orbit-state-native workflow, there is no useful orbit-without-state degradation
  gate: true
- name: Plugin version sanity requires orbit-state-compatible release
  given: the orbit plugin cache only contains pre-orbit-state versions
  when: the user runs /orb:setup
  then: setup refuses with a message naming the missing minimum version, since the new setup pathway depends on orbit-state primitives
  gate: false
- name: Greenfield setup creates .orbit/ layout and initialises state in one pass
  given: a project with no .orbit/ directory and no prior orbit artefacts
  when: the user runs /orb:setup
  then: setup creates .orbit/cards/, .orbit/choices/, .orbit/specs/, .orbit/cards/memos/; runs orbit init to scaffold the SQLite index and ship .orbit/.gitignore; writes the CLAUDE.md vocabulary block — all in a single idempotent pass
  gate: false
- name: Brownfield with orbit/ but no .orbit/ prompts before migrating
  given: a project that already has .orbit/cards, .orbit/choices, .orbit/specs from a pre-orbit-state version
  when: the user runs /orb:setup
  then: setup detects the gap and prompts before mutating; the prompt names what will move (orbit/ → .orbit/, decisions/ → choices/, MD → YAML); on yes, the migration runs idempotently
  gate: false
- name: Brownfield with both .orbit/ and initialised state is a clean no-op
  given: a project that already has .orbit/ and orbit-state initialised
  when: the user runs /orb:setup
  then: setup verifies the layout, reports what is in place, and exits without mutating anything — running setup on a fully-initialised project is safe and emits no warnings
  gate: false
- name: Drive's input contract surfaces "run setup first" when state is uninitialised
  given: a project where /orb:setup has not been run (no .orbit/ directory)
  when: the user runs /orb:drive
  then: drive halts at its input contract with a message naming /orb:setup as the prerequisite — rather than failing downstream when orbit commands fail mid-pipeline
  gate: false
- name: Smoke-test stays out of setup
  given: setup has just completed successfully
  when: the user wants to validate the orbit-state-native flow end-to-end
  then: setup does not auto-run a drive — validation is a separate operator concern (manual /orb:drive on an existing card, or a future /orb:smoke-test skill if it earns its keep)
  gate: false
specs: []
relations:
- card: 0008-consolidated-orbit-artefact-folder
  type: feeds
  reason: setup creates the .orbit/ structure that 0008 specifies
- card: 0020-orbit-state
  type: depends-on
  reason: setup runs orbit init under the hood; without orbit-state the setup pathway has no implementation
references:
- 'plugins/orb/skills/setup/SKILL.md: current setup skill — handles orbit/ layout and CLAUDE.md vocabulary; needs orbit-state awareness rewrite'
- '.orbit/choices/0015-orbit-state-architecture.md: substrate decision that makes setup-without-orbit-state a non-state'
- '.orbit/cards/memos/2026-05-06-orbit-state.md: the .orbit/ layout setup creates'
notes: []
