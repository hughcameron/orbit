id: 0013-routine-proposals
feature: Routine proposals from recurring skill chains
as_a: author
i_want: an agent that has observed the same chain or DAG of skill invocations recur across two or more sessions or cards to surface a proposal for promoting the chain into a named routine — for my approve / edit / reject
so_that: the substrate accretes named, valid routines (joining /orb:drive, /orb:rally, /orb:release) and my attention stays at vision-level thinking — the "how" lives in named routines, my time stays on the "what next" — while I retain final say on what becomes a first-class routine
goal: agents observing recurring chains or DAGs of existing skill invocations surface proposals to promote the chain into a named routine, with author approval as the gate — preserving the author's time for vision-level thinking by encoding the "how" as named substrate; complementary to card 0022 (single-skill authoring) which handles recurring procedures within one domain
maturity: planned
scenarios:
- name: Agent surfaces a routine proposal on recurring chain
  given: an agent has invoked the same chain of skills (e.g. /orb:tabletop → /orb:spec → /orb:implement → /orb:review-pr) two or more times across sessions or cards with consistent ordering
  when: the agent recognises the recurrence
  then: it surfaces a proposal artefact naming the chain, the recurrence evidence (links to prior session or card invocations), the proposed routine shape, and an approve / edit / reject prompt — the author is the gate
  gate: false
- name: Chains and DAGs are distinct shapes
  given: a recurring multi-skill pattern is being proposed
  when: the agent picks the routine shape
  then: a strictly sequential pattern is proposed as a chain (e.g. /orb:release — bump → commit → push → reload); a pattern with branching, parallelism, or conditional skips is proposed as a DAG (e.g. /orb:rally fanning out parallel drives) — the shape determines whether the routine needs simple sequence or explicit branch / fan-out logic
  gate: false
- name: Complementary to single-skill authoring (card 0022)
  given: an agent observes a recurrence pattern
  when: the agent picks the promotion path
  then: a recurring multi-step procedure within one domain routes to card 0022's skill-author spec (single SKILL.md, single intent); a recurring chain of existing skill invocations routes to this card's routine proposal — sibling paths, not duplicates
  gate: false
- name: Author approve / edit / reject is the lever
  given: the agent has surfaced a routine proposal
  when: the author responds
  then: approve scaffolds the routine skill or extends an existing meta-skill; edit lets the author rewrite the chain definition before scaffolding; reject discards the proposal and the agent does not re-surface the same chain in subsequent sessions
  gate: false
- name: Threshold mirrors the failure-routing convention
  given: a chain has been observed once, or with inconsistent ordering across runs
  when: the agent considers surfacing a proposal
  then: it does not — the threshold is two or more occurrences with consistent ordering (and consistent branch logic for DAGs), mirroring the recurrence threshold in `.orbit/conventions/skill-self-improvement.md`, and below that the agent records the chain observation but does not propose
  gate: false
specs: []
relations:
- card: 0022-skill-curator
  type: depends-on
  reason: 0022 handles single-purpose skills from recurring procedures within one domain; this card handles routines composed of existing skills — sibling paths sharing the curator lifecycle metadata, recurrence threshold, and approve / edit / reject lever, differing only in artefact shape (single SKILL.md vs chain or DAG of skill invocations)
- card: 0028-four-pillars
  type: feeds
  reason: pillar 2 (agent self-learning) is the mechanism; pillar 1 (author-level interaction) is the load-bearing why — named routines preserve the author's time for vision-level thinking by encoding the "how" as substrate
references:
- '.orbit/conventions/skill-self-improvement.md: shared recurrence threshold (two or more same-skill / same-outcome) and SkillInvocation substrate this card mirrors at the chain level — failure-routing for single skills is the convention''s domain; success-routing for chains is this card''s'
- 'plugins/orb/skills/drive/SKILL.md: shipped example — orchestrates tabletop → spec → implement → review-pr as a single named routine, proving the value at deep scale'
- 'plugins/orb/skills/rally/SKILL.md: shipped example — fans out parallel drives as a DAG, proving the value at fan-out scale'
- 'plugins/orb/skills/release/SKILL.md: shipped example — bump → commit → push → reload as a sequential chain, proving the value at mechanical scale'
notes:
- 2026-05-22 — Card renamed skill-orchestration-proposals → routine-proposals. Vocabulary refinement during the tabletop Q1 walk — "routine" is the user-language term (what authors say in plain voice); "orchestration" survives only as a technical descriptor when needed. Goal field updated to name the load-bearing concern explicitly — pillar 2 (agent self-learning) is the mechanism; pillar 1 (author-level interaction, vision-time preservation) is the load-bearing why.
- 2026-05-22 — Card reframed playbook-fast-path → skill-orchestration-proposals (earlier in the same session). Original framing (skip Socratic Q&A on agent-recognised investigations) solved a problem choice 0012 (`design-intent-not-means`) already handled. First reframe attempt (success-routing for individual skills) was retired on discovery that card 0022 already covers single-skill authoring. Accepted reframe targets the empty wedge — orchestration of existing skills into named chains or DAGs — with /orb:drive, /orb:rally, and /orb:release as shipped proof. Id 0013 retained across both renames.
