name: Release

# Tag-driven release of the orbit binary. Mirrors the finetype pipeline:
# build per-target archives + sha256 → publish a GitHub release →
# update Formula/orbit.rb in meridian-online/homebrew-tap.
#
# Targets per spec orbit-distro ac-02: mac arm/x86, linux arm/x86.
# Windows is not in scope — orbit's primary install audience runs on
# unix-like shells via Claude Code.
#
# Prerequisites once the repo lives at meridian-online/orbit:
#   - secrets.HOMEBREW_TAP_TOKEN: PAT with write access to
#     meridian-online/homebrew-tap (Formula/ path).
#   - meridian-online/homebrew-tap exists with a Formula/ directory.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: orbit-state -> target
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        working-directory: orbit-state
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p orbit-state-cli --bin orbit
          else
            cargo build --release --target ${{ matrix.target }} -p orbit-state-cli --bin orbit
          fi

      - name: Package
        shell: bash
        working-directory: orbit-state
        run: |
          cd target/${{ matrix.target }}/release
          ARCHIVE="orbit-${{ github.ref_name }}-${{ matrix.target }}"
          tar czf "../../../../${ARCHIVE}.tar.gz" orbit
          cd ../../../..

      - name: Generate SHA256
        shell: bash
        run: |
          ARCHIVE="orbit-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-${{ matrix.target }}
          path: |
            orbit-*.tar.gz
            orbit-*.sha256

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/orbit-*.tar.gz
            artifacts/orbit-*.sha256

  update-homebrew:
    name: Update homebrew-tap formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 files
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            curl -sfLO "${BASE}/orbit-${TAG}-${target}.tar.gz.sha256"
          done
          ls -la *.sha256

      - name: Parse SHA256 values
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "aarch64_macos=$(awk '{print $1}' orbit-${TAG}-aarch64-apple-darwin.tar.gz.sha256)"   >> "$GITHUB_OUTPUT"
          echo "x86_64_macos=$(awk '{print $1}' orbit-${TAG}-x86_64-apple-darwin.tar.gz.sha256)"     >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=$(awk '{print $1}' orbit-${TAG}-aarch64-unknown-linux-gnu.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(awk '{print $1}' orbit-${TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256)"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: meridian-online/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          cat > homebrew-tap/Formula/orbit.rb << FORMULA
          class Orbit < Formula
            desc "Files-canonical agent substrate for Claude Code orbit workflow"
            homepage "https://meridian.online/projects/orbit/"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/orbit-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.aarch64_macos }}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/orbit-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.x86_64_macos }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/orbit-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.aarch64_linux }}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/orbit-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.x86_64_linux }}"
              end
            end

            def install
              bin.install "orbit"
            end

            test do
              assert_match "orbit", shell_output("#{bin}/orbit --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/orbit.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update orbit to ${{ steps.version.outputs.version }}"
          git push
