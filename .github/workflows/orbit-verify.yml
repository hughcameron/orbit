# orbit-state v0.1 CI gates.
#
# - ac-16 (round-trip): every canonical YAML under .orbit/{specs,cards,choices,
#   memories} plus schema-version round-trips byte-identical via the canonical
#   writer. Failure blocks merge.
# - ac-17 (verify):     the SQLite index rebuilds from files alone with no
#   parse failures. Failure blocks merge.
#
# Both ACs land via a single `orbit verify` invocation — the binary aggregates
# the round-trip iteration and the index rebuild into one outcome and exits
# non-zero on any drift. See orbit-state/crates/core/src/verify.rs for the
# scope rationale (tasks excluded; schema-version included).
#
# Workspace tests run first as the foundational gate — a broken core makes
# the verify gate's signal noisy.

name: orbit verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          # Cache key includes Cargo.lock; the orbit-state workspace
          # is the build target.
          rustflags: ""

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            orbit-state/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('orbit-state/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Workspace tests
        run: cargo test --workspace --no-fail-fast
        working-directory: orbit-state

      - name: Build orbit binary
        run: cargo build --bin orbit --release
        working-directory: orbit-state

      - name: orbit verify (ac-16 round-trip + ac-17 index rebuild)
        run: ./orbit-state/target/release/orbit --root . verify
