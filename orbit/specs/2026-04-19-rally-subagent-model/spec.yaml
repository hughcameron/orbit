  test_prefix: "rallysub"
  timestamp: "2026-04-20T20:00:00Z"
  ambiguity_score: 0.12
  interview_ref: "orbit/specs/2026-04-19-rally-subagent-model/interview-2026-04-20.md"
  prior_interview_ref: "orbit/specs/2026-04-19-rally-subagent-model/interview.md"
  review_ref: "orbit/specs/2026-04-19-rally-subagent-model/review-spec-2026-04-20-c2.md"
