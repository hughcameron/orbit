goal: "Refine the rally skill's sub-agent orchestration model to honestly describe what Claude Code's primitives provide — trust + post-verify path discipline, parallel sub-agents running drive-full with nested forked reviews, thin-card guard at proposal, and lead-owned rally.yaml writes"

constraints:
  - "Path discipline for design sub-agents is trust + post-verify — the brief names the spec_dir, the lead verifies on return. No claim of native path enforcement via tools allow-list or similar."
  - "Parallel implementation sub-agents run drive in full autonomy inside their worktree. Drive-full's review-spec and review-pr stages spawn their own nested forked Agents — this is recursive context separation, not self-review."
  - "Rally refuses at proposal any rally containing a card with fewer than 3 scenarios, regardless of eventual serial-or-parallel outcome. Thin cards must be thickened via /orb:card or removed before rally proceeds; the author can still run thin cards via individual /orb:drive guided/supervised."
  - "rally.yaml is written only by the lead agent. Sub-agents are briefed with card, interview.md, and spec_dir — they never read or write rally.yaml."
  - "Parallel sub-agents run fire-and-forget in background via `Agent(..., run_in_background: true)`. The lead observes completion via the Agent tool's documented background-completion notification surfaced by the harness — no sleep, no poll, no sentinel files, no Monitor loop. 'Reacts to completion events' means: the harness posts the sub-agent's final message into the lead's turn and the lead handles it as its next event."
  - "Rally-level autonomy (guided | supervised) governs pauses between rally phases. Drive-level autonomy inside a sub-agent or inside serial execution is always full. The two are independent."
  - "The rally.yaml ontology gains a cards[].worktree field with explicit sentinels: the string 'main' for serial cards once launched, an absolute path for parallel cards once launched, null only before launch."
  - "Drive-full escalation from within a rally sub-agent — across all four triggers (budget exhaustion, recurring failure mode, contradicted hypothesis, diminishing signal) plus the synthetic BLOCK from drive-forked-reviews decision 0007 (review converged on REQUEST_CHANGES after 3 iterations) — is absorbed by rally's single-strike NO-GO policy. The sub-agent's internal iterations are the strike; rally does not retry at its level."
  - "Design sub-agent write verification is enforced on return by three primitives: sub-agent self-report of files written (contract imposed by the brief), artefact-existence assertion at the expected spec_dir path (completeness), and a pre-vs-post `git status --porcelain` snapshot diff in the main checkout as the independent verification. The lead captures `git status --porcelain` immediately BEFORE launching each design sub-agent (pre-snapshot) and again on return (post-snapshot); only entries present in post but absent from pre are attributed to the sub-agent. Of those new entries, any entry not under the sub-agent's assigned <spec_dir> and not on a fixed lead-owned allowlist (`orbit/specs/rally.yaml`) rejects the sub-agent's output per ac-04. The snapshot discipline eliminates false positives from pre-existing uncommitted state and from any lead-side mutations that happen to land between launch and return."
  - "Before delegating any card to a sub-agent or drive (parallel or serial), the lead commits the approved interview.md to the card's rally branch. For parallel cards, the worktree is created from that branch, so drive-full's §11 file-presence resumption detects interview.md and starts at the spec stage. For serial cards, drive-full runs in the main checkout against the same branch. No drive contract change."
  - "Serial implementation runs drive-full against the rally branch in the main checkout. Rally-level autonomy does not change drive's internal autonomy — serial cards are not automatically drive-guided or drive-supervised. A thin card that bypasses rally via individual /orb:drive can choose any autonomy, but once inside a rally, drive's autonomy is full regardless of serial-or-parallel."
  - "rally.yaml lives only on main. The lead writes rally.yaml while checked out to main. Before delegating a card, the lead checks out the card's rally branch (serial) or creates/enters the worktree (parallel); before writing rally.yaml again, the lead checks back out to main. Rally branches never contain rally.yaml."
  - "This spec is a refinement of orbit/specs/2026-04-19-rally/spec.yaml (v2.0), not a replacement. The earlier spec's ACs for invocation, design, consolidated review, implementation coordination, assurance, visibility, and completion remain in force where not directly amended here."

acceptance_criteria:
  # --- Thin-card guard at proposal (F-03 resolved: pessimistic-at-proposal) ---
  - id: ac-01
    ac_type: code
    description: "The rally proposal gate checks scenario counts on every candidate card. If any candidate card has fewer than 3 scenarios, the proposal flags the card by name and scenario count and refuses to proceed until the author either thickens the card via /orb:card or removes it from the rally list. The refusal is unconditional on the eventual serial-or-parallel outcome — the gate runs before the disjointness check."
    verification: "Invoke /orb:rally with a candidate list that includes a card with 2 scenarios. Verify the proposal flags the card by name, names the scenario count, and does not accept approval until the card is thickened or removed. Verify the guard fires before any design sub-agent is launched."

  # ac-02 RETIRED in v1.1 (F-03 pessimistic-at-proposal supersedes the serial carve-out).
  # The author can still run thin cards via individual /orb:drive guided/supervised outside a rally.

  # --- Design sub-agent path discipline (F-02 + F-10 resolved) ---
  - id: ac-03
    ac_type: doc
    description: "The rally SKILL.md §4a (Design — Launch N design sub-agents) no longer claims that the tools allow-list blocks writes outside the assigned spec_dir. The section names trust + post-verify as the discipline: brief instructs the sub-agent where to write; lead verifies on return with the three primitives from constraint #9."
    verification: "Read plugins/orb/skills/rally/SKILL.md §4a. Verify the phrase 'tools allow-list' does not appear as an enforcement mechanism. Verify the section names the three post-return verification primitives (self-report, artefact assertion, git status scan)."

  - id: ac-04
    ac_type: code
    description: "Before launching a design sub-agent, the lead captures a pre-snapshot: `git status --porcelain` in the main checkout. After the sub-agent returns, the lead performs a three-primitive verification pass: (1) parses the sub-agent's returned JSON file list (contract imposed by the brief), (2) asserts the expected artefact exists at <spec_dir>/{decisions.md|interview.md} and every returned path is under <spec_dir>, (3) captures a post-snapshot `git status --porcelain` and computes the set difference (post \\ pre). Any entry in that difference that is neither under <spec_dir> nor on the fixed lead-owned allowlist (`orbit/specs/rally.yaml`) rejects the sub-agent's output. Entries present in both pre and post are treated as pre-existing lead-side state and ignored. A first violation triggers a pre-qualification re-brief with an explicit path warning naming the unexpected entry — this re-brief is a pre-qualification retry, NOT a rally-level strike, and does not count against any drive-full escalation budget. A second violation parks the card with parked_constraint 'sub-agent violated path discipline'."
    verification: "Simulate a design sub-agent that returns a file list missing an extra file it wrote at `plugins/orb/scratch.md` (outside orbit/specs/). Verify the snapshot-diff catches the entry. Simulate a second case where the extra write is at `orbit/specs/other-slug/leak.md`; verify the diff catches that too. Simulate a case where an unrelated file (e.g. CLAUDE.md) was dirty BEFORE the sub-agent launched: verify the pre-snapshot includes it, the post-snapshot still includes it, the set difference excludes it, and the sub-agent is not rejected. Simulate a case where the lead wrote `orbit/specs/rally.yaml` between launch and return: verify allowlist masking. Verify the first violation triggers re-brief (not a strike). Simulate a second violation on the same card; verify the card is parked with the named constraint."

  - id: ac-05
    ac_type: doc
    description: "The v2.0 spec's ac-06 is amended to match the trust + post-verify model. Description and verification no longer say 'verify the write is blocked' — they say 'verify unexpected writes are detected on return via self-report + artefact assertion + unscoped git status scan (minus allowlist), and the sub-agent output is rejected.'"
    verification: "Read orbit/specs/2026-04-19-rally/spec.yaml ac-06. Verify the description and verification fields reflect the post-verify three-primitive model with unscoped git status."

  # --- Parallel implementation via drive-full + nested forks (F-01 resolved by drive-forked-reviews PR #6) ---
  - id: ac-06
    ac_type: code
    description: "When rally enters parallel implementation, the lead launches one Agent-tool invocation per card with run_in_background: true. Each sub-agent's brief instructs it to run /orb:drive <card> full inside its assigned worktree, using the already-produced interview.md at <spec_dir>/interview.md (committed to the rally branch per ac-16) as the design input. Drive-full's §11 resumption detects the file and starts at the spec stage. Implementation and verification of this AC are gated on drive-forked-reviews (PR #6) being merged to main — see the first exit condition."
    verification: "After PR #6 is merged: trigger a 2-card parallel rally. Verify two Agent-tool calls are made with run_in_background: true. Verify each brief names the card path, the worktree path, full autonomy, and the existing interview.md. Verify drive-full inside each sub-agent skips the design stage and starts at spec."

  - id: ac-07
    ac_type: doc
    description: "Rally SKILL.md §7 Parallel Implementation explicitly states that sub-agents run drive-full, and that drive-full's review-spec and review-pr stages spawn their own nested forked Agents (per the drive-forked-reviews decisions — see orbit/decisions/0004-drive-verdict-contract through orbit/decisions/0007-drive-rerequest-budget, which ship on PR #6). This is recursive context separation (the forked-reviewer pattern used at the top level of drive), not self-review. The pointer in SKILL.md must name the four decisions explicitly rather than an inclusive range, to avoid collision with this spec's own decisions once renumbered to 0008+."
    verification: "Read plugins/orb/skills/rally/SKILL.md §7. Verify the section names drive-full, references nested forked Agents, points to the four drive-forked-reviews decisions by title (verdict-contract, review-artefact-contract, cold-re-review, rerequest-budget), and uses the phrase 'recursive context separation' or equivalent."

  - id: ac-08
    ac_type: code
    description: "Sub-agent briefs for parallel implementation forbid reading or writing rally.yaml. The brief states: 'Do not read rally.yaml. Do not write rally.yaml. Report progress by returning a structured verdict at the end.'"
    verification: "Inspect the parallel sub-agent brief template. Verify the forbidden-paths clause is present."

  - id: ac-09
    ac_type: code
    description: "On each parallel sub-agent completion, the lead receives the Agent tool's background-completion notification (the sub-agent's final message surfaced into the lead's turn by the harness — no polling, no sentinel). The lead reads the returned verdict (complete, parked, or escalated) and serialises a single rally.yaml write for that card while checked out to main (per constraint #12). N sub-agent completions produce exactly N rally.yaml writes, in the order completions are surfaced by the harness."
    verification: "Complete a 3-card parallel rally. Inspect rally.yaml history (via `git log -p -- orbit/specs/rally.yaml` on main between launch and completion events). Verify exactly 3 per-card status transitions were written on main, each attributable to a single sub-agent completion. Verify the lead code path reads the Agent subprocess result directly and does not call any polling or Monitor loop."

  # --- Rally-level autonomy semantics ---
  - id: ac-10
    ac_type: doc
    description: "Rally SKILL.md explicitly states that rally-level autonomy (guided | supervised) governs pauses between rally phases (proposal, consolidated decision gate, consolidated design review, batched diff review), and is independent of the drive autonomy used inside a sub-agent or inside serial execution (always full in both cases)."
    verification: "Read plugins/orb/skills/rally/SKILL.md Autonomy Levels section. Verify the distinction between rally-level and drive-level autonomy is explicit, and that drive autonomy is always full both in the parallel sub-agent path and in the serial main-checkout path."

  # --- rally.yaml ontology extension (F-07 resolved: explicit sentinels) ---
  - id: ac-11
    ac_type: code
    description: "The RallyState ontology schema adds a cards[].worktree field (type: string, nullable) with explicit sentinel semantics: the literal string 'main' for serial cards once launched (the lead's main checkout), an absolute path for parallel cards once launched, null only before launch. rally.yaml writes reflect this field consistently; null-after-launch is treated as a validation error. Path resolution rule: when worktree == 'main', the lead resolves drive.yaml as `<main checkout root>/specs/<spec_dir>/drive.yaml` with no worktree prefix; when worktree is an absolute path, the lead resolves `<worktree>/specs/<spec_dir>/drive.yaml`."
    verification: "Inspect rally.yaml during a parallel rally after sub-agent launch. Verify each parallel card has an absolute-path worktree. Inspect rally.yaml during a serial rally after the first card is launched. Verify the launched card's worktree equals 'main'. Corrupt rally.yaml by setting worktree=null on a launched card; verify validation reports the violation. Exercise the lead resolver for both sentinels; verify 'main' produces `<root>/specs/...` and an absolute path produces `<wt>/specs/...`."

  - id: ac-12
    ac_type: code
    description: "rally.yaml validation (from v2.0 ac-04) recognises the cards[].worktree field. Missing worktree on a card whose status is implementing produces a validation error. worktree present but pointing to a non-existent directory sets an in-memory worktree_missing flag on that card; the lead emits ONE warning via its user-visible context at rally resumption or the next rally.yaml-writing transition, then suppresses the warning on subsequent reads while the worktree remains missing. The warning is not a validation error. For serial cards (worktree=='main'), the check is skipped — 'main' is assumed to exist."
    verification: "Corrupt rally.yaml by removing worktree from an implementing card during a parallel rally. Verify validation reports the missing field (hard error). Restore, then delete the worktree directory; resume the rally and verify the lead emits exactly one user-visible warning naming the card. Invoke rally.yaml reads N more times; verify no additional warnings are emitted. Verify serial cards with worktree=='main' do not trigger the missing-directory check."

  # --- Resumption ---
  - id: ac-13
    ac_type: code
    description: "Parallel rally resumption: when the lead restarts with an active rally, it reads rally.yaml for coordination state (on main per constraint #12), then for each implementing card applies the ac-11 path resolution rule to locate drive.yaml and determine per-card sub-stage. The lead reports each card's resume point (e.g. 'card A at review-pr, card B at implement') before re-launching any sub-agents."
    verification: "Start a 2-card parallel rally, kill the lead session mid-implementation. Restart and invoke /orb:rally. Verify the resume message reads both worktrees' drive.yaml files via the ac-11 resolver and reports per-card sub-stage. Run the same test with a serial card whose worktree=='main'; verify the resolver returns the main-checkout path and the resume message is correct."

  # --- Escalation absorbed into park (F-04 resolved: all five triggers) ---
  - id: ac-14
    ac_type: code
    description: "When a parallel sub-agent's drive-full returns an escalation — budget exhaustion, recurring failure mode, contradicted hypothesis, diminishing signal, or the synthetic BLOCK from drive-forked-reviews decision 0007 (review converged on REQUEST_CHANGES after 3 iterations) — the lead absorbs it as a single-strike NO-GO park. rally.yaml records the card as parked with parked_constraint set to drive's escalation-reason label prepended to the one-line reason, e.g. '[budget] <reason>', '[contradicted] <reason>', '[review_converged] review converged on REQUEST_CHANGES after 3 iterations...'. Rally does not retry at its level; drive's 3 internal iterations are the strike. Implementation and verification of this AC are gated on drive-forked-reviews (PR #6) being merged to main."
    verification: "After PR #6 is merged: trigger one parallel sub-agent per escalation trigger (mock five scenarios, one per trigger type). For each, verify the lead records parked_constraint with the correct bracketed label. Verify the rally continues with remaining cards in all five cases."

  # --- Cross-cutting: spec coherence (F-05 resolved: mechanical keyword scan) ---
  - id: ac-15
    ac_type: code
    description: "A keyword-scan script asserts SKILL.md coherence: (a) forbidden phrases absent — 'tools allow-list', 'drive's stage logic inline' in the parallel section, 'writes are blocked'; (b) required phrases present — 'trust + post-verify', 'recursive context separation', 'drive-full', 'nested forked Agents'. The scan is runnable as a standalone check at plugins/orb/scripts/rally-coherence-scan.sh and invoked at implementation review time."
    verification: "Run plugins/orb/scripts/rally-coherence-scan.sh against a clean rally/SKILL.md. Verify exit 0 and a summary line per phrase. Mutate SKILL.md to add a forbidden phrase; verify exit non-zero and the offending line is named. Mutate to remove a required phrase; verify exit non-zero."

  # --- New: interview.md provisioning (F-11) ---
  - id: ac-16
    ac_type: code
    description: "Before delegating any card, the lead commits the approved interview.md to the card's rally branch. For parallel cards, the worktree is then created from that branch via `git worktree add`. For serial cards, the lead checks out the rally branch in the main checkout. The sub-agent's drive-full detects interview.md at <spec_dir>/interview.md via §11 file-presence resumption and starts at the spec stage in both cases. Lead write ordering for rally.yaml is governed by constraint #12: the lead returns to main before any rally.yaml write."
    verification: "Complete a 2-card parallel rally. Inspect each rally branch's git log — verify the first commit is 'rally/<slug>: approved design' and the worktree was created from the committed branch state (git worktree list shows the rally branch). For a serial rally, verify the main checkout is on the rally branch during implementation and on main during each rally.yaml write (git reflog on HEAD shows the checkout back-and-forth). Verify drive-full starts at spec, not design."

  # --- New: honesty auditability (F-08) with concrete citation vocabulary (R4) ---
  - id: ac-17
    ac_type: code
    description: |
      Every mechanism SKILL.md §2, §4a, §7, and §11 claims to enforce is either (a) backed by a
      named Claude Code primitive cited inline, or (b) explicitly marked as a convention/trust +
      post-verify pattern. The rally-coherence-scan (ac-15) is extended to enforce this via an
      80-character adjacency check with a fixed, mechanical vocabulary:

      Enforcement verbs (case-insensitive, whole-word): enforced | enforces | blocked | blocks |
      prevented | prevents | guaranteed | guarantees.

      Accepted primitive citations (case-sensitive literals, backticks optional — the scanner
      strips backticks before matching):
        "Agent tool", "run_in_background", "git worktree add", "git status --porcelain",
        "git commit", "git checkout", "git branch", "AskUserQuestion", "SessionStart",
        "Bash", "Read", "Write", "Edit", "Grep", "Glob", "file-on-disk".

      Accepted trust-marker phrases (case-sensitive literals):
        "trust + post-verify", "post-verify", "convention".

      Negation whitelist — if any of these tokens appears within the same 80-char window as the
      enforcement verb, the line is accepted as honest-negation and the adjacency requirement
      is waived: "not", "no ", "never", "cannot", "without", "trust-only".

      Window: 80 characters, counted forward from the last character of the enforcement verb.
      The window may span a single line break but not a blank line. The 80-char value is the
      working default; the implementation MUST first run the scan against the current rally
      SKILL.md and tune the window down to the smallest value at which every legitimate existing
      claim still passes, recording the tuned value in the script with a comment citing this AC.
    verification: |
      Run the extended rally-coherence-scan against the updated rally SKILL.md. Verify every
      enforcement claim in the named sections passes the adjacency check with the tuned window.
      Mutations to check:
      1. Add "writes are guaranteed to land in spec_dir" with no primitive or trust-marker
         within the window → scan fails, names the line.
      2. Add "writes are not blocked by the allow-list" → negation whitelist accepts it; scan
         passes the line.
      3. Add "writes are blocked via the `Agent tool` brief contract" → primitive citation;
         scan passes the line.
      4. Add "writes are blocked — trust + post-verify" → trust-marker; scan passes the line.

ontology_schema:
  name: "RallyState"
  description: "Extended from v2.0 to include the worktree path for sub-agent resumption, with explicit sentinel semantics"
  fields:
    - name: "cards[].worktree"
      type: "string"
      description: "Explicit sentinel: 'main' for serial cards once launched, an absolute path for parallel cards once launched, null only before launch. Used by the lead on resumption to locate each card's drive.yaml for sub-stage detection via the ac-11 path-resolution rule. null-after-launch is a validation error (ac-11)."

evaluation_principles:
  - principle: "Honesty — the spec and SKILL.md describe what Claude Code actually provides, not what an ideal architecture would provide. Trust is named as trust; enforcement is named only where it exists; dependencies on unmerged work are named as dependencies. ac-17 makes enforcement claims auditable via an extended coherence scan with a concrete citation vocabulary."
    weight: 0.35
  - principle: "Interaction quality — inherited from v2.0. Every human touchpoint presents maximum clarity based on the best available evidence. The honesty principle serves interaction quality by ensuring the author is not misled about orchestration guarantees."
    weight: 0.25
  - principle: "Coherence — SKILL.md, v2.0 spec, and this spec are internally consistent. A reader holding any one of them has a correct mental model of the others. ac-15's keyword scan enforces this mechanically."
    weight: 0.20
  - principle: "Minimality — this refinement adds four constraints, retires one AC, amends eight ACs, adds two new ACs, and adds one script. No new files beyond rally-coherence-scan.sh, no new hooks, no new state layers."
    weight: 0.20

exit_conditions:
  - "PR #6 (drive-forked-reviews) is merged to main before this spec's ac-06, ac-07, ac-14 are implemented or verified. The sequencing is non-negotiable: until PR #6 merges, drive does NOT fork its reviews, and any claim otherwise violates the honesty principle."
  - "plugins/orb/skills/rally/SKILL.md §2, §4a, §7, and Autonomy Levels are updated per ac-03, ac-05, ac-07, ac-10"
  - "plugins/orb/skills/rally/SKILL.md §11 (or equivalent resumption section) documents the commit-before-worktree discipline per ac-16, the rally.yaml-on-main discipline per constraint #12, and the ac-11 path-resolution rule"
  - "orbit/specs/2026-04-19-rally/spec.yaml ac-06 and ac-14 are amended per ac-05 and ac-07 of this spec"
  - "orbit/specs/2026-04-19-rally/spec.yaml metadata.review_changes line claiming tools allow-list as the HIGH resolution is rewritten to reflect trust + post-verify (F-09 resolution)"
  - "RallyState ontology (in orbit/specs/2026-04-19-rally/spec.yaml) has the cards[].worktree field added with sentinel semantics per ac-11"
  - "rally.yaml validation recognises the new field (ac-12)"
  - "The thin-card guard is implemented in SKILL.md §2 (ac-01); ac-02 removed from v1.1"
  - "plugins/orb/scripts/rally-coherence-scan.sh exists, has its 80-char window tuned against the current SKILL.md per ac-17, and passes against the updated SKILL.md (ac-15, ac-17)"
  - "The /orb:review-pr verdict on this spec's implementation is APPROVE"

