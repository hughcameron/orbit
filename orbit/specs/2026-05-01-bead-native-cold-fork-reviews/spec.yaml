goal: "review-spec and review-pr read the bead acceptance field directly via `bd show <bead-id> --json` and `parse-acceptance.sh`, with rule-coverage parity to the prior spec.yaml-based reviewers — including end-to-end gate-AC parity for beads created via `promote.sh` from cards. Drive's snapshot-bridge artefacts and references are removed pipeline-wide. Verdict files stay at `orbit/reviews/<bead-id>/review-{spec,pr}-<date>.md` for both forked and inline invocations."

constraints:
  - "Cold-fork architecture preserved: reviewers run as forked general-purpose Agents with no shared conversation history (decision 0011-beads-execution-layer §D2). The Agent brief carries only the bead-id, the absolute output path for the verdict file, and the canonical verdict-line contract — no snapshot path, no AC payload, no spec text."
  - "Verdict-line contract unchanged: canonical `**Verdict:** APPROVE | REQUEST_CHANGES | BLOCK` matched by drive's strict regex `^\\*\\*Verdict:\\*\\* (APPROVE|REQUEST_CHANGES|BLOCK)\\s*$`. Drive's verdict-parsing logic is not modified by this spec."
  - "Verdict-file path contract unchanged for forked invocation: `orbit/reviews/<bead-id>/review-{spec,pr}-<date>.md` with `-v2.md` / `-v3.md` cycle suffixes. Inline (human-invoked) default path moves to the same `orbit/reviews/<bead-id>/...` shape so there is one path contract under bead substrate."
  - "Bead acceptance convention unchanged: `orbit/conventions/acceptance-field.md` stays one-line-per-AC with optional `[gate]` marker. No new fields, no multi-line per-AC syntax. The card schema and `promote.sh` are extended to propagate gate semantics from card scenarios into the bead's acceptance field — this is the only schema-level change."
  - "Both review skills use `plugins/orb/scripts/parse-acceptance.sh` for AC enumeration. AC interpretation cannot drift between `/orb:implement` and either review skill."
  - "Hard cutover: no `review_mode` flag, no dual code paths, no auto-detect logic. In-flight snapshot-bridge drives finish under their start-time skill version. Same migration discipline as the forked-reviews migration shipped earlier."
  - "No backward-compatibility shim for spec.yaml: review-spec and review-pr no longer accept a spec.yaml path — they expect a bead-id. Inline-mode invocation (a human running `/orb:review-spec` directly) takes a bead-id argument."
  - "Cold-fork purity is bounded by `acceptance_criteria` snapshotting: under bead substrate the fork sees current `[x]` marks via `parse-acceptance.sh acs`. This means review-spec re-fork after a cycle-1 implement-edit will inherit any AC status the implementer wrote. The leak is bounded by ordering (review-spec runs before implement on the canonical path) and accepted as the substrate cost; documented in MADR 0013's consequences. The brief's `no conversation context` prohibition continues to hold byte-for-byte; this constraint clarifies its scope."
  - "Decision-numbering: this spec resolves the existing `0011-` collision (`0011-beads-execution-layer.md` and `0011-design-intent-not-means.md`) before adding a new decision record. The renumber step is a prerequisite AC; the new substrate MADR is `0013` (the next free integer after the renumber)."

