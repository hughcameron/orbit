ontology_schema:
  name: "BeadNativeReviewSubstrate"
  description: "The substrate-mapping contract between spec.yaml conventions and bead acceptance-field conventions for cold-fork review skills, plus the gate-propagation pipeline from card to bead."
  fields:
    - name: "bead_id"
      type: "string"
      description: "The beads identifier (e.g. `orbit-6da.4`) passed to the review skill in place of a spec.yaml file path."
    - name: "ac_description"
      type: "string"
      description: "The AC text after the `ac-NN [gate]:` prefix in the bead acceptance field. Replaces spec.yaml's `description` + `verification` fields under bead substrate."
    - name: "is_gate"
      type: "boolean"
      description: "Parser-emitted flag (column 4 of `parse-acceptance.sh acs` output). Replaces spec.yaml's `ac_type: gate`. Sourced from the `[gate]` marker in the AC line, which is sourced from card scenario `gate: true` via promote.sh."
    - name: "scenario_gate"
      type: "boolean"
      description: "New optional field on card scenarios (default false). When true, promote.sh emits `[gate]` on the resulting AC line. Closes the end-to-end gate semantics from card to bead."
    - name: "verdict_path"
      type: "path"
      description: "Absolute path to the verdict file. For both forked and inline invocations: `orbit/reviews/<bead-id>/review-{spec,pr}-<date>[-vN].md`. The Agent brief's path takes precedence over the inline default when running forked."

evaluation_principles:
  - principle: "Fork purity — the brief is minimal, conversation context excluded"
    weight: 0.25
  - principle: "Substrate parity end-to-end — gate-AC and AC-coverage rules fire under the new substrate, AND gate semantics propagate from card scenario through promote.sh to bead AC"
    weight: 0.30
  - principle: "Hard cutover — no dual-mode code paths, snapshot bridge removed pipeline-wide (drive sections, Worked example, REQUEST_CHANGES return paths, Completion PR-body, inline-mode defaults)"
    weight: 0.25
  - principle: "Contract preservation — drive's verdict-line regex parser is not modified; verdict-file path contract holds for forked AND inline modes"
    weight: 0.20

exit_conditions:
  - "All thirteen ACs check off (parse-acceptance.sh next-ac returns empty)."
  - "Both test scripts (ac-08 and ac-11(d)) exit 0."
  - "MADR 0013 is committed and decision 0002's status updated."
  - "Card 0016 specs array updated, maturity flipped to `active`, and at least one scenario annotated with `gate: true`."

