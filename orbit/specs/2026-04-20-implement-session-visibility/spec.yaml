goal: "Extend the shipped /orb:implement pre-flight skill so the AC/constraint checklist is a first-class, real-time session artefact — created as tasks at pre-flight, kept in sync as the agent works, rebuilt faithfully on resume, and complemented by mid-run test visibility via Monitor. Do not alter the shipped behaviours (read spec, write progress.md, SessionStart constraint surfacing) and do not define any progress.md schema beyond what card 0009 owns."

constraints:
  - "Shipped pre-flight behaviour (card 0003 scenarios 1–7) is out of scope. The existing checklist-presentation, progress.md-write, and SessionStart constraint-surfacing must continue to work byte-identically. Any change to those paths is a regression."
  - "progress.md schema is owned by card 0009. This card MUST NOT add fields, sections, or parsing conventions to progress.md. The 'Spec hash:', 'Current AC:', '## Detours' section, 'Return to:' line, and '(gate)' annotation are consumed as given — if a shape is missing, add it to a 0009 successor spec, not here."
  - "progress.md is the single source of truth for task emission. TaskCreate (pre-flight) and TaskCreate/TaskUpdate (resume rebuild) derive from the parsed file, not from an in-memory extraction. No in-memory-only task emission path is permitted."
  - "Task emission is FLAT: one task per AC, one task per hard constraint. No `addBlockedBy` or `addBlocks` wiring. Dependency wiring for gate ACs is reserved for card 0009 or a successor — this card must leave the slot unwired so 0009 can layer in additively without reshaping task creation."
  - "TaskUpdate on AC completion is an agent-side SKILL rule — it fires in the same tool-call turn as the progress.md `- [x]` edit. It is NOT a PostToolUse hook, NOT a file watcher, NOT a batched checkpoint. Skill text must say so verbatim."
  - "Orbit-implement tasks MUST be scoped by a `metadata.spec_path` tag equal to the absolute or repo-relative path of the spec the task belongs to. The resume hook MUST filter tasks by this tag and MUST NOT touch tasks without it or with a different value."
  - "Monitor test invocations are only used when the test command is expected to exceed ~60s or is a full-suite run. Short tests (< ~60s, targeted subset) continue to use Bash. The rule is a SKILL.md heuristic, not a spec metadata field."
  - "Every Monitor test invocation MUST include a line-buffered failure-marker filter. The canonical filter is `grep --line-buffered -E 'FAIL|ERROR|AssertionError|Traceback'`. Unfiltered Monitor on a test suite is forbidden — every stdout line becoming a notification swamps the agent."
  - "On the first streamed failure line (FAIL/ERROR/AssertionError/Traceback), the agent MUST pause, acknowledge the failure inline, and AskUserQuestion the author (fix-now vs let-suite-finish) before continuing. Subsequent failures in the same run do not re-prompt — only the first. This rule applies ONLY in interactive mode (stdin is a TTY AND `ORBIT_NONINTERACTIVE` is unset or not `1`), mirroring card 0009 ac-02's AskUserQuestion discipline. In non-interactive mode (`/orb:drive`, rally, cron), the skill MUST NOT call AskUserQuestion — it emits the failure + a canonical stderr marker and halts with exit status 2 so the upstream orchestrator can route to a checkpoint. The non-interactive marker string is a single-source constant in implement/SKILL.md §5."
  - "The resume hook uses the shared parser this card authors (`plugins/orb/scripts/parse-progress.sh`, see ac-08) for AC/constraint extraction. No second parser is introduced. '## Detours' content MUST NOT count as AC status — this is card 0009's parser discipline (ac-09 there); this card must honour it inside the new shared parser. Card 0009's existing `session-context.sh` AC-surfacing code path is refactored by THIS card to source the new helper (single-source migration), so 'shared parser lives once' is enforced at merge time."
  - "Resume reconcile uses AC-ID + constraint-text matching. Match algorithm is deterministic and documented. On match (same set, same statuses), perform zero Task mutation calls. On drift (count mismatch OR any status mismatch), full rebuild: `TaskUpdate status: cancelled` on every stale filtered task, followed by `TaskCreate` for each expected item, with a single-line warning on stderr. No `TaskDelete` / `TaskStop` is used — cancellation via `TaskUpdate` is the disposal primitive."
  - "The canonical resume-rebuild warning string — `orbit: task list out of sync with progress.md, rebuilt from scratch` — is declared as a single named constant in `plugins/orb/skills/implement/SKILL.md` §5 and copied literally into the hook that emits it. Any change to wording routes through this card's spec. Test fixtures grep the skill file for the canonical string (single source of truth), and the hook for the copy — drift between the two is a failure."
  - "TaskCreate sequencing relative to card 0009's pre-AC check sequence is fixed as follows. FRESH RUN: the skill writes progress.md in §4 → emits tasks via §4d (TaskCreate loop) BEFORE the first AC's pre-AC check sequence runs. Task emission has no data dependency on the drift / gate checks — it depends only on the progress.md file that was just written. RESUME: the SessionStart path runs card 0009's pre-AC sequence first (backfill → drift → gate surfacing), THEN runs this card's resume reconcile. If the drift check halted the session (non-interactive ac-02 exit 1), resume reconcile does NOT run and no Task mutations are emitted — the session is aborted before either code path. If the drift was acknowledged (interactive), the reconcile runs against the post-acknowledge progress.md state."
  - "All behaviour changes land in existing files — `plugins/orb/skills/implement/SKILL.md`, `plugins/orb/scripts/session-context.sh` — or in new shared helpers under `plugins/orb/scripts/` (the shared parser introduced in ac-08). Do not add a new skill."

acceptance_criteria:
  - id: ac-01
    ac_type: code
    description: "After writing progress.md in step 4, the /orb:implement skill emits one pending task via TaskCreate for every hard constraint and every acceptance criterion parsed from progress.md. Each task carries `metadata.spec_path` set to the spec path (matching the value on the `Spec path:` line of progress.md). Task subjects are the constraint text (for constraint tasks) and `ac-NN: <description>` (for AC tasks). No `addBlockedBy` / `addBlocks` edges are set."
    verification: "isv_ac01_preflight_tasks_created: fixture progress.md with 3 constraints and 4 ACs (ac-01..ac-04, one marked `(gate)`). Simulate the implement skill's step 4 tail. Assert (i) TaskList filtered by `metadata.spec_path == <fixture spec path>` returns exactly 7 pending tasks and no others carry that tag, (ii) every returned task has metadata.spec_path equal to the fixture's Spec path line, (iii) constraint-task subjects match the constraint text verbatim, (iv) AC-task subjects match `ac-NN: <description>` verbatim (no `(gate)` suffix — annotation is progress.md only), (v) no task has blockedBy set, (vi) TaskList WITHOUT the spec_path filter contains at least the 7 fixture tasks (proves the tag is used, not replaced)."

  - id: ac-02
    ac_type: code
    description: "When the /orb:implement agent marks a checkbox from `- [ ] ac-NN` to `- [x] ac-NN` in progress.md, it MUST call TaskUpdate with `status: completed` on the corresponding task (the one whose subject starts with `ac-NN:` and whose metadata.spec_path matches) in the SAME tool-call turn as the progress.md edit. The skill rule is stated verbatim in SKILL.md §5."
    verification: "isv_ac02_task_update_on_ac_complete: (a) grep plugins/orb/skills/implement/SKILL.md for the literal string 'same tool-call turn' and assert the sentence states the TaskUpdate rule. (b) Simulate marking ac-02 complete via an Edit tool call on progress.md and a TaskUpdate in the same tool-call batch; assert the task's status transitions from pending to completed and the progress.md `- [x]` edit persisted. (c) Negative — simulate only the Edit (no TaskUpdate); assert the skill text explicitly calls this a protocol violation (grep for 'protocol violation' OR 'violation of §5 rule' near the same-turn sentence)."

  - id: ac-03
    ac_type: code
    description: "On session resume, the SessionStart path (session-context.sh or a companion script it sources) reconciles existing tasks against progress.md AFTER card 0009's pre-AC check sequence (backfill → drift → gate surfacing) completes. Reconcile algorithm: filter tasks by `metadata.spec_path == current spec path`; build the expected set from progress.md's ## Acceptance Criteria and ## Hard Constraints sections (using the shared parser from ac-08 — ## Detours content is ignored); compare count and per-item status. If (count equal) AND (every `ac-NN` task's status matches the progress.md `[ ]`/`[x]` state) AND (every constraint task's status matches), the hook does NOTHING — zero Task mutation calls. Otherwise, the hook full-rebuilds by (1) calling `TaskUpdate status: cancelled` on every stale filtered task, (2) calling `TaskCreate` for each item in the expected set, (3) emitting a single stderr warning whose text is the canonical single-source constant defined in implement/SKILL.md §5 — `orbit: task list out of sync with progress.md, rebuilt from scratch`. No `TaskDelete` is used. If card 0009's drift check halted the session (non-interactive exit 1), reconcile MUST NOT run."
    verification: "isv_ac03_resume_reconcile_or_rebuild: (a) In-sync fixture: task list matching progress.md exactly → run the resume reconcile → assert zero TaskCreate and zero TaskUpdate calls were issued (mock assertions) and no warning was emitted. (b) Status drift fixture: one task pending in task list but marked `[x]` in progress.md → run resume → assert (i) the pre-existing filtered tasks received `TaskUpdate status: cancelled` each, (ii) the expected set was re-emitted via TaskCreate, (iii) the warning string appeared verbatim on stderr and the emitted text matched the constant greppable in implement/SKILL.md. (c) Count drift fixture: progress.md has 5 ACs, task list has 4 → run resume → same cancel + rebuild + warning assertions. (d) Halt fixture: simulate card 0009's non-interactive drift halt (exit 1) prior to reconcile → assert zero Task mutation calls and the reconcile code path was never reached."

  - id: ac-04
    ac_type: code
    description: "The resume reconcile MUST ignore tasks that do not carry `metadata.spec_path`, and tasks whose `metadata.spec_path` differs from the current spec. A test fixture with (i) orbit-implement tasks for spec A, (ii) orbit-implement tasks for spec B, (iii) unrelated tasks without the tag: resume against spec A must only touch category (i) tasks."
    verification: "isv_ac04_resume_scoped_by_spec_path: fixture task list containing 3 tasks tagged spec-A, 2 tasks tagged spec-B, and 4 untagged tasks. Run resume reconcile against spec-A with a drifted progress.md → assert the 3 spec-A tasks each received `TaskUpdate status: cancelled` followed by their replacements via TaskCreate × (expected count), the 2 spec-B tasks were untouched (no TaskUpdate/TaskCreate on them — assert via task identity before/after), and the 4 untagged tasks were untouched. Assert via (i) count filtered by spec-A tag consistent with progress.md's expected set, (ii) count filtered by spec-B tag unchanged, (iii) untagged count unchanged, (iv) identity of spec-B and untagged task IDs unchanged pre-to-post."

  - id: ac-05
    ac_type: code
    description: "SKILL.md §5 gains a Monitor-for-tests rule stated verbatim: tests whose expected duration exceeds ~60s or which invoke a full-suite runner (e.g. `cargo test` without a filter, `pytest` at the repo root, `npm test`) MUST be launched via the Monitor tool with the command piped through `grep --line-buffered -E 'FAIL|ERROR|AssertionError|Traceback'`. Short targeted tests (< ~60s) continue to use Bash. The rule is a skill-text heuristic; no spec-level metadata field is introduced."
    verification: "isv_ac05_monitor_heuristic_documented: grep plugins/orb/skills/implement/SKILL.md and assert (i) the literal string 'grep --line-buffered' appears, (ii) the failure markers 'FAIL|ERROR|AssertionError|Traceback' appear (case-sensitive, pipe-separated), (iii) the 60-second threshold (literal '60s' or '60 seconds') appears in the same section, (iv) no new field is added to any schema YAML (grep plugins/orb/skills/spec-architect/SKILL.md and plugins/orb/skills/spec/SKILL.md for 'monitor' or 'test_command' — neither should reference this heuristic as a spec field)."

  - id: ac-06
    ac_type: code
    description: "SKILL.md §5 gains a first-failure checkpoint rule with an explicit interactive / non-interactive split, mirroring card 0009 ac-02's AskUserQuestion discipline. INTERACTIVE path (stdin is a TTY AND `ORBIT_NONINTERACTIVE` is unset or not equal to `1`): on the first streamed line from Monitor that matches the failure-marker regex, the agent MUST pause mid-run, acknowledge the failure, and call AskUserQuestion with exactly two options — 'Fix the failure now (I will investigate and re-run)' and 'Let the suite finish, then triage'. Subsequent failure lines in the same Monitor run surface to the agent but do NOT re-prompt. The `first` semantics is per-Monitor-invocation: a new test run resets the gate. NON-INTERACTIVE path (`/orb:drive`, rally, cron, any context where `ORBIT_NONINTERACTIVE=1` OR stdin is not a TTY): the agent MUST NOT call AskUserQuestion. Instead, on the first matching failure line, emit the failure line plus the canonical non-interactive marker `orbit: first-failure checkpoint skipped (non-interactive); halting for upstream triage` to stderr, stop consuming further Monitor output, and halt with exit status 2. Subsequent failures in non-interactive mode are not surfaced (the halt consumes them). The exit-status-2 convention lets `/orb:drive` route this to a checkpoint without confusing it with a clean test-suite failure (exit 1)."
    verification: "isv_ac06_first_failure_checkpoint: (a) grep plugins/orb/skills/implement/SKILL.md for the literal strings 'first streamed' AND 'AskUserQuestion' in the same section. (b) Assert both interactive-path option strings appear verbatim in the skill text: 'Fix the failure now (I will investigate and re-run)' and 'Let the suite finish, then triage'. (c) Skill text must state that subsequent failures in the same Monitor run are surfaced but do NOT re-prompt — grep for 'subsequent failure' or 'do not re-prompt' near the first-failure rule. (d) Non-interactive fixture: simulate a Monitor run with `ORBIT_NONINTERACTIVE=1` set and no TTY on stdin → assert (i) AskUserQuestion was NOT invoked (mock/spy assertion, zero calls), (ii) the canonical non-interactive marker string `orbit: first-failure checkpoint skipped (non-interactive); halting for upstream triage` appeared verbatim on stderr, (iii) the process exited with status 2. (e) The canonical non-interactive marker string is declared verbatim in implement/SKILL.md §5 as a single-source constant (greppable) and copied literally into the implementation — the fixture greps the skill as source of truth."

  - id: ac-07
    ac_type: doc
    description: "SKILL.md §4 ('Write the Progress File') is extended with a sub-step '4d — Emit tasks' that describes the TaskCreate loop (constraints + ACs, flat tasks, metadata.spec_path). SKILL.md §5 is extended with the TaskUpdate rule (ac-02), the Monitor heuristic (ac-05), the first-failure checkpoint (ac-06), and the single-source canonical resume-rebuild warning constant (constraint #12). The pre-flight §1–§3 presentation flow and §4a–§4c template remain byte-identical to the shipped skill plus card 0009's additions — this card adds ONLY §4d and §5 additions."
    verification: "isv_ac07_skill_md_extended: (a) grep plugins/orb/skills/implement/SKILL.md for '### 4d' OR '#### 4d' OR 'Emit tasks' (at least one present). (b) The §4d block MUST mention TaskCreate, metadata.spec_path, and 'flat' (no dependency edges). (c) §5 MUST contain the five new rules visibly separated (e.g. each under its own bullet or sub-heading): TaskUpdate-same-turn, Monitor heuristic, first-failure checkpoint (with interactive + non-interactive branches), canonical resume-rebuild warning constant, canonical non-interactive first-failure marker constant. (d) Byte-identity negative test (strengthened from line-count): extract sections §1, §2, §3, §4a, §4b, §4c from implement/SKILL.md at the post-0009-merge baseline (i.e. the tip of the mission-resilience branch before this card's changes) and from the post-merge tip of this card's branch. For each extracted section range, compute `sha256sum` and assert the hash is unchanged pre-to-post. A diff over the concatenation of these ranges MUST be empty. This defends the constraint #1 'byte-identical' wording, not a weaker semantic or line-count claim."

  - id: ac-08
    ac_type: code
    description: "This card authors `plugins/orb/scripts/parse-progress.sh` as a new standalone shared helper. Given a progress.md path argument, it emits three machine-readable datasets to stdout: (1) the list of `(ac_id, status, description, is_gate)` tuples from ## Acceptance Criteria (ignoring any `- [ ]` / `- [x]` lines inside ## Detours), (2) the list of constraint strings from ## Hard Constraints, (3) the `Spec path:` value. The output format is deterministic and documented in the script header. The card's deliverable includes refactoring card 0009's existing AC-surfacing logic inside `plugins/orb/scripts/session-context.sh` to source this helper instead of inlining the awk block — this is the single-source migration. This card's resume reconcile (ac-03) ALSO sources the helper. After this card merges, there is exactly one progress.md parser in the repo."
    verification: "isv_ac08_shared_parser: (a) Assert the file exists at plugins/orb/scripts/parse-progress.sh, is executable, and has a documented header describing the three outputs. (b) Given a fixture progress.md with 3 ACs (ac-01 (gate) [x], ac-02 [ ], ac-03 [ ]) and a ## Detours section containing the literal text `- [x] ac-02`, running `parse-progress.sh <fixture>` must report ac-02 as [ ] (unchecked) — the detour text is ignored. (c) Given the same fixture, the output MUST flag ac-01 as is_gate=true and ac-02 / ac-03 as is_gate=false. (d) The shared helper MUST be invoked by both (i) the resume reconcile code path added by this card (grep session-context.sh for `parse-progress.sh` inside the reconcile block) and (ii) card 0009's next-unchecked-AC surfacing code path, which THIS card refactors to source the helper (grep session-context.sh for `parse-progress.sh` inside the next-AC block). (e) Structural single-source assertion (no reliance on incidental 0009 marker strings): after merge, `grep -nE '\\bawk\\b|\\bsed\\b' plugins/orb/scripts/session-context.sh` returns zero hits within the next-AC-surfacing function/block and zero hits within the resume reconcile block — both code paths delegate to `parse-progress.sh` via sourcing or invocation. The assertion checks behavioural structure (no inline parsing primitives remain where the helper now does the work), not a specific prose comment 0009 never contracted."

ontology_schema:
  name: "ImplementSessionVisibilityModel"
  description: "Extensions to the /orb:implement skill that make the AC/constraint checklist a first-class session artefact via Claude Code's Task tools, plus mid-run test visibility via Monitor. Operates as a thin layer over card 0009's progress.md schema — this card defines no schema; it consumes 0009's and emits tasks derived from it. This card also authors the single shared progress.md parser (ac-08) and migrates card 0009's AC-surfacing code to source it."
  fields:
    - name: "task_emission"
      type: "object"
      description: "The TaskCreate loop fired in implement/SKILL.md §4d after progress.md is written and BEFORE the first AC's pre-AC check sequence on a fresh run. One task per hard constraint (subject = constraint text), one task per AC (subject = `ac-NN: <description>`), all with metadata.spec_path set to the spec's repo-relative path. Flat — no dependency edges."
    - name: "task_update_rule"
      type: "string"
      description: "Agent-side SKILL.md §5 rule: when the progress.md checkbox is flipped from `- [ ] ac-NN` to `- [x] ac-NN`, a TaskUpdate to status `completed` MUST be emitted in the same tool-call turn. Not a hook, not a watcher — a text rule in the skill the agent follows."
    - name: "resume_reconcile"
      type: "object"
      description: "SessionStart-time algorithm that runs AFTER card 0009's pre-AC sequence (backfill → drift → gate surfacing). Filter tasks by metadata.spec_path, compare set + per-item statuses against progress.md (parsed via this card's shared parser, ignoring ## Detours). On match: zero mutations. On drift: full rebuild — `TaskUpdate status: cancelled` on every stale filtered task, followed by `TaskCreate` for each expected item. Emit a single stderr warning whose text is the canonical single-source constant defined in implement/SKILL.md §5: `orbit: task list out of sync with progress.md, rebuilt from scratch`. No `TaskDelete` / `TaskStop`. Skipped entirely if 0009's non-interactive drift halt fired (exit 1) — session is aborted before reconcile runs."
    - name: "monitor_heuristic"
      type: "string"
      description: "SKILL.md §5 rule: tests expected to exceed ~60s or invoking a full-suite runner (cargo test, pytest at root, npm test, etc.) use the Monitor tool with the command piped through `grep --line-buffered -E 'FAIL|ERROR|AssertionError|Traceback'`. Short targeted tests stay on Bash. No spec metadata field is added."
    - name: "first_failure_checkpoint"
      type: "object"
      description: "SKILL.md §5 rule with an interactive / non-interactive split. INTERACTIVE (TTY on stdin AND ORBIT_NONINTERACTIVE != 1): on the first failure-marker line surfaced by Monitor, the agent pauses and AskUserQuestions with two options — 'Fix the failure now (I will investigate and re-run)' and 'Let the suite finish, then triage'. Subsequent failures in the same Monitor invocation surface but do NOT re-prompt; the gate resets on the next Monitor call. NON-INTERACTIVE (no TTY OR ORBIT_NONINTERACTIVE=1, including /orb:drive, rally, cron): no AskUserQuestion; emit canonical stderr marker `orbit: first-failure checkpoint skipped (non-interactive); halting for upstream triage`; halt with exit status 2 so upstream orchestrators (drive) can route to a checkpoint distinct from clean test failure (exit 1). Mirrors card 0009 ac-02 discipline for AskUserQuestion gating."
    - name: "shared_progress_parser"
      type: "object"
      description: "A standalone shell helper authored by THIS card at plugins/orb/scripts/parse-progress.sh. Extracts (ac_id, status, description, is_gate) tuples from progress.md's ## Acceptance Criteria section, constraint strings from ## Hard Constraints, and the Spec path. Consumed by both (a) this card's resume reconcile and (b) card 0009's next-unchecked-AC surfacing in session-context.sh — which this card refactors to source the helper in place of the previously-inlined awk block. Post-merge the repo contains one and only one progress.md parser."
    - name: "canonical_resume_warning"
      type: "string"
      description: "The single-source constant for the resume-rebuild warning message, declared verbatim in implement/SKILL.md §5: `orbit: task list out of sync with progress.md, rebuilt from scratch`. The hook that emits the warning copies the string literally; tests grep the skill file for the source of truth. Drift between the skill copy and the hook copy is a failure."

evaluation_principles:
  - principle: "Tasks mirror progress.md — every pending task corresponds to a `- [ ]` line; every completed task corresponds to a `- [x]` line; the Task tool is a live view of the markdown, never divergent"
    weight: 0.22
  - principle: "No schema overlap with card 0009 — this card's spec must never define, reference, or modify progress.md sections beyond consumption"
    weight: 0.18
  - principle: "Agent-side discipline over infrastructure — TaskUpdate-same-turn and first-failure-checkpoint are text rules in SKILL.md, not new hooks or watchers, matching the shipped skill's agent-driven style"
    weight: 0.16
  - principle: "Resume is cheap on the common path — zero mutations when in sync; rebuild only on detected drift; cancellation-then-recreation uses only `TaskUpdate` + `TaskCreate`, never a delete primitive"
    weight: 0.14
  - principle: "Monitor is filtered — no raw stdout streaming; FAIL/ERROR/AssertionError/Traceback markers only, via `grep --line-buffered`"
    weight: 0.12
  - principle: "Task scoping is spec-local — metadata.spec_path isolates orbit-implement tasks from everything else in the session's TaskList"
    weight: 0.10
  - principle: "Shared parser lives once — this card authors parse-progress.sh as a first-party deliverable, refactoring card 0009's inlined awk block to source it; after merge there is exactly one progress.md parser in the repo"
    weight: 0.08

exit_conditions:
  - "All 8 ACs have passing verifications (isv_ac01..isv_ac08)."
  - "plugins/orb/skills/implement/SKILL.md has a new §4d (task emission) and four new §5 rules (task-update-same-turn, monitor heuristic, first-failure checkpoint, canonical resume-rebuild warning constant), with §1–§4c unchanged except for card 0009's additions."
  - "The resume reconcile path is wired into session-context.sh (or a companion script it sources), runs AFTER card 0009's pre-AC sequence, is gated by metadata.spec_path, and uses `TaskUpdate status: cancelled` + `TaskCreate` (no TaskDelete) for rebuilds."
  - "plugins/orb/scripts/parse-progress.sh exists as a first-party deliverable of this card and is the single progress.md parser in the repo — the previously-inlined awk block inside session-context.sh (card 0009 ac-08) has been removed and replaced with a call to the helper."
  - "A fresh /orb:implement run against a fixture spec produces a TaskList entry for every AC and every constraint, tagged with the spec path, BEFORE the first AC's pre-AC check runs."
  - "A simulated session resume against an in-sync fixture performs zero Task mutations; against a drifted fixture, stale tasks are cancelled-then-recreated and the canonical warning string matches the single source of truth greppable in implement/SKILL.md."

